name: CI

on:
  push:
    branches: [main, develop, 'release/**', 'feature/**']
    paths:
      - 'kayak-backend/**'
      - 'kayak-frontend/**'
      - '.github/workflows/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pubspec.yaml'
      - 'pubspec.lock'
  pull_request:
    branches: [main, develop]
    paths:
      - 'kayak-backend/**'
      - 'kayak-frontend/**'
      - '.github/workflows/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pubspec.yaml'
      - 'pubspec.lock'

# Cancel redundant workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  # ============================================
  # Stage 1: 代码格式检查 - 并行执行
  # ============================================
  format-backend:
    name: Format Check (Backend)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        working-directory: ./kayak-backend
        run: cargo fmt -- --check

  format-frontend:
    name: Format Check (Frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Check Dart formatting
        working-directory: ./kayak-frontend
        run: dart format --output=none --set-exit-if-changed .

  # ============================================
  # Stage 2: 代码质量检查 (Lint/Analyze)
  # ============================================
  lint-backend:
    name: Lint (Backend)
    runs-on: ubuntu-latest
    needs: format-backend
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./kayak-backend -> target"

      - name: Run Clippy
        working-directory: ./kayak-backend
        run: cargo clippy --all-targets --all-features -- -D warnings

  lint-frontend:
    name: Analyze (Frontend)
    runs-on: ubuntu-latest
    needs: format-frontend
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ./kayak-frontend
        run: flutter pub get

      - name: Analyze Dart code
        working-directory: ./kayak-frontend
        run: flutter analyze --fatal-infos

  # ============================================
  # Stage 3: 单元测试 - 并行执行
  # ============================================
  test-backend:
    name: Unit Tests (Backend)
    runs-on: ubuntu-latest
    needs: lint-backend
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./kayak-backend -> target"

      - name: Run tests
        working-directory: ./kayak-backend
        run: cargo test --all-features --verbose
        env:
          RUST_LOG: debug

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-${{ github.run_id }}
          path: ./kayak-backend/target/debug/deps/*.stderr
          retention-days: 7
          if-no-files-found: ignore

  test-frontend:
    name: Unit Tests (Frontend)
    runs-on: ubuntu-latest
    needs: lint-frontend
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Get Flutter dependencies
        working-directory: ./kayak-frontend
        run: flutter pub get

      - name: Run tests
        working-directory: ./kayak-frontend
        run: flutter test --verbose

  # ============================================
  # Stage 4: 代码覆盖率
  # ============================================
  coverage-backend:
    name: Coverage (Backend)
    runs-on: ubuntu-latest
    needs: test-backend
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./kayak-backend -> target"

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage report
        working-directory: ./kayak-backend
        run: |
          cargo tarpaulin --all-features --workspace --timeout 120 \
            --out Xml --out Html --output-dir ./coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.run_id }}
          path: ./kayak-backend/coverage/
          retention-days: 14

  coverage-frontend:
    name: Coverage (Frontend)
    runs-on: ubuntu-latest
    needs: test-frontend
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev lcov

      - name: Get Flutter dependencies
        working-directory: ./kayak-frontend
        run: flutter pub get

      - name: Generate coverage
        working-directory: ./kayak-frontend
        run: flutter test --coverage

      - name: Generate HTML report
        working-directory: ./kayak-frontend
        run: |
          if [ -f coverage/lcov.info ]; then
            genhtml coverage/lcov.info --output-directory coverage/html --title "Kayak Frontend Coverage"
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: ./kayak-frontend/coverage/
          retention-days: 14

  # ============================================
  # Stage 5: 构建验证
  # ============================================
  build-backend:
    name: Build (Backend)
    runs-on: ubuntu-latest
    needs: [test-backend, coverage-backend]
    timeout-minutes: 15
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev libudev-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./kayak-backend -> target"

      - name: Build release
        working-directory: ./kayak-backend
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kayak-backend-${{ matrix.target }}-${{ github.run_id }}
          path: ./kayak-backend/target/${{ matrix.target }}/release/kayak-backend
          retention-days: 7
          if-no-files-found: error

  build-frontend:
    name: Build (Frontend)
    runs-on: ubuntu-latest
    needs: [test-frontend, coverage-frontend]
    timeout-minutes: 20
    strategy:
      matrix:
        target: [web, linux]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev

      - name: Get dependencies
        working-directory: ./kayak-frontend
        run: flutter pub get

      - name: Build Web
        if: matrix.target == 'web'
        working-directory: ./kayak-frontend
        run: flutter build web --release

      - name: Build Linux
        if: matrix.target == 'linux'
        working-directory: ./kayak-frontend
        run: flutter build linux --release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kayak-frontend-${{ matrix.target }}-${{ github.run_id }}
          path: |
            ./kayak-frontend/build/web/
            ./kayak-frontend/build/linux/
          retention-days: 7

  # ============================================
  # Stage 6: CI 总结
  # ============================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - format-backend
      - format-frontend
      - lint-backend
      - lint-frontend
      - test-backend
      - test-frontend
      - coverage-backend
      - coverage-frontend
      - build-backend
      - build-frontend
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Summary
        run: |
          echo "# CI Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Helper function to get status emoji
          get_status() {
            case "$1" in
              "success") echo "✅ Success" ;;
              "failure") echo "❌ Failed" ;;
              "skipped") echo "⏭️ Skipped" ;;
              "cancelled") echo "🚫 Cancelled" ;;
              *) echo "⏳ Unknown" ;;
            esac
          }
          
          echo "| Format Check (Backend) | $(get_status "${{ needs.format-backend.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Format Check (Frontend) | $(get_status "${{ needs.format-frontend.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (Backend) | $(get_status "${{ needs.lint-backend.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Analyze (Frontend) | $(get_status "${{ needs.lint-frontend.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (Backend) | $(get_status "${{ needs.test-backend.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests (Frontend) | $(get_status "${{ needs.test-frontend.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage (Backend) | $(get_status "${{ needs.coverage-backend.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage (Frontend) | $(get_status "${{ needs.coverage-frontend.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (Backend) | $(get_status "${{ needs.build-backend.result }}") |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (Frontend) | $(get_status "${{ needs.build-frontend.result }}") |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Overall Status" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.build-backend.result }}" == "success" ] && [ "${{ needs.build-frontend.result }}" == "success" ]; then
            echo "✅ **All checks passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some checks failed. Please review the logs above.**" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Overall Status
        if: ${{ needs.build-backend.result != 'success' || needs.build-frontend.result != 'success' }}
        run: |
          echo "::error::CI workflow failed. Please check the job logs for details."
          exit 1
