// 字段级错误\n#[derive(Debug, Clone, Serialize)]\npub struct FieldError {\n    pub field: String,\n    pub message: String,\n}\n\nimpl FieldError {\n    pub fn new(field: impl Into\u003cString\u003e, message: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            field: field.into(),\n            message: message.into(),\n        }\n    }\n}\n\n/// 应用错误类型\n#[derive(Debug, Error)]\npub enum AppError {\n    // ===== 客户端错误 (4xx) =====\n    /// 无效请求参数\n    #[error(\"Bad request: {0}\")]\n    BadRequest(String),\n\n    /// 未授权\n    #[error(\"Unauthorized: {0}\")]\n    Unauthorized(String),\n\n    /// 禁止访问\n    #[error(\"Forbidden: {0}\")]\n    Forbidden(String),\n\n    /// 资源未找到\n    #[error(\"Resource not found: {0}\")]\n    NotFound(String),\n\n    /// 方法不允许\n    #[error(\"Method not allowed\")]\n    MethodNotAllowed,\n\n    /// 请求超时 (客户端)\n    #[error(\"Request timeout\")]\n    RequestTimeout,\n\n    /// 冲突 (资源已存在)\n    #[error(\"Conflict: {0}\")]\n    Conflict(String),\n\n    /// 验证错误 (字段级)\n    #[error(\"Validation error\")]\n    ValidationError { fields: Vec\u003cFieldError\u003e },\n\n    /// 不支持的媒体类型\n    #[error(\"Unsupported media type\")]\n    UnsupportedMediaType,\n\n    /// 请求体过大\n    #[error(\"Payload too large\")]\n    PayloadTooLarge,\n\n    // ===== 服务器错误 (5xx) =====\n    /// 内部服务器错误\n    #[error(\"Internal server error: {0}\")]\n    InternalError(String),\n\n    /// 数据库错误\n    #[error(\"Database error: {0}\")]\n    DatabaseError(String),\n\n    /// 配置错误\n    #[error(\"Configuration error: {0}\")]\n    ConfigError(String),\n\n    /// 外部服务错误\n    #[error(\"External service error: {0}\")]\n    ExternalServiceError(String),\n\n    /// 服务不可用\n    #[error(\"Service unavailable\")]\n    ServiceUnavailable,\n\n    /// 网关超时\n    #[error(\"Gateway timeout\")]\n    GatewayTimeout,\n\n    /// CORS错误\n    #[error(\"CORS error: {0}\")]\n    CorsError(String),\n}\n\n/// 错误响应结构\n#[derive(Debug, Serialize)]\npub struct ErrorResponse {\n    pub code: u16,\n    pub message: String,\n    pub timestamp: String,\n}\n\nimpl AppError {\n    /// 获取对应的HTTP状态码\n    pub fn status_code(\u0026self) -\u003e StatusCode {\n        match self {\n            // 4xx - 客户端错误\n            AppError::BadRequest(_) =\u003e StatusCode::BAD_REQUEST,\n            AppError::Unauthorized(_) =\u003e StatusCode::UNAUTHORIZED,\n            AppError::Forbidden(_) =\u003e StatusCode::FORBIDDEN,\n            AppError::NotFound(_) =\u003e StatusCode::NOT_FOUND,\n            AppError::MethodNotAllowed =\u003e StatusCode::METHOD_NOT_ALLOWED,\n            AppError::RequestTimeout =\u003e StatusCode::REQUEST_TIMEOUT,\n            AppError::Conflict(_) =\u003e StatusCode::CONFLICT,\n            AppError::ValidationError { .. } =\u003e StatusCode::UNPROCESSABLE_ENTITY,\n            AppError::UnsupportedMediaType =\u003e StatusCode::UNSUPPORTED_MEDIA_TYPE,\n            AppError::PayloadTooLarge =\u003e StatusCode::PAYLOAD_TOO_LARGE,\n            AppError::CorsError(_) =\u003e StatusCode::FORBIDDEN,\n\n            // 5xx - 服务器错误\n            AppError::InternalError(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR,\n            AppError::DatabaseError(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR,\n            AppError::ConfigError(_) =\u003e StatusCode::INTERNAL_SERVER_ERROR,\n            AppError::ExternalServiceError(_) =\u003e StatusCode::BAD_GATEWAY,\n            AppError::ServiceUnavailable =\u003e StatusCode::SERVICE_UNAVAILABLE,\n            AppError::GatewayTimeout =\u003e StatusCode::GATEWAY_TIMEOUT,\n        }\n    }\n\n    /// 获取错误码\n    pub fn error_code(\u0026self) -\u003e u16 {\n        self.status_code().as_u16()\n    }\n\n    /// 转换为API错误响应\n    fn to_api_error_response(\u0026self) -\u003e ApiErrorResponse {\n        ApiErrorResponse {\n            code: self.status_code().as_u16(),\n            message: self.to_string(),\n            details: match self {\n                AppError::ValidationError { fields } =\u003e Some(fields.clone()),\n                _ =\u003e None,\n            },\n            timestamp: current_timestamp(),\n        }\n    }\n\n    /// 创建字段验证错误\n    pub fn validation_error(fields: Vec\u003cFieldError\u003e) -\u003e Self {\n        AppError::ValidationError { fields }\n    }\n\n    /// 创建单个字段验证错误\n    pub fn validation_error_single(field: impl Into\u003cString\u003e, message: impl Into\u003cString\u003e) -\u003e Self {\n        AppError::ValidationError {\n            fields: vec![FieldError::new(field, message)],\n        }\n    }\n}\n\nimpl IntoResponse for AppError {\n    fn into_response(self) -\u003e Response {\n        let status = self.status_code();\n        let body = Json(self.to_api_error_response());\n\n        // 记录错误日志\n        if status.is_server_error() {\n            error!(error = %self, \"Server error occurred\");\n        } else {\n            tracing::debug!(error = %self, \"Client error occurred\");\n        }\n\n        (status, body).into_response()\n    }\n}\n\n/// 从其他错误类型转换\nimpl From\u003cstd::io::Error\u003e for AppError {\n    fn from(err: std::io::Error) -\u003e Self {\n        AppError::InternalError(err.to_string())\n    }\n}\n\nimpl From\u003cconfig::ConfigError\u003e for AppError {\n    fn from(err: config::ConfigError) -\u003e Self {\n        AppError::ConfigError(err.to_string())\n    }\n}\n\nimpl From\u003cserde_json::Error\u003e for AppError {\n    fn from(err: serde_json::Error) -\u003e Self {\n        AppError::BadRequest(format!(\"JSON parse error: {err}\"))\n    }\n}\n\nimpl From\u003cJsonRejection\u003e for AppError {\n    fn from(rejection: JsonRejection) -\u003e Self {\n        match rejection {\n            JsonRejection::JsonDataError(e) =\u003e {\n                AppError::BadRequest(format!(\"JSON data error: {e}\"))\n            }\n            JsonRejection::JsonSyntaxError(e) =\u003e {\n                AppError::BadRequest(format!(\"JSON syntax error: {e}\"))\n            }\n            JsonRejection::MissingJsonContentType(_) =\u003e {\n                AppError::BadRequest(\"Missing JSON content type\".to_string())\n            }\n            JsonRejection::BytesRejection(_) =\u003e {\n                AppError::BadRequest(\"Failed to read request body\".to_string())\n            }\n            _ =\u003e AppError::BadRequest(\"Invalid JSON\".to_string()),\n        }\n    }\n}\n\nimpl From\u003cQueryRejection\u003e for AppError {\n    fn from(rejection: QueryRejection) -\u003e Self {\n        AppError::BadRequest(format!(\"Query parameter error: {rejection}\"))\n    }\n}\n\nimpl From\u003csqlx::Error\u003e for AppError {\n    fn from(err: sqlx::Error) -\u003e Self {\n        match err {\n            sqlx::Error::RowNotFound =\u003e AppError::NotFound(\"Resource not found\".to_string()),\n            sqlx::Error::Database(db_err) =\u003e {\n                if db_err.is_unique_violation() {\n                    AppError::Conflict(\"Resource already exists\".to_string())\n                } else {\n                    AppError::DatabaseError(db_err.to_string())\n                }\n            }\n            sqlx::Error::PoolTimedOut =\u003e AppError::ServiceUnavailable,\n            sqlx::Error::PoolClosed =\u003e AppError::ServiceUnavailable,\n            _ =\u003e AppError::DatabaseError(err.to_string()),\n        }\n    }\n}\n\n/// 统一错误处理函数（用于 Tower 的 HandleErrorLayer）\npub async fn handle_error(err: tower::BoxError) -\u003e impl IntoResponse {\n    if err.is::\u003ctower::timeout::error::Elapsed\u003e() {\n        AppError::RequestTimeout\n    } else {\n        AppError::InternalError(err.to_string())\n    }\n}\n\n/// 获取当前时间戳（ISO 8601格式）\nfn current_timestamp() -\u003e String {\n    use time::OffsetDateTime;\n    OffsetDateTime::now_utc()\n        .format(\u0026time::format_description::well_known::Rfc3339)\n        .unwrap_or_else(|_| \"1970-01-01T00:00:00Z\".to_string())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use axum::response::IntoResponse;\n\n    #[test]\n    fn test_api_response_success() {\n        let data = serde_json::json!({\"id\": 1, \"name\": \"test\"});\n        let response = ApiResponse::success(data);\n\n        assert_eq!(response.code, 200);\n        assert_eq!(response.message, \"success\");\n        assert!(response.timestamp.is_some());\n    }\n\n    #[test]\n    fn test_api_response_created() {\n        let data = serde_json::json!({\"id\": 1});\n        let response = ApiResponse::created(data);\n\n        assert_eq!(response.code, 201);\n        assert_eq!(response.message, \"created\");\n    }\n\n    #[test]\n    fn test_app_error_status_codes() {\n        // 4xx errors\n        assert_eq!(\n            AppError::BadRequest(\"test\".to_string()).status_code(),\n            StatusCode::BAD_REQUEST\n        );\n        assert_eq!(\n            AppError::Unauthorized(\"test\".to_string()).status_code(),\n            StatusCode::UNAUTHORIZED\n        );\n        assert_eq!(\n            AppError::NotFound(\"test\".to_string()).status_code(),\n            StatusCode::NOT_FOUND\n        );\n        assert_eq!(\n            AppError::Conflict(\"test\".to_string()).status_code(),\n            StatusCode::CONFLICT\n        );\n\n        // 5xx errors\n        assert_eq!(\n            AppError::InternalError(\"test\".to_string()).status_code(),\n            StatusCode::INTERNAL_SERVER_ERROR\n        );\n        assert_eq!(\n            AppError::DatabaseError(\"test\".to_string()).status_code(),\n            StatusCode::INTERNAL_SERVER_ERROR\n        );\n    }\n\n    #[test]\n    fn test_validation_error() {\n        let fields = vec![\n            FieldError::new(\"email\", \"invalid format\"),\n            FieldError::new(\"password\", \"too short\"),\n        ];\n        let error = AppError::validation_error(fields);\n\n        assert_eq!(error.status_code(), StatusCode::UNPROCESSABLE_ENTITY);\n    }\n\n    #[test]\n    fn test_field_error() {\n        let field_error = FieldError::new(\"username\", \"required\");\n        assert_eq!(field_error.field, \"username\");\n        assert_eq!(field_error.message, \"required\");\n    }\n\n    #[test]\n    fn test_error_into_response() {\n        let error = AppError::NotFound(\"user not found\".to_string());\n        let response = error.into_response();\n\n        assert_eq!(response.status(), StatusCode::NOT_FOUND);\n    }\n\n    #[test]\n    fn test_io_error_conversion() {\n        let io_err = std::io::Error::new(std::io::ErrorKind::NotFound, \"file not found\");\n        let app_err: AppError = io_err.into();\n\n        assert!(matches!(app_err, AppError::InternalError(_)));\n    }\n}\n","traces":[{"line":27,"address":[18244432,18243967,18242784,18242752,18245111,18243992,18243143,18242727,18246442,18244395,18243168,18243563,18244805,18242368,18244032,18246048,18243600,18244864,18245105,18246010,18245577,18243538,18244370,18246417,18245136,18245985,18243200,18245552,18244830,18245616],"length":1,"stats":{"Line":1}},{"line":30,"address":[16022341,16023590,16024261,16025077,16021541,16021925,16023189,16022725,16023998,16024662,16025493],"length":1,"stats":{"Line":1}},{"line":32,"address":[16021718,16025670,16023378,16024401,16022518,16024450,16025201,16022947,16022469,16024127,16022898,16025250,16024787,16025612,16021669,16022049,16023715,16023764,16023329,16024078,16024836,16022098],"length":1,"stats":{"Line":2}},{"line":37,"address":[16019383,16018688,16018942,16018948,16018960,16019358],"length":1,"stats":{"Line":0}},{"line":40,"address":[16018715,16019024],"length":1,"stats":{"Line":0}},{"line":42,"address":[16018793,16019144,16019193,16018845],"length":1,"stats":{"Line":0}},{"line":47,"address":[16019773,16020232,16021490,16020619,16021047,16019408,16021104,16019824,16021465,16020672,16019798,16020288,16020257,16021072,16020644],"length":1,"stats":{"Line":1}},{"line":50,"address":[18241909,18240598,18241029,18241461],"length":1,"stats":{"Line":1}},{"line":52,"address":[16019553,16020018,16021251,16020067,16021300,16020486,16020891,16 .with_file(false)\n        .with_line_number(false)\n        // ISO 8601 / RFC 3339 格式时间戳\n        .with_timer(fmt::time::UtcTime::rfc_3339())\n        // 美化输出（开发环境）\n        .with_ansi(true)\n        .compact();\n\n    // JSON格式（可选，生产环境）\n    let fmt_layer = if config.json_format.unwrap_or(false) {\n        fmt::layer()\n            .json()\n            .with_timer(fmt::time::UtcTime::rfc_3339())\n            .boxed()\n    } else {\n        fmt_layer.boxed()\n    };\n\n    // 初始化订阅者\n    tracing_subscriber::registry()\n        .with(filter)\n        .with(fmt_layer)\n        .init();\n\n    Ok(())\n}\n","traces":[{"line":14,"address":[17297021,17296016,17297015],"length":1,"stats":{"Line":0}},{"line":16,"address":[16944608,16944629],"length":1,"stats":{"Line":0}},{"line":20,"address":[18189619],"length":1,"stats":{"Line":0}},{"line":28,"address":[18189823],"length":1,"stats":{"Line":0}},{"line":34,"address":[18190187,18189913],"length":1,"stats":{"Line":0}},{"line":35,"address":[18190008,18190163],"length":1,"stats":{"Line":0}},{"line":37,"address":[18190094],"length":1,"stats":{"Line":0}},{"line":40,"address":[18190025,18189943],"length":1,"stats":{"Line":0}},{"line":44,"address":[18190049],"length":1,"stats":{"Line":0}},{"line":45,"address":[18190233],"length":1,"stats":{"Line":0}},{"line":46,"address":[18190301],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":11},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","core","mod.rs"],"content":"//! 核心基础设施模块\n//!\n//! 提供应用配置、错误处理、日志系统等核心功能\n\npub mod config;\npub mod error;\npub mod log;\npub mod result;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","core","result.rs"],"content":"//! 结果类型别名\n//!\n//! 为应用提供统一的结果类型\n\nuse crate::core::error::AppError;\n\n/// 应用结果类型\npub type Result\u003cT\u003e = std::result::Result\u003cT, AppError\u003e;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","db","connection.rs"],"content":"//! 数据库连接管理\n//!\n//! 提供数据库连接池初始化和连接管理\n\nuse sqlx::sqlite::{SqliteConnectOptions, SqlitePoolOptions};\nuse sqlx::{migrate::Migrator, SqlitePool};\nuse std::path::Path;\nuse tracing::{error, info};\n\npub type DbPool = SqlitePool;\n\nstatic MIGRATOR: Migrator = sqlx::migrate!(\"./migrations\");\n\n/// 初始化数据库\n///\n/// 创建数据库连接池并执行迁移\npub async fn init_db(database_url: \u0026str) -\u003e Result\u003cDbPool, sqlx::Error\u003e {\n    info!(\"Initializing database connection pool...\");\n\n    // 确保数据库目录存在\n    if let Some(parent) = Path::new(database_url.trim_start_matches(\"sqlite://\")).parent() {\n        std::fs::create_dir_all(parent).map_err(|e| {\n            error!(\"Failed to create database directory: {}\", e);\n            sqlx::Error::Io(std::io::Error::other(format!(\n                \"Failed to create database directory: {}\",\n                e\n            )))\n        })?;\n    }\n\n    // 配置连接选项\n    let options = SqliteConnectOptions::new()\n        .filename(database_url.trim_start_matches(\"sqlite://\"))\n        .create_if_missing(true)\n        .journal_mode(sqlx::sqlite::SqliteJournalMode::Wal)\n        .busy_timeout(std::time::Duration::from_secs(30));\n\n    // 创建连接池\n    let pool = SqlitePoolOptions::new()\n        .max_connections(5)\n        .min_connections(1)\n        .acquire_timeout(std::time::Duration::from_secs(30))\n        .idle_timeout(std::time::Duration::from_secs(300))\n        .connect_with(options)\n        .await?;\n\n    info!(\"Database connection pool created successfully\");\n\n    // 执行迁移\n    info!(\"Running database migrations...\");\n    match MIGRATOR.run(\u0026pool).await {\n        Ok(_) =\u003e {\n            info!(\"Database migrations completed successfully\");\n        }\n        Err(e) =\u003e {\n            error!(\"Failed to run migrations: {}\", e);\n            return Err(sqlx::Error::Migrate(Box::new(e)));\n        }\n    }\n\n    Ok(pool)\n}\n\n/// 获取数据库连接\n///\n/// 从连接池获取一个连接\npub async fn get_conn(\n    pool: \u0026DbPool,\n) -\u003e Result\u003csqlx::pool::PoolConnection\u003csqlx::Sqlite\u003e, sqlx::Error\u003e {\n    pool.acquire().await\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[tokio::test]\n    async fn test_init_db() {\n        let pool = init_db(\"sqlite::memory:\").await.unwrap();\n        assert!(!pool.is_closed());\n    }\n}\n","traces":[{"line":17,"address":[19789757,19789965,19792956,19789994,19793045,19789680,19789922],"length":1,"stats":{"Line":8}},{"line":18,"address":[15810855,15810278,15810424],"length":1,"stats":{"Line":9}},{"line":21,"address":[15810806,15811768,15812183],"length":1,"stats":{"Line":6}},{"line":22,"address":[19791824,19802500,19802494,19791553,19791737,19800848,19791602],"length":1,"stats":{"Line":6}},{"line":23,"address":[15820478,15820866,15820399],"length":1,"stats":{"Line":0}},{"line":24,"address":[15821822,15820836],"length":1,"stats":{"Line":0}},{"line":32,"address":[15812622,15811948,15812396],"length":1,"stats":{"Line":6}},{"line":33,"address":[15812244,15812295,15812342,15813342,15812420],"length":1,"stats":{"Line":3}},{"line":35,"address":[15812502],"length":1,"stats":{"Line":2}},{"line":36,"address":[15812467,15813320,15812630,15812547,15812569],"length":1,"stats":{"Line":4}},{"line":39,"address":[15813208,15813635,15813576,15812677,15813795,15813012,15816682,15812882],"length":1,"stats":{"Line":8}},{"line":42,"address":[15813298,15812696,15812906,15812826,15812804],"length":1,"stats":{"Line":2}},{"line":43,"address":[15812956,15813260,15812934,15813036],"length":1,"stats":{"Line":4}},{"line":44,"address":[19792711],"length":1,"stats":{"Line":1}},{"line":45,"address":[19793427,19792833,19789952,19792898,19793079,19793296],"length":1,"stats":{"Line":8}},{"line":47,"address":[15814391,15813904,15813987],"length":1,"stats":{"Line":3}},{"line":50,"address":[19794983,19794037,19795397],"length":1,"stats":{"Line":3}},{"line":51,"address":[15816618,158 \n        parent_id: Option\u003cUuid\u003e,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003c(Vec\u003cDevice\u003e, i64), DeviceRepositoryError\u003e;\n    async fn update(\n        \u0026self,\n        id: Uuid,\n        name: Option\u003cString\u003e,\n        protocol_params: Option\u003cserde_json::Value\u003e,\n        manufacturer: Option\u003cString\u003e,\n        model: Option\u003cString\u003e,\n        sn: Option\u003cString\u003e,\n        status: Option\u003cDeviceStatus\u003e,\n    ) -\u003e Result\u003cDevice, DeviceRepositoryError\u003e;\n    async fn delete(\u0026self, id: Uuid) -\u003e Result\u003c(), DeviceRepositoryError\u003e;\n    async fn find_all_descendant_ids(\u0026self, id: Uuid) -\u003e Result\u003cVec\u003cUuid\u003e, DeviceRepositoryError\u003e;\n    async fn find_children(\u0026self, parent_id: Uuid) -\u003e Result\u003cVec\u003cDevice\u003e, DeviceRepositoryError\u003e;\n}\n\n/// SQLx设备仓库实现\n#[derive(Clone)]\npub struct SqlxDeviceRepository {\n    pool: SqlitePool,\n}\n\nimpl SqlxDeviceRepository {\n    pub fn new(pool: SqlitePool) -\u003e Self {\n        Self { pool }\n    }\n}\n\n#[derive(Debug, FromRow)]\nstruct DeviceRow {\n    id: String,\n    workbench_id: String,\n    parent_id: Option\u003cString\u003e,\n    name: String,\n    protocol_type: String,\n    protocol_params: Option\u003cString\u003e,\n    manufacturer: Option\u003cString\u003e,\n    model: Option\u003cString\u003e,\n    sn: Option\u003cString\u003e,\n    status: String,\n    created_at: String,\n    updated_at: String,\n}\n\nimpl DeviceRow {\n    #[allow(clippy::wrong_self_convention)]\n    fn to_entity(self) -\u003e Device {\n        Device {\n            id: Uuid::parse_str(\u0026self.id).unwrap(),\n            workbench_id: Uuid::parse_str(\u0026self.workbench_id).unwrap(),\n            parent_id: self.parent_id.map(|s| Uuid::parse_str(\u0026s).unwrap()),\n            name: self.name,\n            protocol_type: match self.protocol_type.as_str() {\n                \"virtual\" =\u003e ProtocolType::Virtual,\n                \"modbus_tcp\" =\u003e ProtocolType::ModbusTcp,\n                \"modbus_rtu\" =\u003e ProtocolType::ModbusRtu,\n                \"can\" =\u003e ProtocolType::Can,\n                \"visa\" =\u003e ProtocolType::Visa,\n                \"mqtt\" =\u003e ProtocolType::Mqtt,\n                _ =\u003e ProtocolType::Virtual,\n            },\n            protocol_params: self\n                .protocol_params\n                .and_then(|s| serde_json::from_str(\u0026s).ok()),\n            manufacturer: self.manufacturer,\n            model: self.model,\n            sn: self.sn,\n            status: match self.status.as_str() {\n                \"online\" =\u003e DeviceStatus::Online,\n                \"error\" =\u003e DeviceStatus::Error,\n                _ =\u003e DeviceStatus::Offline,\n            },\n            created_at: chrono::DateTime::parse_from_rfc3339(\u0026self.created_at)\n                .unwrap()\n                .with_timezone(\u0026chrono::Utc),\n            updated_at: chrono::DateTime::parse_from_rfc3339(\u0026self.updated_at)\n                .unwrap()\n                .with_timezone(\u0026chrono::Utc),\n        }\n    }\n}\n\nfn protocol_type_to_string(pt: ProtocolType) -\u003e \u0026'static str {\n    match pt {\n        ProtocolType::Virtual =\u003e \"virtual\",\n        ProtocolType::ModbusTcp =\u003e \"modbus_tcp\",\n        ProtocolType::ModbusRtu =\u003e \"modbus_rtu\",\n        ProtocolType::Can =\u003e \"can\",\n        ProtocolType::Visa =\u003e \"visa\",\n        ProtocolType::Mqtt =\u003e \"mqtt\",\n    }\n}\n\nfn device_status_to_string(status: DeviceStatus) -\u003e \u0026'static str {\n    match status {\n        DeviceStatus::Online =\u003e \"online\",\n        DeviceStatus::Offline =\u003e \"offline\",\n        DeviceStatus::Error =\u003e \"error\",\n    }\n}\n\n#[async_trait]\nimpl DeviceRepository for SqlxDeviceRepository {\n    async fn create(\u0026self, device: \u0026Device) -\u003e Result\u003cDevice, DeviceRepositoryError\u003e {\n        let protocol_params = device\n            .protocol_params\n            .as_ref()\n            .map(|p| serde_json::to_string(p).unwrap_or_default());\n\n        sqlx::query(\n            r#\"\n            INSERT INTO devices (id, workbench_id, parent_id, name, protocol_type, protocol_params, manufacturer, model, sn, status, created_at, updated_at)\n            VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)\n            \"#,\n        )\n        .bind(device.id.to_string())\n        .bind(device.workbench_id.to_string())\n        .bind(device.parent_id.map(|id| id.to_string()))\n        .bind(\u0026device.name)\n        .bind(protocol_type_to_string(device.protocol_type))\n        .bind(protocol_params)\n        .bind(\u0026device.manufacturer)\n        .bind(\u0026device.model)\n        .bind(\u0026device.sn)\n        .bind(device_status_to_string(device.status))\n        .bind(device.created_at.to_rfc3339())\n        .bind(device.updated_at.to_rfc3339())\n        .execute(\u0026self.pool)\n        .await?;\n\n        Ok(device.clone())\n    }\n\n    async fn find_by_id(\u0026self, id: Uuid) -\u003e Result\u003cOption\u003cDevice\u003e, DeviceRepositoryError\u003e {\n        let row: Option\u003cDeviceRow\u003e = sqlx::query_as(\"SELECT * FROM devices WHERE id = ?\")\n            .bind(id.to_string())\n            .fetch_optional(\u0026self.pool)\n            .await?;\n\n        Ok(row.map(|r| r.to_entity()))\n    }\n\n    async fn find_by_workbench_id(\n        \u0026self,\n        workbench_id: Uuid,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003c(Vec\u003cDevice\u003e, i64), DeviceRepositoryError\u003e {\n        let offset = (page - 1) * size;\n\n        let count_row: (i64,) =\n            sqlx::query_as(\"SELECT COUNT(*) FROM devices WHERE workbench_id = ?\")\n                .bind(workbench_id.to_string())\n                .fetch_one(\u0026self.pool)\n                .await?;\n\n        let total = count_row.0;\n\n        let rows: Vec\u003cDeviceRow\u003e = sqlx::query_as(\n            \"SELECT * FROM devices WHERE workbench_id = ? ORDER BY created_at DESC LIMIT ? OFFSET ?\",\n        )\n        .bind(workbench_id.to_string())\n        .bind(size)\n        .bind(offset)\n        .fetch_all(\u0026self.pool)\n        .await?;\n\n        let devices = rows.into_iter().map(|r| r.to_entity()).collect();\n        Ok((devices, total))\n    }\n\n    async fn find_by_workbench_and_parent(\n        \u0026self,\n        workbench_id: Uuid,\n        parent_id: Option\u003cUuid\u003e,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003c(Vec\u003cDevice\u003e, i64), DeviceRepositoryError\u003e {\n        let offset = (page - 1) * size;\n\n        let (count_query, items_query) = if parent_id.is_some() {\n            (\n                \"SELECT COUNT(*) FROM devices WHERE workbench_id = ? AND parent_id = ?\",\n                \"SELECT * FROM devices WHERE workbench_id = ? AND parent_id = ? ORDER BY created_at DESC LIMIT ? OFFSET ?\",\n            )\n        } else {\n            (\n                \"SELECT COUNT(*) FROM devices WHERE workbench_id = ? AND parent_id IS NULL\",\n                \"SELECT * FROM devices WHERE workbench_id = ? AND parent_id IS NULL ORDER BY created_at DESC LIMIT ? OFFSET ?\",\n            )\n        };\n\n        let total: i64 = if let Some(pid) = parent_id {\n            let row: (i64,) = sqlx::query_as(count_query)\n                .bind(workbench_id.to_string())\n                .bind(pid.to_string())\n                .fetch_one(\u0026self.pool)\n                .await?;\n            row.0\n        } else {\n            let row: (i64,) = sqlx::query_as(count_query)\n                .bind(workbench_id.to_string())\n                .fetch_one(\u0026self.pool)\n                .await?;\n            row.0\n        };\n\n        let rows: Vec\u003cDeviceRow\u003e = if let Some(pid) = parent_id {\n            sqlx::query_as(items_query)\n                .bind(workbench_id.to_string())\n                .bind(pid.to_string())\n                .bind(size)\n                .bind(offset)\n                .fetch_all(\u0026self.pool)\n                .await?\n        } else {\n            sqlx::query_as(items_query)\n                .bind(workbench_id.to_string())\n                .bind(size)\n                .bind(offset)\n                .fetch_all(\u0026self.pool)\n                .await?\n        };\n\n        let devices = rows.into_iter().map(|r| r.to_entity()).collect();\n        Ok((devices, total))\n    }\n\n    async fn update(\n        \u0026self,\n        id: Uuid,\n        name: Option\u003cString\u003e,\n        protocol_params: Option\u003cserde_json::Value\u003e,\n        manufacturer: Option\u003cString\u003e,\n        model: Option\u003cString\u003e,\n        sn: Option\u003cString\u003e,\n        status: Option\u003cDeviceStatus\u003e,\n    ) -\u003e Result\u003cDevice, DeviceRepositoryError\u003e {\n        let mut updates = Vec::new();\n        let mut values: Vec\u003cString\u003e = Vec::new();\n\n        if let Some(ref n) = name {\n            updates.push(\"name = ?\");\n            values.push(n.clone());\n        }\n        if let Some(ref p) = protocol_params {\n            updates.push(\"protocol_params = ?\");\n            values.push(serde_json::to_string(p).unwrap_or_default());\n        }\n        if let Some(ref m) = manufacturer {\n            updates.push(\"manufacturer = ?\");\n            values.push(m.clone());\n        }\n        if let Some(ref m) = model {\n            updates.push(\"model = ?\");\n            values.push(m.clone());\n        }\n        if let Some(ref s) = sn {\n            updates.push(\"sn = ?\");\n            values.push(s.clone());\n        }\n        if let Some(st) = status {\n            updates.push(\"status = ?\");\n            values.push(device_status_to_string(st).to_string());\n        }\n\n        if updates.is_empty() {\n            return self\n                .find_by_id(id)\n                .await?\n                .ok_or(DeviceRepositoryError::NotFound);\n        }\n\n        updates.push(\"updated_at = ?\");\n        values.push(chrono::Utc::now().to_rfc3339());\n\n        let query = format!(\"UPDATE devices SET {} WHERE id = ?\", updates.join(\", \"));\n\n        let mut q = sqlx::query(\u0026query);\n        for v in \u0026values {\n            q = q.bind(v);\n        }\n        q = q.bind(id.to_string());\n\n        let result = q.execute(\u0026self.pool).await?;\n\n        if result.rows_affected() == 0 {\n            return Err(DeviceRepositoryError::NotFound);\n        }\n\n        self.find_by_id(id)\n            .await?\n            .ok_or(DeviceRepositoryError::NotFound)\n    }\n\n    async fn delete(\u0026self, id: Uuid) -\u003e Result\u003c(), DeviceRepositoryError\u003e {\n        let result = sqlx::query(\"DELETE FROM devices WHERE id = ?\")\n            .bind(id.to_string())\n            .execute(\u0026self.pool)\n            .await?;\n\n        if result.rows_affected() == 0 {\n            return Err(DeviceRepositoryError::NotFound);\n        }\n\n        Ok(())\n    }\n\n    async fn find_all_descendant_ids(\u0026self, id: Uuid) -\u003e Result\u003cVec\u003cUuid\u003e, DeviceRepositoryError\u003e {\n        let mut descendants = Vec::new();\n        let mut to_process = vec![id];\n\n        while let Some(current_id) = to_process.pop() {\n            let children: Vec\u003cDeviceRow\u003e =\n                sqlx::query_as(\"SELECT * FROM devices WHERE parent_id = ?\")\n                    .bind(current_id.to_string())\n                    .fetch_all(\u0026self.pool)\n                    .await?;\n\n            for child in children {\n                let child_id = Uuid::parse_str(\u0026child.id).unwrap();\n                descendants.push(child_id);\n                to_process.push(child_id);\n            }\n        }\n\n        Ok(descendants)\n    }\n\n    async fn find_children(\u0026self, parent_id: Uuid) -\u003e Result\u003cVec\u003cDevice\u003e, DeviceRepositoryError\u003e {\n        let rows: Vec\u003cDeviceRow\u003e = sqlx::query_as(\"SELECT * FROM devices WHERE parent_id = ?\")\n            .bind(parent_id.to_string())\n            .fetch_all(\u0026self.pool)\n            .await?;\n\n        Ok(rows.into_iter().map(|r| r.to_entity()).collect())\n    }\n}\n","traces":[{"line":59,"address":[19411120],"length":1,"stats":{"Line":0}},{"line":82,"address":[15847408,15849573],"length":1,"stats":{"Line":0}},{"line":84,"address":[15847629,15847450],"length":1,"stats":{"Line":0}},{"line":85,"address":[15847686],"length":1,"stats":{"Line":0}},{"line":86,"address":[15847786],"length":1,"stats":{"Line":0}},{"line":87,"address":[15847855],"length":1,"stats":{"Line":0}},{"line":88,"address":[15847962,15847887],"length":1,"stats":{"Line":0}},{"line":97,"address":[15848311],"length":1,"stats":{"Line":0}},{"line":100,"address":[15848380],"length":1,"stats":{"Line":0}},{"line":101,"address":[15848418],"length":1,"stats":{"Line":0}},{"line":102,"address":[15848456],"length":1,"stats":{"Line":0}},{"line":103,"address":[15848494,15848569],"length":1,"stats":{"Line":0}},{"line":108,"address":[15848697],"length":1,"stats":{"Line":0}},{"line":111,"address":[15848817],"length":1,"stats":{"Line":0}},{"line":118,"address":[15847216],"length":1,"stats":{"Line":0}},{"line":119,"address":[19411271],"length":1,"stats":{"Line":0}},{"line":120,"address":[15847254],"length":1,"stats":{"Line":0}},{"line":121,"address":[15847277],"length":1,"stats":{"Line":0}},{"line":122,"address":[15847300],"length":1,"stats":{"Line":0}},{"line":123,"address":[15847323],"length":1,"stats":{"Line":0}},{"line":124,"address":[15847346],"length":1,"stats":{"Line":0}},{"line":125,"address":[19411417],"length":1,"stats":{"Line":0}},{"line":129,"address":[19411136],"length":1,"stats":{"Line":0}},{"line":130,"address":[15847 t\u003cVec\u003cT\u003e, Error\u003e;\n\n    /// 创建实体\n    async fn create(\u0026self, entity: T) -\u003e Result\u003cT, Error\u003e;\n\n    /// 更新实体\n    async fn update(\u0026self, id: Uuid, entity: T) -\u003e Result\u003cT, Error\u003e;\n\n    /// 删除实体\n    async fn delete(\u0026self, id: Uuid) -\u003e Result\u003cu64, Error\u003e;\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","db","repository","point_repo.rs"],"content":"//! 测点仓库模块\n\nuse crate::models::entities::point::{AccessType, DataType, Point, PointStatus};\nuse async_trait::async_trait;\nuse sqlx::{FromRow, SqlitePool};\nuse uuid::Uuid;\n\n/// 仓库错误类型\n#[derive(Debug, thiserror::Error)]\npub enum PointRepositoryError {\n    #[error(\"Database error: {0}\")]\n    Database(#[from] sqlx::Error),\n\n    #[error(\"Not found\")]\n    NotFound,\n}\n\n/// 测点仓库 trait\n#[async_trait]\n#[allow(clippy::too_many_arguments)]\npub trait PointRepository: Send + Sync {\n    async fn create(\u0026self, point: \u0026Point) -\u003e Result\u003cPoint, PointRepositoryError\u003e;\n    async fn find_by_id(\u0026self, id: Uuid) -\u003e Result\u003cOption\u003cPoint\u003e, PointRepositoryError\u003e;\n    async fn find_by_device_id(\n        \u0026self,\n        device_id: Uuid,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003c(Vec\u003cPoint\u003e, i64), PointRepositoryError\u003e;\n    async fn update(\n        \u0026self,\n        id: Uuid,\n        name: Option\u003cString\u003e,\n        unit: Option\u003cString\u003e,\n        min_value: Option\u003cf64\u003e,\n        max_value: Option\u003cf64\u003e,\n        default_value: Option\u003cString\u003e,\n        status: Option\u003cPointStatus\u003e,\n    ) -\u003e Result\u003cPoint, PointRepositoryError\u003e;\n    async fn delete(\u0026self, id: Uuid) -\u003e Result\u003c(), PointRepositoryError\u003e;\n    async fn delete_by_device_id(\u0026self, device_id: Uuid) -\u003e Result\u003c(), PointRepositoryError\u003e;\n    async fn find_ids_by_device_id(\n        \u0026self,\n        device_id: Uuid,\n    ) -\u003e Result\u003cVec\u003cUuid\u003e, PointRepositoryError\u003e;\n}\n\n/// SQLx测点仓库实现\n#[derive(Clone)]\npub struct SqlxPointRepository {\n    pool: SqlitePool,\n}\n\nimpl SqlxPointRepository {\n    pub fn new(pool: SqlitePool) -\u003e Self {\n        Self { pool }\n    }\n}\n\n#[derive(Debug, FromRow)]\nstruct PointRow {\n    id: String,\n    device_id: String,\n    name: String,\n    data_type: String,\n    access_type: String,\n    unit: Option\u003cString\u003e,\n    min_value: Option\u003cf64\u003e,\n    max_value: Option\u003cf64\u003e,\n    default_value: Option\u003cString\u003e,\n    status: String,\n    created_at: String,\n    updated_at: String,\n}\n\nimpl PointRow {\n    #[allow(clippy::wrong_self_convention)]\n    fn to_entity(self) -\u003e Point {\n        Point {\n            id: Uuid::parse_str(\u0026self.id).unwrap(),\n            device_id: Uuid::parse_str(\u0026self.device_id).unwrap(),\n            name: self.name,\n            data_type: match self.data_type.as_str() {\n                \"number\" =\u003e DataType::Number,\n                \"integer\" =\u003e DataType::Integer,\n                \"string\" =\u003e DataType::String,\n                \"boolean\" =\u003e DataType::Boolean,\n                _ =\u003e DataType::Number,\n            },\n            access_type: match self.access_type.as_str() {\n                \"ro\" =\u003e AccessType::Ro,\n                \"wo\" =\u003e AccessType::Wo,\n                \"rw\" =\u003e AccessType::Rw,\n                _ =\u003e AccessType::Ro,\n            },\n            unit: self.unit,\n            min_value: self.min_value,\n            max_value: self.max_value,\n            default_value: self.default_value,\n            status: match self.status.as_str() {\n                \"disabled\" =\u003e PointStatus::Disabled,\n                _ =\u003e PointStatus::Active,\n            },\n            metadata: None,\n            created_at: chrono::DateTime::parse_from_rfc3339(\u0026self.created_at)\n                .unwrap()\n                .with_timezone(\u0026chrono::Utc),\n            updated_at: chrono::DateTime::parse_from_rfc3339(\u0026self.updated_at)\n                .unwrap()\n                .with_timezone(\u0026chrono::Utc),\n        }\n    }\n}\n\nfn data_type_to_string(dt: DataType) -\u003e \u0026'static str {\n    match dt {\n        DataType::Number =\u003e \"number\",\n        DataType::Integer =\u003e \"integer\",\n        DataType::String =\u003e \"string\",\n        DataType::Boolean =\u003e \"boolean\",\n    }\n}\n\nfn access_type_to_string(at: AccessType) -\u003e \u0026'static str {\n    match at {\n        AccessType::Ro =\u003e \"ro\",\n        AccessType::Wo =\u003e \"wo\",\n        AccessType::Rw =\u003e \"rw\",\n    }\n}\n\nfn point_status_to_string(status: PointStatus) -\u003e \u0026'static str {\n    match status {\n        PointStatus::Active =\u003e \"active\",\n        PointStatus::Disabled =\u003e \"disabled\",\n    }\n}\n\n#[async_trait]\nimpl PointRepository for SqlxPointRepository {\n    async fn create(\u0026self, point: \u0026Point) -\u003e Result\u003cPoint, PointRepositoryError\u003e {\n        sqlx::query(\n            r#\"\n            INSERT INTO points (id, device_id, name, data_type, access_type, unit, min_value, max_value, default_value, status, created_at, updated_at)\n            VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)\n            \"#,\n        )\n        .bind(point.id.to_string())\n        .bind(point.device_id.to_string())\n        .bind(\u0026point.name)\n        .bind(data_type_to_string(point.data_type))\n        .bind(access_type_to_string(point.access_type))\n        .bind(\u0026point.unit)\n        .bind(point.min_value)\n        .bind(point.max_value)\n        .bind(\u0026point.default_value)\n        .bind(point_status_to_string(point.status))\n        .bind(point.created_at.to_rfc3339())\n        .bind(point.updated_at.to_rfc3339())\n        .execute(\u0026self.pool)\n        .await?;\n\n        Ok(point.clone())\n    }\n\n    async fn find_by_id(\u0026self, id: Uuid) -\u003e Result\u003cOption\u003cPoint\u003e, PointRepositoryError\u003e {\n        let row: Option\u003cPointRow\u003e = sqlx::query_as(\"SELECT * FROM points WHERE id = ?\")\n            .bind(id.to_string())\n            .fetch_optional(\u0026self.pool)\n            .await?;\n\n        Ok(row.map(|r| r.to_entity()))\n    }\n\n    async fn find_by_device_id(\n        \u0026self,\n        device_id: Uuid,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003c(Vec\u003cPoint\u003e, i64), PointRepositoryError\u003e {\n        let offset = (page - 1) * size;\n\n        let count_row: (i64,) = sqlx::query_as(\"SELECT COUNT(*) FROM points WHERE device_id = ?\")\n            .bind(device_id.to_string())\n            .fetch_one(\u0026self.pool)\n            .await?;\n\n        let total = count_row.0;\n\n        let rows: Vec\u003cPointRow\u003e = sqlx::query_as(\n            \"SELECT * FROM points WHERE device_id = ? ORDER BY created_at DESC LIMIT ? OFFSET ?\",\n        )\n        .bind(device_id.to_string())\n        .bind(size)\n        .bind(offset)\n        .fetch_all(\u0026self.pool)\n        .await?;\n\n        let points = rows.into_iter().map(|r| r.to_entity()).collect();\n        Ok((points, total))\n    }\n\n    async fn update(\n        \u0026self,\n        id: Uuid,\n        name: Option\u003cString\u003e,\n        unit: Option\u003cString\u003e,\n        min_value: Option\u003cf64\u003e,\n        max_value: Option\u003cf64\u003e,\n        default_value: Option\u003cString\u003e,\n        status: Option\u003cPointStatus\u003e,\n    ) -\u003e Result\u003cPoint, PointRepositoryError\u003e {\n        let mut updates = Vec::new();\n        let mut values: Vec\u003cString\u003e = Vec::new();\n\n        if let Some(ref n) = name {\n            updates.push(\"name = ?\");\n            values.push(n.clone());\n        }\n        if let Some(ref u) = unit {\n            updates.push(\"unit = ?\");\n            values.push(u.clone());\n        }\n        if let Some(mv) = min_value {\n            updates.push(\"min_value = ?\");\n            values.push(mv.to_string());\n        }\n        if let Some(mv) = max_value {\n            updates.push(\"max_value = ?\");\n            values.push(mv.to_string());\n        }\n        if let Some(ref d) = default_value {\n            updates.push(\"default_value = ?\");\n            values.push(d.clone());\n        }\n        if let Some(st) = status {\n            updates.push(\"status = ?\");\n            values.push(point_status_to_string(st).to_string());\n        }\n\n        if updates.is_empty() {\n            return self\n                .find_by_id(id)\n                .await?\n                .ok_or(PointRepositoryError::NotFound);\n        }\n\n        updates.push(\"updated_at = ?\");\n        values.push(chrono::Utc::now().to_rfc3339());\n\n        let query = format!(\"UPDATE points SET {} WHERE id = ?\", updates.join(\", \"));\n\n        let mut q = sqlx::query(\u0026query);\n        for v in \u0026values {\n            q = q.bind(v);\n        }\n        q = q.bind(id.to_string());\n\n        let result = q.execute(\u0026self.pool).await?;\n\n        if result.rows_affected() == 0 {\n            return Err(PointRepositoryError::NotFound);\n        }\n\n        self.find_by_id(id)\n            .await?\n            .ok_or(PointRepositoryError::NotFound)\n    }\n\n    async fn delete(\u0026self, id: Uuid) -\u003e Result\u003c(), PointRepositoryError\u003e {\n        let result = sqlx::query(\"DELETE FROM points WHERE id = ?\")\n            .bind(id.to_string())\n            .execute(\u0026self.pool)\n            .await?;\n\n        if result.rows_affected() == 0 {\n            return Err(PointRepositoryError::NotFound);\n        }\n\n        Ok(())\n    }\n\n    async fn delete_by_device_id(\u0026self, device_id: Uuid) -\u003e Result\u003c(), PointRepositoryError\u003e {\n        sqlx::query(\"DELETE FROM points WHERE device_id = ?\")\n            .bind(device_id.to_string())\n            .execute(\u0026self.pool)\n            .await?;\n\n        Ok(())\n    }\n\n    async fn find_ids_by_device_id(\n        \u0026self,\n        device_id: Uuid,\n    ) -\u003e Result\u003cVec\u003cUuid\u003e, PointRepositoryError\u003e {\n        let rows: Vec\u003c(String,)\u003e = sqlx::query_as(\"SELECT id FROM points WHERE device_id = ?\")\n            .bind(device_id.to_string())\n            .fetch_all(\u0026self.pool)\n            .await?;\n\n        Ok(rows\n            .into_iter()\n            .map(|(id,)| Uuid::parse_str(\u0026id).unwrap())\n            .collect())\n    }\n}\n","traces":[{"line":55,"address":[16470096],"length":1,"stats":{"Line":0}},{"line":78,"address":[19332448,19334696],"length":1,"stats":{"Line":0}},{"line":80,"address":[16470645,16470506],"length":1,"stats":{"Line":0}},{"line":81,"address":[16470702],"length":1,"stats":{"Line":0}},{"line":82,"address":[16470802],"length":1,"stats":{"Line":0}},{"line":83,"address":[16470921,16470834],"length":1,"stats":{"Line":0}},{"line":90,"address":[16471206],"length":1,"stats":{"Line":0}},{"line":96,"address":[19333416],"length":1,"stats":{"Line":0}},{"line":97,"address":[16471462],"length":1,"stats":{"Line":0}},{"line":98,"address":[16471481],"length":1,"stats":{"Line":0}},{"line":99,"address":[16471501],"length":1,"stats":{"Line":0}},{"line":100,"address":[16471539],"length":1,"stats":{"Line":0}},{"line":105,"address":[19333676,19333754],"length":1,"stats":{"Line":0}},{"line":108,"address":[16471851],"length":1,"stats":{"Line":0}},{"line":115,"address":[16470112],"length":1,"stats":{"Line":0}},{"line":116,"address":[16470119],"length":1,"stats":{"Line":0}},{"line":117,"address":[16470150],"length":1,"stats":{"Line":0}},{"line":118,"address":[16470173],"length":1,"stats":{"Line":0}},{" 906751,18906822,18906799,18906868],"length":1,"stats":{"Line":0}},{"line":298,"address":[18906916],"length":1,"stats":{"Line":0}},{"line":299,"address":[17638903],"length":1,"stats":{"Line":0}},{"line":301,"address":[18540786,18540636],"length":1,"stats":{"Line":0}},{"line":302,"address":[18540692],"length":1,"stats":{"Line":0}},{"line":303,"address":[18540756,18540928,18540946],"length":1,"stats":{"Line":0}},{"line":304,"address":[18540779],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":127},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","db","repository","user_repo.rs"],"content":"//! 用户Repository\n//!\n//! 提供用户实体的数据访问操作\n\nuse crate::db::connection::DbPool;\nuse crate::models::entities::user::{\n    CreateUserRequest, UpdateUserRequest as EntityUpdateUserRequest, User,\n};\nuse crate::services::user::UpdateUserEntity;\nuse chrono::Utc;\nuse sqlx::{Error, Row};\nuse uuid::Uuid;\n\npub struct UserRepository {\n    pool: DbPool,\n}\n\nimpl UserRepository {\n    pub fn new(pool: DbPool) -\u003e Self {\n        Self { pool }\n    }\n\n    /// 根据ID查找用户\n    pub async fn find_by_id(\u0026self, id: Uuid) -\u003e Result\u003cOption\u003cUser\u003e, Error\u003e {\n        let row = sqlx::query(\n            r#\"\n            SELECT id, email, password_hash, username, avatar_url, status, created_at, updated_at\n            FROM users\n            WHERE id = ?\n            \"#,\n        )\n        .bind(id.to_string())\n        .fetch_optional(\u0026self.pool)\n        .await?;\n\n        Ok(row.map(|r| User {\n            id: Uuid::parse_str(r.get::\u003cString, _\u003e(\"id\").as_str()).unwrap_or_default(),\n            email: r.get(\"email\"),\n            password_hash: r.get(\"password_hash\"),\n            username: r.get(\"username\"),\n            avatar_url: r.get(\"avatar_url\"),\n            status: r.get(\"status\"),\n            created_at: r.get(\"created_at\"),\n            updated_at: r.get(\"updated_at\"),\n        }))\n    }\n\n    /// 根据邮箱查找用户\n    pub async fn find_by_email(\u0026self, email: \u0026str) -\u003e Result\u003cOption\u003cUser\u003e, Error\u003e {\n        let row = sqlx::query(\n            r#\"\n            SELECT id, email, password_hash, username, avatar_url, status, created_at, updated_at\n            FROM users\n            WHERE email = ?\n            \"#,\n        )\n        .bind(email)\n        .fetch_optional(\u0026self.pool)\n        .await?;\n\n        Ok(row.map(|r| User {\n            id: Uuid::parse_str(r.get::\u003cString, _\u003e(\"id\").as_str()).unwrap_or_default(),\n            email: r.get(\"email\"),\n            password_hash: r.get(\"password_hash\"),\n            username: r.get(\"username\"),\n            avatar_url: r.get(\"avatar_url\"),\n            status: r.get(\"status\"),\n            created_at: r.get(\"created_at\"),\n            updated_at: r.get(\"updated_at\"),\n        }))\n    }\n\n    /// 查找所有用户\n    pub async fn find_all(\u0026self) -\u003e Result\u003cVec\u003cUser\u003e, Error\u003e {\n        let rows = sqlx::query(\n            r#\"\n            SELECT id, email, password_hash, username, avatar_url, status, created_at, updated_at\n            FROM users\n            ORDER BY created_at DESC\n            \"#,\n        )\n        .fetch_all(\u0026self.pool)\n        .await?;\n\n        Ok(rows\n            .into_iter()\n            .map(|r| User {\n                id: Uuid::parse_str(r.get::\u003cString, _\u003e(\"id\").as_str()).unwrap_or_default(),\n                email: r.get(\"email\"),\n                password_hash: r.get(\"password_hash\"),\n                username: r.get(\"username\"),\n                avatar_url: r.get(\"avatar_url\"),\n                status: r.get(\"status\"),\n                created_at: r.get(\"created_at\"),\n                updated_at: r.get(\"updated_at\"),\n            })\n            .collect())\n    }\n\n    /// 创建用户\n    pub async fn create(\u0026self, req: CreateUserRequest) -\u003e Result\u003cUser, Error\u003e {\n        let user = User::new(req.email, req.password_hash, req.username);\n\n        sqlx::query(\n            r#\"\n            INSERT INTO users (id, email, password_hash, username, avatar_url, status, created_at, updated_at)\n            VALUES (?, ?, ?, ?, ?, ?, ?, ?)\n            \"#,\n        )\n        .bind(user.id.to_string())\n        .bind(\u0026user.email)\n        .bind(\u0026user.password_hash)\n        .bind(\u0026user.username)\n        .bind(\u0026user.avatar_url)\n        .bind(\u0026user.status)\n        .bind(user.created_at)\n        .bind(user.updated_at)\n        .execute(\u0026self.pool)\n        .await?;\n\n        Ok(user)\n    }\n\n    /// 更新用户信息（使用EntityUpdateUserRequest，用于auth模块）\n    pub async fn update(\u0026self, id: Uuid, req: \u0026EntityUpdateUserRequest) -\u003e Result\u003cUser, Error\u003e {\n        let existing = self.find_by_id(id).await?;\n        if existing.is_none() {\n            return Err(Error::RowNotFound);\n        }\n\n        let mut user = existing.unwrap();\n\n        if let Some(username) = \u0026req.username {\n            user.username = Some(username.clone());\n        }\n        if let Some(avatar_url) = \u0026req.avatar_url {\n            user.avatar_url = Some(avatar_url.clone());\n        }\n        if let Some(status) = \u0026req.status {\n            user.status = status.to_string();\n        }\n\n        sqlx::query(\n            r#\"\n            UPDATE users\n            SET username = ?, avatar_url = ?, status = ?\n            WHERE id = ?\n            \"#,\n        )\n        .bind(\u0026user.username)\n        .bind(\u0026user.avatar_url)\n        .bind(\u0026user.status)\n        .bind(id.to_string())\n        .execute(\u0026self.pool)\n        .await?;\n\n        Ok(user)\n    }\n\n    /// 更新用户信息（使用UpdateUserEntity，用于用户服务模块）\n    pub async fn update_with_entity(\n        \u0026self,\n        id: Uuid,\n        updates: \u0026UpdateUserEntity,\n    ) -\u003e Result\u003cUser, Error\u003e {\n        // 检查是否有更新\n        if updates.username.is_none() \u0026\u0026 updates.avatar_url.is_none() {\n            // 没有更新，直接返回当前用户\n            return self.find_by_id(id).await?.ok_or(Error::RowNotFound);\n        }\n\n        let now = Utc::now();\n\n        // 构建更新查询\n        sqlx::query(\n            r#\"\n            UPDATE users\n            SET updated_at = ?, username = COALESCE(?, username), avatar_url = COALESCE(?, avatar_url)\n            WHERE id = ?\n            \"#,\n        )\n        .bind(now)\n        .bind(\u0026updates.username)\n        .bind(\u0026updates.avatar_url)\n        .bind(id.to_string())\n        .execute(\u0026self.pool)\n        .await?;\n\n        // 返回更新后的用户\n        self.find_by_id(id).await?.ok_or(Error::RowNotFound)\n    }\n\n    /// 更新用户密码\n    pub async fn update_password(\u0026self, id: Uuid, password_hash: \u0026str) -\u003e Result\u003c(), Error\u003e {\n        let now = Utc::now();\n        sqlx::query(\n            r#\"\n            UPDATE users\n            SET password_hash = ?, updated_at = ?\n            WHERE id = ?\n            \"#,\n        )\n        .bind(password_hash)\n        .bind(now)\n        .bind(id.to_string())\n        .execute(\u0026self.pool)\n        .await?;\n\n        Ok(())\n    }\n\n    /// 检查用户名是否存在\n    pub async fn exists_by_username(\u0026self, username: \u0026str) -\u003e Result\u003cbool, Error\u003e {\n        let exists: bool =\n            sqlx::query_scalar(\"SELECT EXISTS(SELECT 1 FROM users WHERE username = ?)\")\n                .bind(username)\n                .fetch_one(\u0026self.pool)\n                .await?;\n\n        Ok(exists)\n    }\n\n    /// 检查用户名是否存在（排除指定用户）\n    pub async fn exists_by_username_except_user(\n        \u0026self,\n        username: \u0026str,\n        user_id: Uuid,\n    ) -\u003e Result\u003cbool, Error\u003e {\n        let exists: bool =\n            sqlx::query_scalar(\"SELECT EXISTS(SELECT 1 FROM users WHERE username = ? AND id != ?)\")\n                .bind(username)\n                .bind(user_id.to_string())\n                .fetch_one(\u0026self.pool)\n                .await?;\n\n        Ok(exists)\n    }\n\n    /// 删除用户\n    pub async fn delete(\u0026self, id: Uuid) -\u003e Result\u003cu64, Error\u003e {\n        let result = sqlx::query(\"DELETE FROM users WHERE id = ?\")\n            .bind(id.to_string())\n            .execute(\u0026self.pool)\n            .await?;\n\n        Ok(result.rows_affected())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::db::connection::init_db;\n    use crate::services::user::UpdateUserEntity;\n\n    #[tokio::test]\n    async fn test_user_repository() {\n        // 使用唯一的数据库URL避免测试冲突\n        let db_id = uuid::Uuid::new_v4().to_string();\n        let pool = init_db(\u0026format!(\"sqlite:file:{}?mode=memory\u0026cache=shared\", db_id))\n            .await\n            .unwrap();\n        let repo = UserRepository::new(pool);\n\n        // 创建用户\n        let req = CreateUserRequest {\n            email: \"test@example.com\".to_string(),\n            password_hash: \"hashed_password\".to_string(),\n            username: Some(\"Test User\".to_string()),\n        };\n\n        let user = repo.create(req).await.unwrap();\n        assert_eq!(user.email, \"test@example.com\");\n\n        // 查找用户\n        let found = repo.find_by_id(user.id).await.unwrap();\n        assert!(found.is_some());\n        assert_eq!(found.unwrap().email, \"test@example.com\");\n\n        // 更新用户\n        let update_req = UpdateUserEntity {\n            username: Some(\"Updated Name\".to_string()),\n            avatar_url: None,\n        };\n        let updated = repo.update_with_entity(user.id, \u0026update_req).await.unwrap();\n        assert_eq!(updated.username, Some(\"Updated Name\".to_string()));\n\n        // 删除用户\n        let deleted = repo.delete(user.id).await.unwrap();\n        assert_eq!(deleted, 1);\n\n        let not_found = repo.find_by_id(user.id).await.unwrap();\n        assert!(not_found.is_none());\n    }\n\n    #[tokio::test]\n    async fn test_exists_by_username() {\n        let db_id = uuid::Uuid::new_v4().to_string();\n        let pool = init_db(\u0026format!(\"sqlite:file:{}?mode=memory\u0026cache=shared\", db_id))\n            .await\n            .unwrap();\n        let repo = UserRepository::new(pool);\n\n        // 创建用户\n        let req = CreateUserRequest {\n            email: \"test@example.com\".to_string(),\n            password_hash: \"hashed_password\".to_string(),\n            username: Some(\"uniqueuser\".to_string()),\n        };\n        let user = repo.create(req).await.unwrap();\n\n        // 检查用户名存在\n        let exists = repo.exists_by_username(\"uniqueuser\").await.unwrap();\n        assert!(exists);\n\n        // 检查不存在的用户名\n        let exists = repo.exists_by_username(\"nonexistent\").await.unwrap();\n        assert!(!exists);\n\n        // 检查用户名排除自身\n        let exists = repo\n            .exists_by_username_except_user(\"uniqueuser\", user.id)\n            .await\n            .unwrap();\n        assert!(!exists);\n\n        // 创建另一个用户使用相同用户名\n        let req2 = CreateUserRequest {\n            email: \"test2@example.com\".to_string(),\n            password_hash: \"hashed_password\".to_string(),\n            username: Some(\"uniqueuser\".to_string()),\n        };\n        let _ = repo.create(req2).await.unwrap();\n\n        // 现在检查应该返回true\n        let exists = repo\n            .exists_by_username_except_user(\"uniqueuser\", user.id)\n            .await\n            .unwrap();\n        assert!(exists);\n    }\n}\n","traces":[{"line":19,"address":[16428000],"length":1,"stats":{"Line":2}},{"line":24,"address":[18423472,18423480],"length":1,"stats":{"Line":4}},{"line":32,"address":[15552035,15551964,15552012,15552105,15552271],"length":1,"stats":{"Line":2}},{"line":33,"address":[15552141],"length":1,"stats":{"Line":1}},{"line":34,"address":[17055588],"length":1,"stats":{"Line": tus};\nuse async_trait::async_trait;\nuse sqlx::{FromRow, SqlitePool};\nuse uuid::Uuid;\n\n/// 仓库错误类型\n#[derive(Debug, thiserror::Error)]\npub enum WorkbenchRepositoryError {\n    #[error(\"Database error: {0}\")]\n    Database(#[from] sqlx::Error),\n\n    #[error(\"Not found\")]\n    NotFound,\n}\n\n/// 工作台仓库 trait\n#[async_trait]\npub trait WorkbenchRepository: Send + Sync {\n    async fn create(\u0026self, workbench: \u0026Workbench) -\u003e Result\u003cWorkbench, WorkbenchRepositoryError\u003e;\n    async fn find_by_id(\u0026self, id: Uuid) -\u003e Result\u003cOption\u003cWorkbench\u003e, WorkbenchRepositoryError\u003e;\n    async fn list_by_owner(\n        \u0026self,\n        owner_id: Uuid,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003c(Vec\u003cWorkbench\u003e, i64), WorkbenchRepositoryError\u003e;\n    async fn update(\n        \u0026self,\n        id: Uuid,\n        name: Option\u003cString\u003e,\n        description: Option\u003cString\u003e,\n        status: Option\u003cWorkbenchStatus\u003e,\n    ) -\u003e Result\u003cWorkbench, WorkbenchRepositoryError\u003e;\n    async fn delete(\u0026self, id: Uuid) -\u003e Result\u003c(), WorkbenchRepositoryError\u003e;\n}\n\n/// SQLx工作台仓库实现\n#[derive(Clone)]\npub struct SqlxWorkbenchRepository {\n    pool: SqlitePool,\n}\n\nimpl SqlxWorkbenchRepository {\n    pub fn new(pool: SqlitePool) -\u003e Self {\n        Self { pool }\n    }\n}\n\n#[derive(Debug, FromRow)]\nstruct WorkbenchRow {\n    id: String,\n    name: String,\n    description: Option\u003cString\u003e,\n    owner_type: String,\n    owner_id: String,\n    status: String,\n    created_at: String,\n    updated_at: String,\n}\n\nimpl WorkbenchRow {\n    #[allow(clippy::wrong_self_convention)]\n    fn to_entity(self) -\u003e Workbench {\n        Workbench {\n            id: Uuid::parse_str(\u0026self.id).unwrap(),\n            name: self.name,\n            description: self.description,\n            owner_type: match self.owner_type.as_str() {\n                \"team\" =\u003e OwnerType::Team,\n                _ =\u003e OwnerType::User,\n            },\n            owner_id: Uuid::parse_str(\u0026self.owner_id).unwrap(),\n            status: match self.status.as_str() {\n                \"archived\" =\u003e WorkbenchStatus::Archived,\n                \"deleted\" =\u003e WorkbenchStatus::Deleted,\n                _ =\u003e WorkbenchStatus::Active,\n            },\n            created_at: chrono::DateTime::parse_from_rfc3339(\u0026self.created_at)\n                .unwrap()\n                .with_timezone(\u0026chrono::Utc),\n            updated_at: chrono::DateTime::parse_from_rfc3339(\u0026self.updated_at)\n                .unwrap()\n                .with_timezone(\u0026chrono::Utc),\n        }\n    }\n}\n\n#[async_trait]\nimpl WorkbenchRepository for SqlxWorkbenchRepository {\n    async fn create(\u0026self, workbench: \u0026Workbench) -\u003e Result\u003cWorkbench, WorkbenchRepositoryError\u003e {\n        let owner_type = match workbench.owner_type {\n            OwnerType::User =\u003e \"user\",\n            OwnerType::Team =\u003e \"team\",\n        };\n        let status = match workbench.status {\n            WorkbenchStatus::Active =\u003e \"active\",\n            WorkbenchStatus::Archived =\u003e \"archived\",\n            WorkbenchStatus::Deleted =\u003e \"deleted\",\n        };\n\n        sqlx::query(\n            r#\"\n            INSERT INTO workbenches (id, name, description, owner_type, owner_id, status, created_at, updated_at)\n            VALUES (?, ?, ?, ?, ?, ?, ?, ?)\n            \"#,\n        )\n        .bind(workbench.id.to_string())\n        .bind(\u0026workbench.name)\n        .bind(\u0026workbench.description)\n        .bind(owner_type)\n        .bind(workbench.owner_id.to_string())\n        .bind(status)\n        .bind(workbench.created_at.to_rfc3339())\n        .bind(workbench.updated_at.to_rfc3339())\n        .execute(\u0026self.pool)\n        .await?;\n\n        Ok(workbench.clone())\n    }\n\n    async fn find_by_id(\u0026self, id: Uuid) -\u003e Result\u003cOption\u003cWorkbench\u003e, WorkbenchRepositoryError\u003e {\n        let row: Option\u003cWorkbenchRow\u003e =\n            sqlx::query_as(\"SELECT * FROM workbenches WHERE id = ? AND status != 'deleted'\")\n                .bind(id.to_string())\n                .fetch_optional(\u0026self.pool)\n                .await?;\n\n        Ok(row.map(|r| r.to_entity()))\n    }\n\n    async fn list_by_owner(\n        \u0026self,\n        owner_id: Uuid,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003c(Vec\u003cWorkbench\u003e, i64), WorkbenchRepositoryError\u003e {\n        let offset = (page - 1) * size;\n\n        // Get total count\n        let count_row: (i64,) = sqlx::query_as(\n            \"SELECT COUNT(*) FROM workbenches WHERE owner_id = ? AND status != 'deleted'\",\n        )\n        .bind(owner_id.to_string())\n        .fetch_one(\u0026self.pool)\n        .await?;\n\n        let total = count_row.0;\n\n        // Get items\n        let rows: Vec\u003cWorkbenchRow\u003e = sqlx::query_as(\n            \"SELECT * FROM workbenches WHERE owner_id = ? AND status != 'deleted' ORDER BY created_at DESC LIMIT ? OFFSET ?\"\n        )\n        .bind(owner_id.to_string())\n        .bind(size)\n        .bind(offset)\n        .fetch_all(\u0026self.pool)\n        .await?;\n\n        let workbenches = rows.into_iter().map(|r| r.to_entity()).collect();\n        Ok((workbenches, total))\n    }\n\n    async fn update(\n        \u0026self,\n        id: Uuid,\n        name: Option\u003cString\u003e,\n        description: Option\u003cString\u003e,\n        status: Option\u003cWorkbenchStatus\u003e,\n    ) -\u003e Result\u003cWorkbench, WorkbenchRepositoryError\u003e {\n        // Build dynamic update query\n        let mut updates = Vec::new();\n        let mut values: Vec\u003cString\u003e = Vec::new();\n\n        if let Some(ref n) = name {\n            updates.push(\"name = ?\");\n            values.push(n.clone());\n        }\n        if let Some(ref d) = description {\n            updates.push(\"description = ?\");\n            values.push(d.clone());\n        }\n        if let Some(s) = status {\n            let status_str = match s {\n                WorkbenchStatus::Active =\u003e \"active\",\n                WorkbenchStatus::Archived =\u003e \"archived\",\n                WorkbenchStatus::Deleted =\u003e \"deleted\",\n            };\n            updates.push(\"status = ?\");\n            values.push(status_str.to_string());\n        }\n\n        if updates.is_empty() {\n            // No updates, just return the current workbench\n            return self\n                .find_by_id(id)\n                .await?\n                .ok_or(WorkbenchRepositoryError::NotFound);\n        }\n\n        updates.push(\"updated_at = ?\");\n        values.push(chrono::Utc::now().to_rfc3339());\n\n        let query = format!(\n            \"UPDATE workbenches SET {} WHERE id = ? AND status != 'deleted'\",\n            updates.join(\", \")\n        );\n\n        let mut q = sqlx::query(\u0026query);\n        for v in \u0026values {\n            q = q.bind(v);\n        }\n        q = q.bind(id.to_string());\n\n        let result = q.execute(\u0026self.pool).await?;\n\n        if result.rows_affected() == 0 {\n            return Err(WorkbenchRepositoryError::NotFound);\n        }\n\n        self.find_by_id(id)\n            .await?\n            .ok_or(WorkbenchRepositoryError::NotFound)\n    }\n\n    async fn delete(\u0026self, id: Uuid) -\u003e Result\u003c(), WorkbenchRepositoryError\u003e {\n        // First check if workbench exists and is not already deleted\n        let workbench = self.find_by_id(id).await?;\n        if workbench.is_none() {\n            return Err(WorkbenchRepositoryError::NotFound);\n        }\n\n        // Hard delete - cascade will handle device/point deletion via FK CASCADE\n        // S1-003 schema defines:\n        // - devices.workbench_id REFERENCES workbenches(id) ON DELETE CASCADE\n        // - points.device_id REFERENCES devices(id) ON DELETE CASCADE\n        // - devices.parent_id REFERENCES devices(id) ON DELETE CASCADE\n        sqlx::query(\"DELETE FROM workbenches WHERE id = ?\")\n            .bind(id.to_string())\n            .execute(\u0026self.pool)\n            .await?;\n\n        Ok(())\n    }\n}\n","traces":[{"line":46,"address":[16949136],"length":1,"stats":{"Line":0}},{"line":65,"address":[18149936,18151312],"length":1,"stats":{"Line":0}},{"line":67,"address":[16947588,16947700],"length":1,"stats":{"Line":0}},{"line":68,"address":[16947754],"length":1,"stats":{"Line":0}},{"line":69,"address":[16947786],"length":1,"stats":{"Line":0}},{"line":70,"address":[16947824],"length":1,"stats":{"Line":0}},{"line":74,"address":[16947955],"length":1,"stats":{"Line":0}},{"line":75,"address":[16948040],"length":1,"stats":{"Line":0}},{"line":80,"address":[16948196],"length":1,"stats":{"Line":0}},{"line":83,"address":[16948313],"length":1,"stats":{"Line":0}},{"line":92,"address":[18151758],"length":1,"stats":{"Line":0}},{"line":93,"address":[15536587],"length":1,"stats":{"Line":0}},{"line":94,"address":[15536683],"length":1,"stats":{"Line":0}},{"line":95,"address":[15536654],"length":1,"stats":{"Line":0}},{"line":97,"address":[19023675],"length":1,"stats":{"Line":0}},{"line":98,"address":[15536750],"length":1,"stats":{"Line":0}},{"line":99,"address":[15536779],"length":1,"stats":{"Line":0}},{"line":100,"address":[15536808],"length":1,"stats":{"Line":0}},{"line":109,"address":[15536914,15537011,15537847,15536941,15536866],"length":1,"stats":{"Line":0}},{"line":110,"address":[19023995],"length":1,"stats":{"Line":0}},{"line":111,"address":[19024066],"length":1,"stats":{"Line":0}},{"line":112,"address":[19024101],"length":1,"stats":{"Line":0}},{"line":113,"address":[19024184,19024233,19024026,19024157,19024832],"length":1,"stats":{"Line":0}},{"line":114,"address":[15537300,1553738  \"String\",\n            PointValue::Boolean(_) =\u003e \"Boolean\",\n        }\n    }\n\n    /// 转换为 f64（如果可能）\n    pub fn to_f64(\u0026self) -\u003e Option\u003cf64\u003e {\n        match self {\n            PointValue::Number(n) =\u003e Some(*n),\n            PointValue::Integer(n) =\u003e Some(*n as f64),\n            PointValue::Boolean(b) =\u003e Some(if *b { 1.0 } else { 0.0 }),\n            PointValue::String(_) =\u003e None,\n        }\n    }\n}\n\n/// 虚拟设备的数据生成模式\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Default, Serialize, Deserialize)]\npub enum VirtualMode {\n    /// 随机数据模式\n    #[default]\n    Random,\n    /// 固定值模式\n    Fixed,\n    /// 正弦波模式\n    Sine,\n    /// 斜坡（线性递增）模式\n    Ramp,\n}\n\n/// 支持的数据类型\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Default, Serialize, Deserialize)]\npub enum DataType {\n    /// 浮点数（默认）\n    #[default]\n    Number,\n    /// 整数\n    Integer,\n    /// 字符串\n    String,\n    /// 布尔值\n    Boolean,\n}\n\n/// 测点访问类型\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Default, Serialize, Deserialize)]\npub enum AccessType {\n    /// 只读\n    #[default]\n    RO,\n    /// 只写\n    WO,\n    /// 读写\n    RW,\n}\n\n/// 设备驱动统一接口\n///\n/// 所有设备驱动必须实现此trait，提供标准化的连接、读写接口。\n/// 使用依赖倒置原则，使业务逻辑与具体驱动实现解耦。\n#[async_trait]\npub trait DeviceDriver: Send + Sync {\n    /// 驱动配置类型\n    type Config: Send + Sync;\n    /// 驱动错误类型\n    type Error: Send + Sync + std::fmt::Debug + std::fmt::Display + From\u003cDriverError\u003e;\n\n    /// 连接到设备\n    async fn connect(\u0026mut self) -\u003e Result\u003c(), Self::Error\u003e;\n\n    /// 断开设备连接\n    async fn disconnect(\u0026mut self) -\u003e Result\u003c(), Self::Error\u003e;\n\n    /// 读取测点值\n    ///\n    /// # Arguments\n    /// * `point_id` - 测点UUID\n    ///\n    /// # Returns\n    /// * `Ok(PointValue)` - 读取成功\n    /// * `Err(DriverError::NotConnected)` - 设备未连接\n    fn read_point(\u0026self, point_id: Uuid) -\u003e Result\u003cPointValue, Self::Error\u003e;\n\n    /// 写入测点值\n    ///\n    /// # Arguments\n    /// * `point_id` - 测点UUID\n    /// * `value` - 要写入的值\n    fn write_point(\u0026self, point_id: Uuid, value: PointValue) -\u003e Result\u003c(), Self::Error\u003e;\n\n    /// 检查设备是否已连接\n    fn is_connected(\u0026self) -\u003e bool;\n}\n","traces":[{"line":24,"address":[18920048],"length":1,"stats":{"Line":0}},{"line":25,"address":[17083989],"length":1,"stats":{"Line":0}},{"line":26,"address":[17084048],"length":1,"stats":{"Line":0}},{"line":27,"address":[17084071],"length":1,"stats":{"Line":0}},{"line":28,"address":[17084094],"length":1,"stats":{"Line":0}},{"line":29,"address":[17084117],"length":1,"stats":{"Line":0}},{"line":34,"address":[17083648],"length":1,"stats":{"Line":0}},{"line":35,"address":[17083658],"length":1,"stats":{"Line":0}},{"line":36,"address":[17083722],"length":1,"stats":{"Line":0}},{"line":37,"address":[17083761],"length":1,"stats":{"Line":0}},{"line":38,"address":[17083844,17083812],"length":1,"stats":{"Line":0}},{"line":39,"address":[17083796],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":12},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","drivers","error.rs"],"content":"//! 设备驱动错误类型定义\n\nuse std::time::Duration;\n\n/// 设备驱动错误类型\n#[derive(Debug, Clone)]\npub enum DriverError {\n    /// 设备未连接\n    NotConnected,\n    /// 设备已连接（重复连接）\n    AlreadyConnected,\n    /// 操作超时\n    Timeout { duration: Duration },\n    /// 无效的值\n    InvalidValue { message: String },\n    /// 尝试写入只读测点\n    ReadOnlyPoint,\n    /// 配置错误\n    ConfigError(String),\n    /// IO错误\n    IoError(String),\n}\n\nimpl std::fmt::Display for DriverError {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            DriverError::NotConnected =\u003e write!(f, \"Device not connected\"),\n            DriverError::AlreadyConnected =\u003e write!(f, \"Device already connected\"),\n            DriverError::Timeout { duration } =\u003e {\n                write!(f, \"Operation timeout after {:?}\", duration)\n            }\n            DriverError::InvalidValue { message } =\u003e write!(f, \"Invalid value: {}\", message),\n            DriverError::ReadOnlyPoint =\u003e write!(f, \"Cannot write to read-only point\"),\n            DriverError::ConfigError(msg) =\u003e write!(f, \"Configuration error: {}\", msg),\n            DriverError::IoError(msg) =\u003e write!(f, \"IO error: {}\", msg),\n        }\n    }\n}\n\nimpl std::error::Error for DriverError {}\n\nimpl From\u003cstd::io::Error\u003e for DriverError {\n    fn from(err: std::io::Error) -\u003e Self {\n        DriverError::IoError(err.to_string())\n    }\n}\n\n/// VirtualConfig 验证错误\n#[derive(Debug, Clone)]\npub enum VirtualConfigError {\n    /// 无效的范围（min \u003e= max）\n    InvalidRange { min: f64, max: f64 },\n}\n\nimpl std::fmt::Display for VirtualConfigError {\n    fn fmt(\u0026self, f: \u0026mut std::fmt::Formatter\u003c'_\u003e) -\u003e std::fmt::Result {\n        match self {\n            VirtualConfigError::InvalidRange { min, max } =\u003e {\n                write!(f, \"Invalid range: min ({}) \u003e= max ({})\", min, max)\n            }\n        }\n    }\n}\n\nimpl std::error::Error for VirtualConfigError {}\n\nimpl From\u003cVirtualConfigError\u003e for DriverError {\n    fn from(err: VirtualConfigError) -\u003e Self {\n        DriverError::ConfigError(err.to_string())\n    }\n}\n","traces":[{"line":25,"address":[17729760],"length":1,"stats":{"Line":0}},{"line":26,"address":[16458113],"length":1,"stats":{"Line":0}},{"line":27,"address":[16458144],"length":1,"stats":{"Line":0}},{"line":28,"address":[16458185],"length":1,"stats":{"Line":0}},{"line":29,"address":[16458231],"length":1,"stats":{"Line":0}},{"line":30,"address":[16458240],"length":1,"stats":{"Line":0}},{"line":32,"address":[16458335],"length":1,"stats":{"Line":0}},{"line":33,"address":[16458435],"length":1,"stats":{"Line":0}},{"line":34,"address":[16458481],"length":1,"stats":{"Line":0}},{"line":35,"address":[16458601]," D: DeviceDriver\u003cConfig = VirtualConfig, Error = DriverError\u003e + 'static,\n    \u003e(\n        \u0026self,\n        id: Uuid,\n        driver: D,\n    ) -\u003e Result\u003c(), DriverError\u003e {\n        let mut devices = self.devices.write().unwrap();\n        if devices.contains_key(\u0026id) {\n            return Err(DriverError::ConfigError(format!(\n                \"Device {} already registered\",\n                id\n            )));\n        }\n        // 将驱动包装在 RwLock 中以支持可变访问\n        devices.insert(id, Arc::new(RwLock::new(driver)));\n        Ok(())\n    }\n\n    /// 注销设备\n    pub fn unregister_device(\u0026self, id: Uuid) -\u003e Result\u003c(), DriverError\u003e {\n        let mut devices = self.devices.write().unwrap();\n        if devices.remove(\u0026id).is_none() {\n            return Err(DriverError::ConfigError(format!(\"Device {} not found\", id)));\n        }\n        Ok(())\n    }\n\n    /// 获取设备驱动引用\n    ///\n    /// 返回 `Arc\u003cRwLock\u003cdyn DeviceDriver\u003e\u003e` 以允许调用者获取可变访问权限。\n    /// 使用者需要通过锁来调用 `connect()` 或 `disconnect()` 等需要 `\u0026mut self` 的方法。\n    ///\n    /// # Example\n    /// ```ignore\n    /// if let Some(driver_lock) = manager.get_device(id) {\n    ///     let mut driver = driver_lock.write().unwrap();\n    ///     driver.connect().await?;\n    /// }\n    /// ```\n    pub fn get_device(\n        \u0026self,\n        id: Uuid,\n    ) -\u003e Option\u003cArc\u003cRwLock\u003cdyn DeviceDriver\u003cConfig = VirtualConfig, Error = DriverError\u003e\u003e\u003e\u003e {\n        let devices = self.devices.read().unwrap();\n        devices.get(\u0026id).cloned()\n    }\n\n    /// 连接所有已注册设备\n    ///\n    /// 遍历所有已注册的设备并尝试连接它们。\n    /// 使用 `join_all` 并行执行所有连接操作。\n    pub async fn connect_all(\u0026self) -\u003e Vec\u003cResult\u003cUuid, (Uuid, DriverError)\u003e\u003e {\n        let device_locks: Vec\u003c_\u003e = {\n            let devices = self.devices.read().unwrap();\n            devices\n                .iter()\n                .map(|(id, driver_lock)| (*id, Arc::clone(driver_lock)))\n                .collect()\n        };\n\n        let futures = device_locks.into_iter().map(\n            |(id, driver_lock): (\n                Uuid,\n                Arc\u003cRwLock\u003cdyn DeviceDriver\u003cConfig = VirtualConfig, Error = DriverError\u003e\u003e\u003e,\n            )| async move {\n                // 获取可变访问权限\n                let mut driver = driver_lock.write().unwrap();\n                match driver.connect().await {\n                    Ok(()) =\u003e Ok(id),\n                    Err(e) =\u003e Err((id, e)),\n                }\n            },\n        );\n\n        join_all(futures).await\n    }\n\n    /// 断开所有设备连接\n    ///\n    /// 遍历所有已注册的设备并断开连接。\n    /// 使用 `join_all` 并行执行所有断开操作。\n    pub async fn disconnect_all(\u0026self) -\u003e Vec\u003cResult\u003cUuid, (Uuid, DriverError)\u003e\u003e {\n        let device_locks: Vec\u003c_\u003e = {\n            let devices = self.devices.read().unwrap();\n            devices\n                .iter()\n                .map(|(id, driver_lock)| (*id, Arc::clone(driver_lock)))\n                .collect()\n        };\n\n        let futures = device_locks.into_iter().map(\n            |(id, driver_lock): (\n                Uuid,\n                Arc\u003cRwLock\u003cdyn DeviceDriver\u003cConfig = VirtualConfig, Error = DriverError\u003e\u003e\u003e,\n            )| async move {\n                // 获取可变访问权限\n                let mut driver = driver_lock.write().unwrap();\n                match driver.disconnect().await {\n                    Ok(()) =\u003e Ok(id),\n                    Err(e) =\u003e Err((id, e)),\n                }\n            },\n        );\n\n        join_all(futures).await\n    }\n\n    /// 获取已注册设备数量\n    pub fn device_count(\u0026self) -\u003e usize {\n        self.devices.read().unwrap().len()\n    }\n}\n\nimpl Default for DeviceManager {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n","tra
