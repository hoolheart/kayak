iceDriver, DriverError, PointValue, VirtualConfigError, VirtualMode,\n};\n\n/// 虚拟设备驱动配置\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct VirtualConfig {\n    /// 数据生成模式\n    pub mode: VirtualMode,\n    /// 数据类型\n    pub data_type: DataType,\n    /// 访问类型\n    pub access_type: AccessType,\n    /// 随机值下界（包含）\n    pub min_value: f64,\n    /// 随机值上界（不包含）\n    pub max_value: f64,\n    /// 固定值（Fixed模式下使用）\n    pub fixed_value: PointValue,\n    /// 采样间隔（毫秒）\n    pub sample_interval_ms: u64,\n}\n\nimpl Default for VirtualConfig {\n    fn default() -\u003e Self {\n        Self {\n            mode: VirtualMode::Random,\n            data_type: DataType::Number,\n            access_type: AccessType::RO,\n            min_value: 0.0,\n            max_value: 100.0,\n            fixed_value: PointValue::Number(0.0),\n            sample_interval_ms: 1000,\n        }\n    }\n}\n\nimpl VirtualConfig {\n    /// 验证配置有效性（静态方法）\n    pub fn validate(config: \u0026VirtualConfig) -\u003e Result\u003c(), VirtualConfigError\u003e {\n        if config.min_value \u003e= config.max_value {\n            return Err(VirtualConfigError::InvalidRange {\n                min: config.min_value,\n                max: config.max_value,\n            });\n        }\n        Ok(())\n    }\n\n    /// 验证配置有效性（实例方法）\n    pub fn validate_self(\u0026self) -\u003e Result\u003c(), VirtualConfigError\u003e {\n        Self::validate(self)\n    }\n}\n\n/// 虚拟设备驱动\n///\n/// 用于测试和模拟环境，支持多种数据生成模式。\npub struct VirtualDriver {\n    config: VirtualConfig,\n    connected: bool,\n    /// 存储RW测点的用户写入值（使用Arc\u003cMutex\u003c...\u003e\u003e提供Interior Mutability）\n    point_values: Arc\u003cMutex\u003cHashMap\u003cUuid, PointValue\u003e\u003e\u003e,\n    /// 用于生成随机数\n    rng: Arc\u003cRwLock\u003crand::rngs::StdRng\u003e\u003e,\n    /// Sine/Ramp模式的起始时间\n    start_time: Arc\u003cRwLock\u003cstd::time::Instant\u003e\u003e,\n}\n\n// Standalone unsafe impl blocks for Send + Sync\n// VirtualDriver contains Arc\u003cRwLock\u003c...\u003e\u003e which is Send + Sync when inner types are\nunsafe impl Send for VirtualDriver {}\nunsafe impl Sync for VirtualDriver {}\n\nimpl Default for VirtualDriver {\n    fn default() -\u003e Self {\n        Self::new()\n    }\n}\n\nimpl VirtualDriver {\n    /// 使用默认配置创建新驱动\n    pub fn new() -\u003e Self {\n        Self {\n            config: VirtualConfig::default(),\n            connected: false,\n            point_values: Arc::new(Mutex::new(HashMap::new())),\n            rng: Arc::new(RwLock::new(rand::rngs::StdRng::from_entropy())),\n            start_time: Arc::new(RwLock::new(std::time::Instant::now())),\n        }\n    }\n\n    /// 使用指定配置创建驱动\n    pub fn with_config(config: VirtualConfig) -\u003e Result\u003cSelf, VirtualConfigError\u003e {\n        VirtualConfig::validate(\u0026config)?;\n        Ok(Self {\n            config,\n            connected: false,\n            point_values: Arc::new(Mutex::new(HashMap::new())),\n            rng: Arc::new(RwLock::new(rand::rngs::StdRng::from_entropy())),\n            start_time: Arc::new(RwLock::new(std::time::Instant::now())),\n        })\n    }\n\n    /// 获取当前配置引用\n    pub fn get_config(\u0026self) -\u003e \u0026VirtualConfig {\n        \u0026self.config\n    }\n\n    /// 根据模式生成值\n    fn generate_value(\u0026self) -\u003e PointValue {\n        match self.config.mode {\n            VirtualMode::Random =\u003e self.generate_random(),\n            VirtualMode::Fixed =\u003e self.config.fixed_value.clone(),\n            VirtualMode::Sine =\u003e self.generate_sine(),\n            VirtualMode::Ramp =\u003e self.generate_ramp(),\n        }\n    }\n\n    /// 生成随机值\n    fn generate_random(\u0026self) -\u003e PointValue {\n        let mut rng = self.rng.write().unwrap();\n        match self.config.data_type {\n            DataType::Number =\u003e {\n                let r: f64 = rng.gen_range(self.config.min_value..self.config.max_value);\n                PointValue::Number(r)\n            }\n            DataType::Integer =\u003e {\n                let min_i = self.config.min_value as i64;\n                let max_i = self.config.max_value as i64;\n                let r: i64 = rng.gen_range(min_i..max_i);\n                PointValue::Integer(r)\n            }\n            DataType::String =\u003e {\n                // 生成随机字符串\n                let len: usize = rng.gen_range(4..12);\n                let chars: String = (0..len)\n                    .map(|_| {\n                        let idx = rng.gen_range(0..26);\n                        (b'a' + idx) as char\n                    })\n                    .collect();\n                PointValue::String(chars)\n            }\n            DataType::Boolean =\u003e {\n                let r: bool = rng.gen();\n                PointValue::Boolean(r)\n            }\n        }\n    }\n\n    /// 生成正弦波值\n    fn generate_sine(\u0026self) -\u003e PointValue {\n        let start = *self.start_time.read().unwrap();\n        let elapsed = start.elapsed().as_secs_f64();\n        let period = 2.0 * std::f64::consts::PI;\n        let normalized = (elapsed * period / 10.0).sin(); // 10秒一个周期\n        let value = normalized * (self.config.max_value - self.config.min_value) / 2.0\n            + (self.config.max_value + self.config.min_value) / 2.0;\n        PointValue::Number(value)\n    }\n\n    /// 生成斜坡值（线性递增，到达最大值后重置）\n    fn generate_ramp(\u0026self) -\u003e PointValue {\n        let start = *self.start_time.read().unwrap();\n        let elapsed = start.elapsed().as_secs_f64();\n        let range = self.config.max_value - self.config.min_value;\n        let period = 10.0; // 10秒一个周期\n        let value = (elapsed % period) / period * range + self.config.min_value;\n        PointValue::Number(value)\n    }\n}\n\n#[async_trait]\nimpl DeviceDriver for VirtualDriver {\n    type Config = VirtualConfig;\n    type Error = DriverError;\n\n    async fn connect(\u0026mut self) -\u003e Result\u003c(), Self::Error\u003e {\n        if self.connected {\n            // 重复连接视为成功（幂等操作）\n            return Ok(());\n        }\n        self.connected = true;\n        *self.start_time.write().unwrap() = std::time::Instant::now();\n        Ok(())\n    }\n\n    async fn disconnect(\u0026mut self) -\u003e Result\u003c(), Self::Error\u003e {\n        self.connected = false;\n        Ok(())\n    }\n\n    fn read_point(\u0026self, point_id: Uuid) -\u003e Result\u003cPointValue, Self::Error\u003e {\n        if !self.connected {\n            return Err(DriverError::NotConnected);\n        }\n\n        // 如果是RW测点且有用户写入的值，返回写入的值\n        let point_values = self.point_values.lock().unwrap();\n        if let Some(value) = point_values.get(\u0026point_id) {\n            return Ok(value.clone());\n        }\n\n        Ok(self.generate_value())\n    }\n\n    fn write_point(\u0026self, point_id: Uuid, value: PointValue) -\u003e Result\u003c(), Self::Error\u003e {\n        if !self.connected {\n            return Err(DriverError::NotConnected);\n        }\n\n        if self.config.access_type == AccessType::RO {\n            return Err(DriverError::ReadOnlyPoint);\n        }\n\n        // 类型检查\n        match (\u0026self.config.data_type, \u0026value) {\n            (DataType::Number, PointValue::Number(_)) =\u003e {}\n            (DataType::Number, PointValue::Integer(n)) =\u003e {\n                let mut point_values = self.point_values.lock().unwrap();\n                point_values.insert(point_id, PointValue::Number(*n as f64));\n                return Ok(());\n            }\n            (DataType::Integer, PointValue::Integer(_)) =\u003e {}\n            (DataType::String, PointValue::String(_)) =\u003e {}\n            (DataType::Boolean, PointValue::Boolean(_)) =\u003e {}\n            _ =\u003e {\n                return Err(DriverError::InvalidValue {\n                    message: format!(\n                        \"Type mismatch: expected {:?}, got {:?}\",\n                        self.config.data_type, value\n                    ),\n                });\n            }\n        }\n\n        let mut point_values = self.point_values.lock().unwrap();\n        point_values.insert(point_id, value);\n        Ok(())\n    }\n\n    fn is_connected(\u0026self) -\u003e bool {\n        self.connected\n    }\n}\n","traces":[{"line":34,"address":[18205168],"length":1,"stats":{"Line":0}},{"line":41,"address":[19258307],"length":1,"stats":{"Line":0}},{"line":49,"address":[18201584],"length":1,"stats":{"Line":0}},{"line":50,"address":[18201604],"length":1,"stats":{"Line":0}},{"line":51,"address":[18201650],"length":1,"stats":{"Line":0}},{"line":52,"address":[18201640],"length":1,"stats":{"Line":0}},{"line":53,"address":[18201645],"length":1,"stats":{"Line":0}},{"line":56,"address":[18201621],"length":1,"stats":{"Line":0}},{"line":60,"address":[18201552],"length":1,"stats":{"Line":0}},{"line":61,"address":[18201569],"length":1,"stats":{"Line":0}},{"line":85,"address":[18205264],"length":1,"stats":{"Line":0}},{"line":86,"address":[18205272],"length":1,"stats":{"Line":0}},{"line":92,"address":[18204462,18204048,18204468],"length":1,"stats":{"Line":0}},{"line":94,"address":[18204070],"length":1,"stats":{"Line":0}},{"line":96,"address":[18204083,18204143],"length":1,"stats":{"Line":0}},{"line":97,"address":[19257348,19257288],"length":1,"stats":{"Line":0}},{"line":98,"address":[18204363,18204289],"length":1,"stats":{"Line":0}},{"line":103,"address":[18201696,18202366,18202384],"length":1,"stats":{"Line":0}},{"line":104,"address":[18201718,18201797],"length":1,"stats":{"Line":0}},{"line":105,"address":[19255237],"length":1,"stats":{"Line":0}},{"line":106,"address":[18201872],"length":1,"stats":{"Line":0}},{"line":108,"address":[18201998,18201935],"length":1,"stats":{"Line":0}},{"line":109,"address":[18202038,18202113],"length":1,"stats":{"Line":0}},{"line":110,"address":[18202153,18202230],"length":1,"stats":{"Line":0}},{"line":115,"address":[18201680],"length":1,"stats":{"Line":0}},{"line":120,"address":[18203184],"le dbusTcp,\n            Some(parent_id),\n        );\n\n        assert_eq!(device.parent_id, Some(parent_id));\n        assert_ne!(device.id, parent_id);\n    }\n\n    // TC-S1-016-03: 验证UUID唯一性\n    #[test]\n    fn test_device_uuid_uniqueness() {\n        let workbench_id = Uuid::new_v4();\n        let device1 = Device::new(\n            workbench_id,\n            \"Device 1\".to_string(),\n            ProtocolType::Virtual,\n            None,\n        );\n        let device2 = Device::new(\n            workbench_id,\n            \"Device 2\".to_string(),\n            ProtocolType::Virtual,\n            None,\n        );\n        assert_ne!(device1.id, device2.id);\n    }\n\n    // TC-S1-016-05: 设备树形结构（三层）测试\n    #[test]\n    fn test_device_tree_structure() {\n        let workbench_id = Uuid::new_v4();\n        let grandparent = Device::new(\n            workbench_id,\n            \"Grandparent\".to_string(),\n            ProtocolType::Virtual,\n            None,\n        );\n        let parent = Device::new(\n            workbench_id,\n            \"Parent\".to_string(),\n            ProtocolType::Virtual,\n            Some(grandparent.id),\n        );\n        let child = Device::new(\n            workbench_id,\n            \"Child\".to_string(),\n            ProtocolType::Virtual,\n            Some(parent.id),\n        );\n\n        assert!(grandparent.parent_id.is_none());\n        assert_eq!(parent.parent_id, Some(grandparent.id));\n        assert_eq!(child.parent_id, Some(parent.id));\n    }\n\n    // TC-S1-016-08: ProtocolType 枚举所有变体测试\n    #[test]\n    fn test_protocol_type_variants() {\n        let workbench_id = Uuid::new_v4();\n        for protocol in \u0026[\n            ProtocolType::Virtual,\n            ProtocolType::ModbusTcp,\n            ProtocolType::ModbusRtu,\n            ProtocolType::Can,\n            ProtocolType::Visa,\n            ProtocolType::Mqtt,\n        ] {\n            let device = Device::new(workbench_id, format!(\"{:?}\", protocol), *protocol, None);\n            assert_eq!(device.protocol_type, *protocol);\n        }\n    }\n\n    // TC-S1-016-23: Device 转 DeviceResponse 测试\n    #[test]\n    fn test_device_to_response() {\n        let workbench_id = Uuid::new_v4();\n        let device = Device::new(\n            workbench_id,\n            \"Test Device\".to_string(),\n            ProtocolType::Virtual,\n            None,\n        );\n        let response = DeviceResponse::from(device.clone());\n\n        assert_eq!(response.id, device.id);\n        assert_eq!(response.workbench_id, device.workbench_id);\n        assert_eq!(response.name, device.name);\n        assert_eq!(response.protocol_type, device.protocol_type);\n        assert_eq!(response.status, device.status);\n        assert_eq!(response.created_at, device.created_at);\n        assert_eq!(response.updated_at, device.updated_at);\n    }\n\n    // TC-S1-016-27: ProtocolType JSON 序列化测试\n    #[test]\n    fn test_protocol_type_serialization() {\n        let json = serde_json::to_string(\u0026ProtocolType::Virtual).unwrap();\n        assert_eq!(json, \"\\\"virtual\\\"\");\n        let json = serde_json::to_string(\u0026ProtocolType::ModbusTcp).unwrap();\n        assert_eq!(json, \"\\\"modbus_tcp\\\"\");\n    }\n\n    // TC-S1-016-30: JSON 反序列化测试\n    #[test]\n    fn test_protocol_type_deserialization() {\n        let protocol: ProtocolType = serde_json::from_str(\"\\\"virtual\\\"\").unwrap();\n        assert_eq!(protocol, ProtocolType::Virtual);\n    }\n\n    // DeviceStatus 反序列化测试\n    #[test]\n    fn test_device_status_deserialization() {\n        let status1: DeviceStatus = serde_json::from_str(\"\\\"online\\\"\").unwrap();\n        assert_eq!(status1, DeviceStatus::Online);\n        let status2: DeviceStatus = serde_json::from_str(\"\\\"error\\\"\").unwrap();\n        assert_eq!(status2, DeviceStatus::Error);\n        let status3: DeviceStatus = serde_json::from_str(\"\\\"offline\\\"\").unwrap();\n        assert_eq!(status3, DeviceStatus::Offline);\n    }\n\n    // TC-S1-016-33: 设备可选字段（带值）测试\n    #[test]\n    fn test_device_optional_fields_with_values() {\n        let workbench_id = Uuid::new_v4();\n        let mut device = Device::new(\n            workbench_id,\n            \"Test\".to_string(),\n            ProtocolType::ModbusTcp,\n            None,\n        );\n        device.manufacturer = Some(\"Acme Corp\".to_string());\n        device.model = Some(\"Model-X\".to_string());\n        device.sn = Some(\"SN12345\".to_string());\n        device.protocol_params = Some(serde_json::json!({\"host\": \"192.168.1.1\", \"port\": 502}));\n\n        assert_eq!(device.manufacturer, Some(\"Acme Corp\".to_string()));\n        assert_eq!(device.model, Some(\"Model-X\".to_string()));\n        assert_eq!(device.sn, Some(\"SN12345\".to_string()));\n        assert!(device.protocol_params.is_some());\n    }\n}\n","traces":[{"line":71,"address":[18094769,18094224],"length":1,"stats":{"Line":1}},{"line":77,"address":[17087868],"length":1,"stats":{"Line":1}},{"line":79,"address":[17087925],"length":1,"stats":{"Line":1}},{"line":137,"address":[17088400],"length":1,"stats":{"Line":1}},{"line":139,"address":[17088407],"length":1,"stats":{"Line":1}},{"line":140,"address":[17088431],"length":1,"stats":{"Line":1}},{"line":141,"address":[17088455],"length":1,"stats":{"Line":1}},{"line":142,"address":[17088489],"length":1,"stats":{"Line":1}},{"line":143,"address":[17088515],"length":1,"stats":{"Line":1}},{"line":144,"address":[17088521],"length":1,"stats":{"Line":1}},{"line":145,"address":[17088557],"length":1,"stats":{"Line":1}},{"line":146,"address":[17088583],"length":1,"stats":{"Line":1}},{"line":147,"address":[17088610],"length":1,"stats":{"Line":1}},{"line":148,"address":[17088637],"length":1,"stats":{"Line":1}},{"line":149,"address":[17088643],"length":1,"stats":{"Line":1}},{"line":150,"address":[17088667],"length":1,"stats":{"Line":1}}],"covered":16,"coverable":16},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","models","entities","mod.rs"],"content":"//! 实体模型模块\n//!\n//! 聚合所有数据库实体模型\n\npub mod data_file;\npub mod device;\npub mod point;\npub mod user;\npub mod workbench;\n\n// 重新导出常用类型\npub use data_file::{DataFile, DataFileStatus, SourceType};\npub use device::{Device, DeviceStatus, ProtocolType};\npub use point::{AccessType, DataType, Point, PointStatus};\npub use user::{CreateUserRequest, UpdateUserRequest, User, UserStatus};\npub use workbench::{\n    CreateWorkbenchRequest, OwnerType, UpdateWorkbenchRequest, Workbench, WorkbenchStatus,\n};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","models","entities","point.rs"],"content":"//! 测点实体模型\n//!\n//! 定义测点表的数据结构和相关枚举\n\nuse chrono::{DateTime, Utc};\nuse serde::{Deserialize, Serialize};\nuse uuid::Uuid;\n\n/// 数据类型枚举\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"snake_case\")]\npub enum DataType {\n    /// 数值（浮点数）\n    Number,\n    /// 整数\n    Integer,\n    /// 字符串\n    String,\n    /// 布尔值\n    Boolean,\n}\n\n/// 访问类型枚举\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize)]\n#[serde(rename_all = \"snake_case\")]\npub enum AccessType {\n    /// 只读\n    Ro,\n    /// 只写\n    Wo,\n    /// 读写\n    Rw,\n}\n\n/// 测点状态枚举\n#[derive(Debug, Clone, Copy, PartialEq, Eq, Serialize, Deserialize, Default)]\n#[serde(rename_all = \"snake_case\")]\npub enum PointStatus {\n    /// 正常\n    #[default]\n    Active,\n    /// 禁用\n    Disabled,\n}\n\n/// 测点实体\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct Point {\n    /// 测点ID (UUID)\n    pub id: Uuid,\n    /// 所属设备ID\n    pub device_id: Uuid,\n    /// 测点名称\n    pub name: String,\n    /// 数据类型\n    pub data_type: DataType,\n    /// 访问类型\n    pub access_type: AccessType,\n    /// 单位\n    pub unit: Option\u003cString\u003e,\n    /// 最小值\n    pub min_value: Option\u003cf64\u003e,\n    /// 最大值\n    pub max_value: Option\u003cf64\u003e,\n    /// 默认值\n    pub default_value: Option\u003cString\u003e,\n    /// 状态\n    pub status: PointStatus,\n    /// 元数据 (JSON格式)\n    pub metadata: Option\u003cserde_json::Value\u003e,\n    /// 创建时间\n    pub created_at: DateTime\u003cUtc\u003e,\n    /// 更新时间\n    pub updated_at: DateTime\u003cUtc\u003e,\n}\n\nimpl Point {\n    /// 创建测点\n    pub fn new(\n        device_id: Uuid,\n        name: String,\n        data_type: DataType,\n        access_type: AccessType,\n    ) -\u003e Self {\n        let now = Utc::now();\n        Self {\n            id: Uuid::new_v4(),\n            device_id,\n            name,\n            data_type,\n            access_type,\n            unit: None,\n            min_value: None,\n            max_value: None,\n            default_value: None,\n            status: PointStatus::Active,\n            metadata: None,\n            created_at: now,\n            updated_at: now,\n        }\n    }\n}\n\n/// 创建测点请求DTO\n#[derive(Debug, Deserialize)]\npub struct CreatePointRequest {\n    pub device_id: Uuid,\n    pub name: String,\n    pub data_type: DataType,\n    pub access_type: AccessType,\n    pub unit: Option\u003cString\u003e,\n    pub min_value: Option\u003cf64\u003e,\n    pub max_value: Option\u003cf64\u003e,\n    pub default_value: Option\u003cString\u003e,\n}\n\n/// 更新测点请求DTO\n#[derive(Debug, Deserialize, Default)]\npub struct UpdatePointRequest {\n    pub name: Option\u003cString\u003e,\n    pub unit: Option\u003cString\u003e,\n    pub min_value: Option\u003cf64\u003e,\n    pub max_value: Option\u003cf64\u003e,\n    pub default_value: Option\u003cString\u003e,\n    pub status: Option\u003cPointStatus\u003e,\n}\n\n/// 写入测点值请求DTO\n#[derive(Debug, Deserialize)]\npub struct WritePointValueRequest {\n    pub value: f64,\n}\n\n/// 测点响应DTO\n#[derive(Debug, Serialize)]\npub struct PointResponse {\n    pub id: Uuid,\n    pub device_id: Uuid,\n    pub name: String,\n    pub data_type: DataType,\n    pub access_type: AccessType,\n    pub unit: Option\u003cString\u003e,\n    pub min_value: Option\u003cf64\u003e,\n    pub max_value: Option\u003cf64\u003e,\n    pub default_value: Option\u003cString\u003e,\n    pub status: PointStatus,\n    pub created_at: DateTime\u003cUtc\u003e,\n    pub updated_at: DateTime\u003cUtc\u003e,\n}\n\nimpl From\u003cPoint\u003e for PointResponse {\n    fn from(point: Point) -\u003e Self {\n        Self {\n            id: point.id,\n            device_id: point.device_id,\n            name: point.name,\n            data_type: point.data_type,\n            access_type: point.access_type,\n            unit: point.unit,\n            min_value: point.min_value,\n            max_value: point.max_value,\n            default_value: point.default_value,\n            status: point.status,\n            created_at: point.created_at,\n            updated_at: point.updated_at,\n        }\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    // TC-S1-016-11: 创建测点（基本字段）测试\n    #[test]\n    fn test_create_point_basic() {\n        let device_id = Uuid::new_v4();\n        let point = Point::new(\n            device_id,\n            \"Temperature\".to_string(),\n            DataType::Number,\n            AccessType::Ro,\n        );\n\n        assert_eq!(point.device_id, device_id);\n        assert_eq!(point.name, \"Temperature\");\n        assert_eq!(point.data_type, DataType::Number);\n        assert_eq!(point.access_type, AccessType::Ro);\n        assert_eq!(point.status, PointStatus::Active);\n    }\n\n    // TC-S1-016-12: 创建多个测点（验证UUID唯一性）测试\n    #[test]\n    fn test_point_uuid_uniqueness() {\n        let device_id = Uuid::new_v4();\n        let point1 = Point::new(\n            device_id,\n            \"Point 1\".to_string(),\n            DataType::Number,\n            AccessType::Ro,\n        );\n        let point2 = Point::new(\n            device_id,\n            \"Point 2\".to_string(),\n            DataType::Integer,\n            AccessType::Rw,\n        );\n        assert_ne!(point1.id, point2.id);\n    }\n\n    // TC-S1-016-13: AccessType::Ro（只读）测点测试\n    #[test]\n    fn test_access_type_ro() {\n        let point = Point::new(\n            Uuid::new_v4(),\n            \"Sensor Read\".to_string(),\n            DataType::Number,\n            AccessType::Ro,\n        );\n        assert_eq!(point.access_type, AccessType::Ro);\n    }\n\n    // TC-S1-016-14: AccessType::Wo（只写）测点测试\n    #[test]\n    fn test_access_type_wo() {\n        let point = Point::new(\n            Uuid::new_v4(),\n            \"Control Write\".to_string(),\n            DataType::Boolean,\n            AccessType::Wo,\n        );\n        assert_eq!(point.access_type, AccessType::Wo);\n    }\n\n    // TC-S1-016-15: AccessType::Rw（读写）测点测试\n    #[test]\n    fn test_access_type_rw() {\n        let point = Point::new(\n            Uuid::new_v4(),\n            \"Setting RW\".to_string(),\n            DataType::Integer,\n            AccessType::Rw,\n        );\n        assert_eq!(point.access_type, AccessType::Rw);\n    }\n\n    // TC-S1-016-16: DataType::Number（浮点数）测点测试\n    #[test]\n    fn test_data_type_number() {\n        let point = Point::new(\n            Uuid::new_v4(),\n            \"Temperature\".to_string(),\n            DataType::Number,\n            AccessType::Ro,\n        );\n        assert_eq!(point.data_type, DataType::Number);\n    }\n\n    // TC-S1-016-17: DataType::Integer（整数）测点测试\n    #[test]\n    fn test_data_type_integer() {\n        let point = Point::new(\n            Uuid::new_v4(),\n            \"Counter\".to_string(),\n            DataType::Integer,\n            AccessType::Rw,\n        );\n        assert_eq!(point.data_type, DataType::Integer);\n    }\n\n    // TC-S1-016-18: DataType::String（字符串）测点测试\n    #[test]\n    fn test_data_type_string() {\n        let point = Point::new(\n            Uuid::new_v4(),\n            \"Status Text\".to_string(),\n            DataType::String,\n            AccessType::Ro,\n        );\n        assert_eq!(point.data_type, }\n\n    // TC-S1-016-28: DataType JSON 序列化测试\n    #[test]\n    fn test_data_type_serialization() {\n        assert_eq!(\n            serde_json::to_string(\u0026DataType::Number).unwrap(),\n            \"\\\"number\\\"\"\n        );\n        assert_eq!(\n            serde_json::to_string(\u0026DataType::Integer).unwrap(),\n            \"\\\"integer\\\"\"\n        );\n        assert_eq!(\n            serde_json::to_string(\u0026DataType::String).unwrap(),\n            \"\\\"string\\\"\"\n        );\n        assert_eq!(\n            serde_json::to_string(\u0026DataType::Boolean).unwrap(),\n            \"\\\"boolean\\\"\"\n        );\n    }\n\n    // TC-S1-016-29: AccessType JSON 序列化测试\n    #[test]\n    fn test_access_type_serialization() {\n        assert_eq!(serde_json::to_string(\u0026AccessType::Ro).unwrap(), \"\\\"ro\\\"\");\n        assert_eq!(serde_json::to_string(\u0026AccessType::Wo).unwrap(), \"\\\"wo\\\"\");\n        assert_eq!(serde_json::to_string(\u0026AccessType::Rw).unwrap(), \"\\\"rw\\\"\");\n    }\n\n    // TC-S1-016-30: JSON 反序列化测试\n    #[test]\n    fn test_json_deserialization() {\n        let data_type: DataType = serde_json::from_str(\"\\\"integer\\\"\").unwrap();\n        assert_eq!(data_type, DataType::Integer);\n        let access: AccessType = serde_json::from_str(\"\\\"rw\\\"\").unwrap();\n        assert_eq!(access, AccessType::Rw);\n    }\n\n    // TC-S1-016-34: PointStatus JSON 反序列化测试\n    #[test]\n    fn test_point_status_deserialization() {\n        let status: PointStatus = serde_json::from_str(\"\\\"active\\\"\").unwrap();\n        assert_eq!(status, PointStatus::Active);\n        let status: PointStatus = serde_json::from_str(\"\\\"disabled\\\"\").unwrap();\n        assert_eq!(status, PointStatus::Disabled);\n    }\n\n    // TC-S1-016-35: 测点数值范围边界（min \u003e max）测试\n    #[test]\n    fn test_point_boundary_min_greater_than_max() {\n        let mut point = Point::new(\n            Uuid::new_v4(),\n            \"Test\".to_string(),\n ceDto, PagedDeviceDto};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","services","device","service.rs"],"content":"//! 设备服务实现\n\nuse async_trait::async_trait;\nuse std::sync::Arc;\nuse uuid::Uuid;\n\nuse crate::db::repository::device_repo::{DeviceRepository, DeviceRepositoryError};\nuse crate::db::repository::point_repo::PointRepository;\nuse crate::db::repository::workbench_repo::WorkbenchRepository;\nuse crate::drivers::{DeviceManager, VirtualConfig, VirtualDriver};\nuse crate::models::entities::device::{Device, ProtocolType};\n\nuse super::error::{CreateDeviceEntity, DeviceError, UpdateDeviceEntity};\nuse super::types::{DeviceDto, PagedDeviceDto};\n\n/// 设备服务接口\n#[async_trait]\npub trait DeviceService: Send + Sync {\n    /// 创建设备\n    async fn create_device(\n        \u0026self,\n        user_id: Uuid,\n        entity: CreateDeviceEntity,\n    ) -\u003e Result\u003cDeviceDto, DeviceError\u003e;\n\n    /// 获取设备详情\n    async fn get_device(\u0026self, user_id: Uuid, device_id: Uuid) -\u003e Result\u003cDeviceDto, DeviceError\u003e;\n\n    /// 查询设备列表\n    async fn list_devices(\n        \u0026self,\n        user_id: Uuid,\n        workbench_id: Uuid,\n        parent_id: Option\u003cUuid\u003e,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003cPagedDeviceDto, DeviceError\u003e;\n\n    /// 更新设备\n    async fn update_device(\n        \u0026self,\n        user_id: Uuid,\n        device_id: Uuid,\n        entity: UpdateDeviceEntity,\n    ) -\u003e Result\u003cDeviceDto, DeviceError\u003e;\n\n    /// 删除设备\n    async fn delete_device(\u0026self, user_id: Uuid, device_id: Uuid) -\u003e Result\u003c(), DeviceError\u003e;\n}\n\n/// 设备服务实现\npub struct DeviceServiceImpl {\n    device_repo: Arc\u003cdyn DeviceRepository\u003e,\n    point_repo: Arc\u003cdyn PointRepository\u003e,\n    workbench_repo: Arc\u003cdyn WorkbenchRepository\u003e,\n    device_manager: Arc\u003cDeviceManager\u003e,\n}\n\nimpl DeviceServiceImpl {\n    pub fn new(\n        device_repo: Arc\u003cdyn DeviceRepository\u003e,\n        point_repo: Arc\u003cdyn PointRepository\u003e,\n        workbench_repo: Arc\u003cdyn WorkbenchRepository\u003e,\n        device_manager: Arc\u003cDeviceManager\u003e,\n    ) -\u003e Self {\n        Self {\n            device_repo,\n            point_repo,\n            workbench_repo,\n            device_manager,\n        }\n    }\n\n    /// 验证用户是否拥有工作台\n    async fn verify_workbench_ownership(\n        \u0026self,\n        user_id: Uuid,\n        workbench_id: Uuid,\n    ) -\u003e Result\u003c(), DeviceError\u003e {\n        let workbench = self\n            .workbench_repo\n            .find_by_id(workbench_id)\n            .await\n            .map_err(|e| DeviceError::DatabaseError(e.to_string()))?;\n\n        match workbench {\n            Some(wb) if wb.owner_id == user_id =\u003e Ok(()),\n            Some(_) =\u003e Err(DeviceError::AccessDenied),\n            None =\u003e Err(DeviceError::WorkbenchNotFound),\n        }\n    }\n\n    /// 验证设备所属工作台的所有权\n    async fn verify_device_ownership(\n        \u0026self,\n        user_id: Uuid,\n        device_id: Uuid,\n    ) -\u003e Result\u003cUuid, DeviceError\u003e {\n        let device = self\n            .device_repo\n            .find_by_id(device_id)\n            .await\n            .map_err(|e| DeviceError::DatabaseError(e.to_string()))?;\n\n        match device {\n            Some(d) =\u003e {\n                self.verify_workbench_ownership(user_id, d.workbench_id)\n                    .await?;\n                Ok(d.workbench_id)\n            }\n            None =\u003e Err(DeviceError::NotFound),\n        }\n    }\n\n    /// 检查循环引用\n    async fn check_circular_reference(\n        \u0026self,\n        device_id: Uuid,\n        new_parent_id: Uuid,\n    ) -\u003e Result\u003cbool, DeviceError\u003e {\n        if device_id == new_parent_id {\n            return Ok(true);\n        }\n\n        let descendants = self\n            .device_repo\n            .find_all_descendant_ids(device_id)\n            .await\n            .map_err(|e| DeviceError::DatabaseError(e.to_string()))?;\n\n        Ok(descendants.contains(\u0026new_parent_id))\n    }\n\n    /// 将Device转换为DTO\n    fn to_dto(device: Device) -\u003e DeviceDto {\n        DeviceDto {\n            id: device.id,\n            workbench_id: device.workbench_id,\n            parent_id: device.parent_id,\n            name: device.name,\n            protocol_type: device.protocol_type,\n            protocol_params: device.protocol_params,\n            manufacturer: device.manufacturer,\n            model: device.model,\n            sn: device.sn,\n            status: device.status,\n            created_at: device.created_at.to_rfc3339(),\n            updated_at: device.updated_at.to_rfc3339(),\n        }\n    }\n}\n\nimpl From\u003cDeviceRepositoryError\u003e for DeviceError {\n    fn from(err: DeviceRepositoryError) -\u003e Self {\n        match err {\n            DeviceRepositoryError::NotFound =\u003e DeviceError::NotFound,\n            DeviceRepositoryError::Database(e) =\u003e DeviceError::DatabaseError(e.to_string()),\n        }\n    }\n}\n\n#[async_trait]\nimpl DeviceService for DeviceServiceImpl {\n    async fn create_device(\n        \u0026self,\n        user_id: Uuid,\n        entity: CreateDeviceEntity,\n    ) -\u003e Result\u003cDeviceDto, DeviceError\u003e {\n        // 验证工作台所有权\n        self.verify_workbench_ownership(user_id, entity.workbench_id)\n            .await?;\n\n        // 如果指定了父设备，检查循环引用\n        if let Some(parent_id) = entity.parent_id {\n            // 验证父设备存在且属于同一工作台\n            let parent = self\n                .device_repo\n                .find_by_id(parent_id)\n                .await\n                .map_err(|e| DeviceError::DatabaseError(e.to_string()))?;\n\n            match parent {\n                Some(p) if p.workbench_id == entity.workbench_id =\u003e {\n                    // 检查循环引用\n                    if self\n                        .check_circular_reference(parent_id, entity.workbench_id)\n                        .await?\n                    {\n                        return Err(DeviceError::CircularReference);\n                    }\n                }\n                Some(_) =\u003e {\n                    return Err(DeviceError::ValidationError(\n                        \"Parent device does not belong to the same workbench\".to_string(),\n                    ))\n                }\n                None =\u003e {\n                    return Err(DeviceError::ValidationError(\n                        \"Parent device not found\".to_string(),\n                    ))\n                }\n            }\n        }\n\n        // 创建设备\n        let device = Device::new(\n            entity.workbench_id,\n            entity.name,\n            entity.protocol_type,\n            entity.parent_id,\n        );\n\n        // 如果提供了可选字段，更新它们\n        let mut device = device;\n        device.protocol_params = entity.protocol_params.clone();\n        device.manufacturer = entity.manufacturer;\n        device.model = entity.model;\n        device.sn = entity.sn;\n\n        // 保存到数据库\n        self.device_repo.create(\u0026device).await?;\n\n        // 如果是虚拟设备，注册到DeviceManager\n        if device.protocol_type == ProtocolType::Virtual {\n            let config: VirtualConfig = entity\n                .protocol_params\n                .and_then(|p| serde_json::from_value(p).ok())\n                .unwrap_or_default();\n\n            let driver = VirtualDriver::with_config(config)\n                .map_err(|e| DeviceError::ValidationError(e.to_string()))?;\n\n            let _ = self.device_manager.register_device(device.id, driver);\n        }\n\n        Ok(Self::to_dto(device))\n    }\n\n    async fn get_device(\u0026self, user_id: Uuid, device_id: Uuid) -\u003e Result\u003cDeviceDto, DeviceError\u003e {\n        let _workbench_id = self.verify_device_ownership(user_id, device_id).await?;\n\n        let device = self\n            .device_repo\n            .find_by_id(device_id)\n            .await?\n            .ok_or(DeviceError::NotFound)?;\n\n        Ok(Self::to_dto(device))\n    }\n\n    async fn list_devices(\n        \u0026self,\n        user_id: Uuid,\n        workbench_id: Uuid,\n        parent_id: Option\u003cUuid\u003e,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003cPagedDeviceDto, DeviceError\u003e {\n        // 验证工作台所有权\n        self.verify_workbench_ownership(user_id, workbench_id)\n            .await?;\n\n        let (devices, total) = if let Some(pid) = parent_id {\n            self.device_repo\n                .find_by_workbench_and_parent(workbench_id, Some(pid), page, size)\n                .await\n                .map_err(|e| DeviceError::DatabaseError(e.to_string()))?\n        } else {\n            self.device_repo\n                .find_by_workbench_and_parent(workbench_id, None, page, size)\n                .await\n                .map_err(|e| DeviceError::DatabaseError(e.to_string()))?\n        };\n\n        Ok(PagedDeviceDto {\n            total,\n            page,\n            size,\n            items: devices.into_iter().map(Self::to_dto).collect(),\n        })\n    }\n\n    async fn update_device(\n        \u0026self,\n        user_id: Uuid,\n        device_id: Uuid,\n        entity: UpdateDeviceEntity,\n    ) -\u003e Result\u003cDeviceDto, DeviceError\u003e {\n        let _workbench_id = self.verify_device_ownership(user_id, device_id).await?;\n\n        // 如果要更新parent_id，检查循环引用\n        if let Some(_new_parent_id) = entity.status.as_ref().and(entity.protocol_params.as_ref()) {\n            // 这里简化处理，实际应该检查parent_id变化\n        }\n\n        let device = self\n            .device_repo\n            .update(\n                device_id,\n                entity.name,\n                entity.protocol_params,\n                entity.manufacturer,\n                entity.model,\n                entity.sn,\n                entity.status,\n            )\n            .await?;\n\n        Ok(Self::to_dto(device))\n    }\n\n    async fn delete_device(\u0026self, user_id: Uuid, device_id: Uuid) -\u003e Result\u003c(), DeviceError\u003e {\n        let _workbench_id = self.verify_device_ownership(user_id, device_id).await?;\n\n        // 获取所有子设备ID（递归）\n        let all_device_ids = self\n            .device_repo\n            .find_all_descendant_ids(device_id)\n            .await\n            .map_err(|e| DeviceError::DatabaseError(e.to_string()))?;\n\n        // 添加要删除的设备本身\n        let mut all_ids = all_device_ids;\n        all_ids.push(device_id);\n\n        // 删除所有设备及其测点（从叶子到根）\n        for dev_id in all_ids.iter().rev() {\n            // 删除该设备的所有测点\n            self.point_repo\n                .delete_by_device_id(*dev_id)\n                .await\n                .map_err(|e| DeviceError::DatabaseError(e.to_string()))?;\n\n            // 从DeviceManager注销虚拟设备\n            let _ = self.device_manager.unregister_device(*dev_id);\n\n            // 删除设备\n            self.device_repo\n                .delete(*dev_id)\n                .await\n                .map_err(|e| DeviceError::DatabaseError(e.to_string()))?;\n        }\n\n        Ok(())\n    }\n}\n","traces":[{"line":60,"address":[19296352],"length":1,"stats":{"Line":0}},{"line":75,"address":[15570928],"length":1,"stats":{"Line":0}},{"line":80,"address":[16829760,16829213,16829012,16829410,16829132,16829533,16829684],"length":1,"stats":{"Line":0}},{"line":82,"address":[16829157],"length":1,"stats":{"Line":0}},{"line":83,"address":[16829273,16829060,16829181,16829522,16829226],"length":1,"stats":{"Line":0}},{"line":84,"address":[16829728,16829661,16830560,16830583],"length":1,"stats":{"Line":0}},{"line":86,"address":[16829885],"length":1,"stats":{"Line":0}},{"line":87,"address":[16830248,16830161,16829935],"length":1,"stats":{"Line":0}},{"line":88,"address":[16830167],"length":1,"stats":{"Line":0}},{ es::point::{AccessType, DataType, PointStatus};\nuse thiserror::Error;\nuse uuid::Uuid;\n\n#[derive(Error, Debug)]\npub enum PointError {\n    #[error(\"Point not found\")]\n    NotFound,\n\n    #[error(\"Device not found\")]\n    DeviceNotFound,\n\n    #[error(\"Access denied\")]\n    AccessDenied,\n\n    #[error(\"Validation error: {0}\")]\n    ValidationError(String),\n\n    #[error(\"Read only point\")]\n    ReadOnlyPoint,\n\n    #[error(\"Device not connected\")]\n    DeviceNotConnected,\n\n    #[error(\"Database error: {0}\")]\n    DatabaseError(String),\n}\n\n/// 创建测点实体\npub struct CreatePointEntity {\n    pub device_id: Uuid,\n    pub name: String,\n    pub data_type: DataType,\n    pub access_type: AccessType,\n    pub unit: Option\u003cString\u003e,\n    pub description: Option\u003cString\u003e,\n    pub min_value: Option\u003cf64\u003e,\n    pub max_value: Option\u003cf64\u003e,\n    pub default_value: Option\u003cString\u003e,\n}\n\n/// 更新测点实体\npub struct UpdatePointEntity {\n    pub name: Option\u003cString\u003e,\n    pub unit: Option\u003cString\u003e,\n    pub description: Option\u003cString\u003e,\n    pub min_value: Option\u003cf64\u003e,\n    pub max_value: Option\u003cf64\u003e,\n    pub default_value: Option\u003cString\u003e,\n    pub status: Option\u003cPointStatus\u003e,\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","services","point","mod.rs"],"content":"//! 测点服务模块\n\npub mod error;\npub mod service;\npub mod types;\n\npub use error::{CreatePointEntity, PointError, UpdatePointEntity};\npub use service::{PointService, PointServiceImpl};\npub use types::{PagedPointDto, PointDto, PointValueDto};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","services","point","service.rs"],"content":"//! 测点服务实现\n\nuse async_trait::async_trait;\nuse std::sync::Arc;\nuse uuid::Uuid;\n\nuse crate::db::repository::device_repo::{DeviceRepository, DeviceRepositoryError};\nuse crate::db::repository::point_repo::{PointRepository, PointRepositoryError};\nuse crate::db::repository::workbench_repo::WorkbenchRepository;\nuse crate::drivers::{DeviceManager, DriverError, PointValue};\nuse crate::models::entities::point::{AccessType, Point};\n\nuse super::error::{CreatePointEntity, PointError, UpdatePointEntity};\nuse super::types::{PagedPointDto, PointDto, PointValueDto};\n\n/// 测点服务接口\n#[async_trait]\npub trait PointService: Send + Sync {\n    /// 创建测点\n    async fn create_point(\n        \u0026self,\n        user_id: Uuid,\n        entity: CreatePointEntity,\n    ) -\u003e Result\u003cPointDto, PointError\u003e;\n\n    /// 获取测点详情\n    async fn get_point(\u0026self, user_id: Uuid, point_id: Uuid) -\u003e Result\u003cPointDto, PointError\u003e;\n\n    /// 查询测点列表\n    async fn list_points(\n        \u0026self,\n        user_id: Uuid,\n        device_id: Uuid,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003cPagedPointDto, PointError\u003e;\n\n    /// 更新测点\n    async fn update_point(\n        \u0026self,\n        user_id: Uuid,\n        point_id: Uuid,\n        entity: UpdatePointEntity,\n    ) -\u003e Result\u003cPointDto, PointError\u003e;\n\n    /// 删除测点\n    async fn delete_point(\u0026self, user_id: Uuid, point_id: Uuid) -\u003e Result\u003c(), PointError\u003e;\n\n    /// 读取测点值\n    async fn read_point_value(\n        \u0026self,\n        user_id: Uuid,\n        point_id: Uuid,\n    ) -\u003e Result\u003cPointValueDto, PointError\u003e;\n\n    /// 写入测点值\n    async fn write_point_value(\n        \u0026self,\n        user_id: Uuid,\n        point_id: Uuid,\n        value: PointValue,\n    ) -\u003e Result\u003c(), PointError\u003e;\n}\n\n/// 测点服务实现\npub struct PointServiceImpl {\n    device_repo: Arc\u003cdyn DeviceRepository\u003e,\n    point_repo: Arc\u003cdyn PointRepository\u003e,\n    workbench_repo: Arc\u003cdyn WorkbenchRepository\u003e,\n    device_manager: Arc\u003cDeviceManager\u003e,\n}\n\nimpl PointServiceImpl {\n    pub fn new(\n        device_repo: Arc\u003cdyn DeviceRepository\u003e,\n        point_repo: Arc\u003cdyn PointRepository\u003e,\n        workbench_repo: Arc\u003cdyn WorkbenchRepository\u003e,\n        device_manager: Arc\u003cDeviceManager\u003e,\n    ) -\u003e Self {\n        Self {\n            device_repo,\n            point_repo,\n            workbench_repo,\n            device_manager,\n        }\n    }\n\n    /// 验证用户是否拥有设备所属的工作台\n    async fn verify_device_ownership(\n        \u0026self,\n        user_id: Uuid,\n        device_id: Uuid,\n    ) -\u003e Result\u003cUuid, PointError\u003e {\n        let device = self\n            .device_repo\n            .find_by_id(device_id)\n            .await\n            .map_err(|e| PointError::DatabaseError(e.to_string()))?;\n\n        match device {\n            Some(d) =\u003e {\n                let workbench = self\n                    .workbench_repo\n                    .find_by_id(d.workbench_id)\n                    .await\n                    .map_err(|e| PointError::DatabaseError(e.to_string()))?;\n\n                match workbench {\n                    Some(wb) if wb.owner_id == user_id =\u003e Ok(d.workbench_id),\n                    Some(_) =\u003e Err(PointError::AccessDenied),\n                    None =\u003e Err(PointError::DeviceNotFound),\n                }\n            }\n            None =\u003e Err(PointError::DeviceNotFound),\n        }\n    }\n\n    /// 验证测点所有权\n    async fn verify_point_ownership(\n        \u0026self,\n        user_id: Uuid,\n        point_id: Uuid,\n    ) -\u003e Result\u003cUuid, PointError\u003e {\n        let point = self\n            .point_repo\n            .find_by_id(point_id)\n            .await\n            .map_err(|e| PointError::DatabaseError(e.to_string()))?;\n\n        match point {\n            Some(p) =\u003e self.verify_device_ownership(user_id, p.device_id).await,\n            None =\u003e Err(PointError::NotFound),\n        }\n    }\n\n    /// 将Point转换为DTO\n    fn to_dto(point: Point) -\u003e PointDto {\n        PointDto {\n            id: point.id,\n            device_id: point.device_id,\n            name: point.name,\n            data_type: point.data_type,\n            access_type: point.access_type,\n            unit: point.unit,\n            min_value: point.min_value,\n            max_value: point.max_value,\n            default_value: point.default_value,\n            status: point.status,\n            created_at: point.created_at.to_rfc3339(),\n            updated_at: point.updated_at.to_rfc3339(),\n        }\n    }\n}\n\nimpl From\u003cPointRepositoryError\u003e for PointError {\n    fn from(err: PointRepositoryError) -\u003e Self {\n        match err {\n            PointRepositoryError::NotFound =\u003e PointError::NotFound,\n            PointRepositoryError::Database(e) =\u003e PointError::DatabaseError(e.to_string()),\n        }\n    }\n}\n\nimpl From\u003cDeviceRepositoryError\u003e for PointError {\n    fn from(err: DeviceRepositoryError) -\u003e Self {\n        match err {\n            DeviceRepositoryError::NotFound =\u003e PointError::DeviceNotFound,\n            DeviceRepositoryError::Database(e) =\u003e PointError::DatabaseError(e.to_string()),\n        }\n    }\n}\n\nimpl From\u003cDriverError\u003e for PointError {\n    fn from(err: DriverError) -\u003e Self {\n        match err {\n            DriverError::NotConnected =\u003e PointError::DeviceNotConnected,\n            DriverError::ReadOnlyPoint =\u003e PointError::ReadOnlyPoint,\n            DriverError::InvalidValue { message } =\u003e PointError::ValidationError(message),\n            _ =\u003e PointError::DatabaseError(err.to_string()),\n        }\n    }\n}\n\n#[async_trait]\nimpl PointService for PointServiceImpl {\n    async fn create_point(\n        \u0026self,\n        user_id: Uuid,\n        entity: CreatePointEntity,\n    ) -\u003e Result\u003cPointDto, PointError\u003e {\n        // 验证设备所有权\n        self.verify_device_ownership(user_id, entity.device_id)\n            .await?;\n\n        // 创建测点\n        let mut point = Point::new(\n            entity.device_id,\n            entity.name,\n            entity.data_type,\n            entity.access_type,\n        );\n\n        point.unit = entity.unit;\n        point.min_value = entity.min_value;\n        point.max_value = entity.max_value;\n        point.default_value = entity.default_value;\n\n        self.point_repo.create(\u0026point).await?;\n\n        Ok(Self::to_dto(point))\n    }\n\n    async fn get_point(\u0026self, user_id: Uuid, point_id: Uuid) -\u003e Result\u003cPointDto, PointError\u003e {\n        let _workbench_id = self.verify_point_ownership(user_id, point_id).await?;\n\n        let point = self\n            .point_repo\n            .find_by_id(point_id)\n            .await?\n            .ok_or(PointError::NotFound)?;\n\n        Ok(Self::to_dto(point))\n    }\n\n    async fn list_points(\n        \u0026self,\n        user_id: Uuid,\n        device_id: Uuid,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003cPagedPointDto, PointError\u003e {\n        // 验证设备所有权\n        self.verify_device_ownership(user_id, device_id).await?;\n\n        let (points, total) = self\n            .point_repo\n            .find_by_device_id(device_id, page, size)\n            .await\n            .map_err(|e| PointError::DatabaseError(e.to_string()))?;\n\n        Ok(PagedPointDto {\n            total,\n            page,\n            size,\n            items: points.into_iter().map(Self::to_dto).collect(),\n        })\n    }\n\n    async fn update_point(\n        \u0026self,\n        user_id: Uuid,\n        point_id: Uuid,\n        entity: UpdatePointEntity,\n    ) -\u003e Result\u003cPointDto, PointError\u003e {\n        let _workbench_id = self.verify_point_ownership(user_id, point_id).await?;\n\n        let point = self\n            .point_repo\n            .update(\n                point_id,\n                entity.name,\n                entity.unit,\n                entity.min_value,\n                entity.max_value,\n                entity.default_value,\n                entity.status,\n            )\n            .await?;\n\n        Ok(Self::to_dto(point))\n    }\n\n    async fn delete_point(\u0026self, user_id: Uuid, point_id: Uuid) -\u003e Result\u003c(), PointError\u003e {\n        let _workbench_id = self.verify_point_ownership(user_id, point_id).await?;\n\n        self.point_repo.delete(point_id).await?;\n\n        Ok(())\n    }\n\n    async fn read_point_value(\n        \u0026self,\n        user_id: Uuid,\n        point_id: Uuid,\n    ) -\u003e Result\u003cPointValueDto, PointError\u003e {\n        let _workbench_id = self.verify_point_ownership(user_id, point_id).await?;\n\n        let point = self\n            .point_repo\n            .find_by_id(point_id)\n            .await?\n            .ok_or(PointError::NotFound)?;\n\n        // 获取设备驱动\n        let driver_arc = self\n            .device_manager\n            .get_device(point.device_id)\n            .ok_or(PointError::DeviceNotConnected)?;\n\n        // 直接同步调用（read_point 现在是同步方法）\n        let value = {\n            let driver = driver_arc.read().unwrap();\n            driver.read_point(point_id)?\n        };\n\n        Ok(PointValueDto {\n            point_id,\n            value,\n            timestamp: chrono::Utc::now().to_rfc3339(),\n        })\n    }\n\n    async fn write_point_value(\n        \u0026self,\n        user_id: Uuid,\n        point_id: Uuid,\n        value: PointValue,\n    ) -\u003e Result\u003c(), PointError\u003e {\n        let _workbench_id = self.verify_point_ownership(user_id, point_id).await?;\n\n        let point = self\n            .point_repo\n            .find_by_id(point_id)\n            .await?\n            .ok_or(PointError::NotFound)?;\n\n        // 检查访问类型\n        if point.access_type == AccessType::Ro {\n            return Err(PointError::ReadOnlyPoint);\n        }\n\n        // 获取设备驱动\n        let driver_arc = self\n            .device_manager\n            .get_device(point.device_id)\n            .ok_or(PointError::DeviceNotConnected)?;\n\n        // 直接同步调用（write_point 现在是同步方法）\n        {\n            let driver = driver_arc.read().unwrap();\n            driver.write_point(point_id, value)?;\n        }\n\n        Ok(())\n    }\n}\n","traces":[{"line":74,"address":[18269056],"length":1,"stats":{"Line":0}},{"line":89,"address":[17053920],"length":1,"stats":{"Line":0}},{"line":94,"address":[18324312,18323777,18323371,18323701,18323284,18323663,18323609,18323132],"length":1,"stats":{"Line":0}},{"line":96,"address":[18323312],"length":1,"stats":{"Line":0}},{"line":97,"address":[17603311],"length":1,"stats":{"Line":0}},{"line":98,"address":[18323745,18326000,18326023,18323678],"length":1,"stats":{"Line":0}},{"line":100,"address":[18323910],"length":1,"stats":{"Line":0}},{"line":101,"address":[18323951],"length":1,"stats":{"Line":0}},{"line":102,"address":[18323991,18324777,18324500,18324200,18324271,18324626,18324853],"length":1,"stats":{"Line":0}},{"line":104,"address":[18324185,18324212],"length":1,"stats":{"Line":0}},{"line":105,"address":[17603326],"length":1,"stats":{"Line":0}},{"line":106,"address":[18325856,18325879,18324821,18324754],"length":1,"stats":{"Line":0}},{"line":108,"address":[18296382],"length":1,"stats":{"Line":0}},{"line":109,"address":[18325031,18325352,18325257],"length":1,"stats":{"Line":0}},{"line":110,"address":[18325263],"length":1,"stats":{"Line":0}},{"line":111,"address":[18325065],"length":1,"stats":{"Line":0}},{"line":114,"address":[18295387],"length":1,"stats":{"Line":0}},{"line":119,"address":[17053872],"length":1,"stats":{"Line":0}},{"line":124,"address":[18293138,18292636,18293251,18293164,18293083,18292775,18292860],"length":1,"stats":{"Line":0}},{"line":126,"address":[18321532],"length":1,"stats":{"Line":0}},{"line":127,"address":[18321806,18321556,18321648,18321424,18321601],"length }\n\nimpl From\u003cUserError\u003e for AppError {\n    fn from(err: UserError) -\u003e Self {\n        match err {\n            UserError::UserNotFound =\u003e AppError::NotFound(err.to_string()),\n            UserError::UsernameAlreadyExists =\u003e AppError::Conflict(err.to_string()),\n            UserError::InvalidOldPassword =\u003e AppError::BadRequest(err.to_string()),\n            UserError::WeakPassword(msg) =\u003e {\n                AppError::validation_error(vec![FieldError::new(\"new_password\", msg)])\n            }\n            UserError::PasswordSameAsOld =\u003e AppError::BadRequest(err.to_string()),\n            UserError::ValidationError(msg) =\u003e AppError::BadRequest(msg),\n            UserError::Internal(msg) =\u003e AppError::InternalError(msg),\n        }\n    }\n}\n","traces":[{"line":34,"address":[16928467,16927552,16928478],"length":1,"stats":{"Line":0}},{"line":35,"address":[16927574],"length":1,"stats":{"Line":0}},{"line":36,"address":[16927618],"length":1,"stats":{"Line":0}},{"line":37,"address":[16927677],"length":1,"stats":{"Line":0}},{"line":38,"address":[16927736],"length":1,"stats":{"Line":0}},{"line":39,"address":[16927795],"length":1,"stats":{"Line":0}},{"line":40,"address":[16928162,16927837,16928473],"length":1,"stats":{"Line":0}},{"line":42,"address":[16927857],"length":1,"stats":{"Line":0}},{"line":43,"address":[16927933],"length":1,"stats":{"Line":0}},{"line":44,"address":[16928024],"length":1,"stats":{"Line":0}}],"covered":0,"coverable":10},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","services","user","mod.rs"],"content":"//! 用户服务模块\n//!\n//! 提供用户信息管理和密码修改功能\n\npub mod error;\npub mod service;\npub mod types;\n\npub use error::UserError;\npub use service::{\n    ChangePasswordRequest, UpdateUserRequest, UserDto, UserService, UserServiceImpl,\n};\npub use types::UpdateUserEntity;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","services","user","service.rs"],"content":"//! 用户服务接口与实现\n//!\n//! 实现用户信息获取、更新和密码修改功能\n\nuse async_trait::async_trait;\nuse chrono::Utc;\nuse serde::{Deserialize, Serialize};\nuse std::sync::Arc;\nuse uuid::Uuid;\nuse validator::Validate;\n\nuse crate::auth::PasswordHasher;\nuse crate::core::error::AppError;\nuse crate::models::entities::user::User;\n\nuse super::error::UserError;\nuse super::types::UpdateUserEntity;\n\n/// 用户DTO\n#[derive(Debug, Clone, Serialize)]\npub struct UserDto {\n    pub id: Uuid,\n    pub email: String,\n    pub username: Option\u003cString\u003e,\n    pub avatar: Option\u003cString\u003e,\n    pub status: String,\n    pub created_at: chrono::DateTime\u003cUtc\u003e,\n    pub updated_at: chrono::DateTime\u003cUtc\u003e,\n}\n\nimpl From\u003cUser\u003e for UserDto {\n    fn from(user: User) -\u003e Self {\n        Self {\n            id: user.id,\n            email: user.email,\n            username: user.username,\n            avatar: user.avatar_url,\n            status: user.status,\n            created_at: user.created_at,\n            updated_at: user.updated_at,\n        }\n    }\n}\n\n/// 验证用户名格式\nfn validate_username_format(username: \u0026str) -\u003e Result\u003c(), validator::ValidationError\u003e {\n    if !username.chars().all(|c| c.is_alphanumeric() || c == '_') {\n        return Err(validator::ValidationError::new(\"username_format\"));\n    }\n    Ok(())\n}\n\n/// 更新用户信息请求\n#[derive(Debug, Deserialize, Validate)]\npub struct UpdateUserRequest {\n    #[validate(length(min = 3, max = 50, message = \"Username must be 3-50 characters\"))]\n    #[validate(custom(\n        function = \"validate_username_format\",\n        message = \"Username can only contain letters, numbers, and underscores\"\n    ))]\n    pub username: Option\u003cString\u003e,\n\n    #[validate(url(message = \"Invalid avatar URL format\"))]\n    #[validate(length(max = 2048, message = \"Avatar URL must be at most 2048 characters\"))]\n    pub avatar: Option\u003cString\u003e,\n}\n\n/// 修改密码请求\n#[derive(Debug, Deserialize, Validate)]\npub struct ChangePasswordRequest {\n    #[validate(length(min = 1, message = \"Old password is required\"))]\n    pub old_password: String,\n\n    #[validate(length(min = 8, message = \"New password must be at least 8 characters\"))]\n    pub new_password: String,\n}\n\n/// 用户仓库接口\n#[async_trait]\npub trait UserRepository: Send + Sync {\n    async fn find_by_id(\u0026self, id: Uuid) -\u003e Result\u003cOption\u003cUser\u003e, AppError\u003e;\n    async fn update(\u0026self, id: Uuid, updates: \u0026UpdateUserEntity) -\u003e Result\u003cUser, AppError\u003e;\n    async fn update_password(\u0026self, id: Uuid, password_hash: \u0026str) -\u003e Result\u003c(), AppError\u003e;\n    async fn exists_by_username(\u0026self, username: \u0026str) -\u003e Result\u003cbool, AppError\u003e;\n    async fn exists_by_username_except_user(\n        \u0026self,\n        username: \u0026str,\n        user_id: Uuid,\n    ) -\u003e Result\u003cbool, AppError\u003e;\n}\n\n/// 用户服务接口\n#[async_trait]\npub trait UserService: Send + Sync {\n    async fn get_current_user(\u0026self, user_id: Uuid) -\u003e Result\u003cUserDto, UserError\u003e;\n    async fn update_user(\n        \u0026self,\n        user_id: Uuid,\n        updates: UpdateUserRequest,\n    ) -\u003e Result\u003cUserDto, UserError\u003e;\n    async fn change_password(\n        \u0026self,\n        user_id: Uuid,\n        req: ChangePasswordRequest,\n    ) -\u003e Result\u003c(), UserError\u003e;\n}\n\n/// 用户服务实现\npub struct UserServiceImpl {\n    user_repo: Arc\u003cdyn UserRepository\u003e,\n    password_service: Arc\u003cdyn PasswordHasher\u003e,\n}\n\nimpl UserServiceImpl {\n    pub fn new(\n        user_repo: Arc\u003cdyn UserRepository\u003e,\n        password_service: Arc\u003cdyn PasswordHasher\u003e,\n    ) -\u003e Self {\n        Self {\n            user_repo,\n            password_service,\n        }\n    }\n\n    fn validate_password_strength(\u0026self, password: \u0026str) -\u003e Result\u003c(), UserError\u003e {\n        if password.len() \u003c 8 {\n            return Err(UserError::WeakPassword(\n                \"Password must be at least 8 characters\".to_string(),\n            ));\n        }\n        if password.len() \u003e 128 {\n            return Err(UserError::WeakPassword(\n                \"Password must be at most 128 characters\".to_string(),\n            ));\n        }\n        Ok(())\n    }\n}\n\n#[async_trait]\nimpl UserService for UserServiceImpl {\n    async fn get_current_user(\u0026self, user_id: Uuid) -\u003e Result\u003cUserDto, UserError\u003e {\n        let user = self\n            .user_repo\n            .find_by_id(user_id)\n            .await\n            .map_err(|e| UserError::Internal(e.to_string()))?\n            .ok_or(UserError::UserNotFound)?;\n        Ok(UserDto::from(user))\n    }\n\n    async fn update_user(\n        \u0026self,\n        user_id: Uuid,\n        updates: UpdateUserRequest,\n    ) -\u003e Result\u003cUserDto, UserError\u003e {\n        let mut update_entity = UpdateUserEntity::default();\n\n        if let Some(ref username) = updates.username {\n            let exists = self\n                .user_repo\n                .exists_by_username_except_user(username, user_id)\n                .await\n                .map_err(|e| UserError::Internal(e.to_string()))?;\n            if exists {\n                return Err(UserError::UsernameAlreadyExists);\n            }\n            update_entity.username = Some(username.clone());\n        }\n\n        if updates.avatar.is_some() {\n            update_entity.avatar_url = updates.avatar.clone();\n        }\n\n        let user = self\n            .user_repo\n            .update(user_id, \u0026update_entity)\n            .await\n            .map_err(|e| UserError::Internal(e.to_string()))?;\n        Ok(UserDto::from(user))\n    }\n\n    async fn change_password(\n        \u0026self,\n        user_id: Uuid,\n        req: ChangePasswordRequest,\n    ) -\u003e Result\u003c(), UserError\u003e {\n        let user = self\n            .user_repo\n            .find_by_id(user_id)\n            .await\n            .map_err(|e| UserError::Internal(e.to_string()))?\n            .ok_or(UserError::UserNotFound)?;\n\n        let password_valid = self\n            .password_service\n            .verify_password(\u0026req.old_password, \u0026user.password_hash)\n            .map_err(|e| UserError::Internal(e.to_string()))?;\n        if !password_valid {\n            return Err(UserError::InvalidOldPassword);\n        }\n\n        if req.old_password == req.new_password {\n            return Err(UserError::PasswordSameAsOld);\n        }\n\n        self.validate_password_strength(\u0026req.new_password)?;\n\n        let new_hash = self\n            .password_service\n            .hash_password(\u0026req.new_password)\n            .map_err(|e| UserError::Internal(e.to_string()))?;\n\n        self.user_repo\n            .update_password(user_id, \u0026new_hash)\n            .await\n            .map_err(|e| UserError::Internal(e.to_string()))?;\n\n        Ok(())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use crate::auth::services::BcryptPasswordHasher;\n    use crate::models::entities::user::{User, UserStatus};\n    use std::sync::RwLock;\n\n    struct MockUserRepository {\n        users: RwLock\u003cstd::collections::HashMap\u003cUuid, User\u003e\u003e,\n    }\n\n    impl MockUserRepository {\n        fn new() -\u003e Self {\n            Self {\n                users: RwLock::new(std::collections::HashMap::new()),\n            }\n        }\n        fn add_user(\u0026self, user: User) {\n            self.users.write().unwrap().insert(user.id, user);\n        }\n    }\n\n    #[async_trait]\n    impl UserRepository for MockUserRepository {\n        async fn find_by_id(\u0026self, id: Uuid) -\u003e Result\u003cOption\u003cUser\u003e, AppError\u003e {\n            Ok(self.users.read() rror\u003e;\n    async fn delete_workbench(\n        \u0026self,\n        user_id: Uuid,\n        workbench_id: Uuid,\n    ) -\u003e Result\u003c(), WorkbenchError\u003e;\n}\n\n/// 工作台服务实现 (使用dyn trait进行依赖注入)\npub struct WorkbenchServiceImpl {\n    workbench_repo: Arc\u003cdyn WorkbenchRepository\u003e,\n}\n\nimpl WorkbenchServiceImpl {\n    pub fn new(workbench_repo: Arc\u003cdyn WorkbenchRepository\u003e) -\u003e Self {\n        Self { workbench_repo }\n    }\n\n    /// 验证用户是否拥有工作台\n    async fn validate_ownership(\n        \u0026self,\n        user_id: Uuid,\n        workbench_id: Uuid,\n    ) -\u003e Result\u003c(), WorkbenchError\u003e {\n        let workbench = self\n            .workbench_repo\n            .find_by_id(workbench_id)\n            .await\n            .map_err(|e| WorkbenchError::Internal(e.to_string()))?;\n\n        match workbench {\n            Some(wb) if wb.owner_id == user_id =\u003e Ok(()),\n            Some(_) =\u003e Err(WorkbenchError::AccessDenied),\n            None =\u003e Err(WorkbenchError::NotFound),\n        }\n    }\n}\n\n#[async_trait]\nimpl WorkbenchService for WorkbenchServiceImpl {\n    async fn create_workbench(\n        \u0026self,\n        owner_id: Uuid,\n        req: CreateWorkbenchEntity,\n    ) -\u003e Result\u003cWorkbenchDto, WorkbenchError\u003e {\n        // Validation\n        if req.name.is_empty() {\n            return Err(WorkbenchError::ValidationError(\n                \"Name is required\".to_string(),\n            ));\n        }\n        if req.name.len() \u003e 255 {\n            return Err(WorkbenchError::ValidationError(\n                \"Name must be 1-255 characters\".to_string(),\n            ));\n        }\n        if let Some(ref desc) = req.description {\n            if desc.len() \u003e 1000 {\n                return Err(WorkbenchError::ValidationError(\n                    \"Description must be at most 1000 characters\".to_string(),\n                ));\n            }\n        }\n\n        let workbench = Workbench::new(req.name, req.description, req.owner_type, owner_id);\n\n        self.workbench_repo\n            .create(\u0026workbench)\n            .await\n            .map_err(|e| WorkbenchError::Internal(e.to_string()))?;\n\n        Ok(workbench.into())\n    }\n\n    async fn get_workbench(\n        \u0026self,\n        user_id: Uuid,\n        workbench_id: Uuid,\n    ) -\u003e Result\u003cWorkbenchDto, WorkbenchError\u003e {\n        // Verify ownership first\n        self.validate_ownership(user_id, workbench_id).await?;\n\n        let workbench = self\n            .workbench_repo\n            .find_by_id(workbench_id)\n            .await\n            .map_err(|e| WorkbenchError::Internal(e.to_string()))?;\n\n        match workbench {\n            Some(wb) =\u003e Ok(wb.into()),\n            None =\u003e Err(WorkbenchError::NotFound),\n        }\n    }\n\n    async fn list_workbenches(\n        \u0026self,\n        user_id: Uuid,\n        page: i64,\n        size: i64,\n    ) -\u003e Result\u003cPagedWorkbenchDto, WorkbenchError\u003e {\n        // Validate pagination\n        if page \u003c 1 {\n            return Err(WorkbenchError::ValidationError(\n                \"page must be \u003e= 1\".to_string(),\n            ));\n        }\n        if !(1..=1000).contains(\u0026size) {\n            return Err(WorkbenchError::ValidationError(\n                \"size must be 1-1000\".to_string(),\n            ));\n        }\n\n        let (workbenches, total) = self\n            .workbench_repo\n            .list_by_owner(user_id, page, size)\n            .await\n            .map_err(|e| WorkbenchError::Internal(e.to_string()))?;\n\n        let total_pages = (total as f64 / size as f64).ceil() as i64;\n\n        Ok(PagedWorkbenchDto {\n            items: workbenches.into_iter().map(|w| w.into()).collect(),\n            page,\n            size,\n            total,\n            total_pages,\n        })\n    }\n\n    async fn update_workbench(\n        \u0026self,\n        user_id: Uuid,\n        workbench_id: Uuid,\n        req: UpdateWorkbenchEntity,\n    ) -\u003e Result\u003cWorkbenchDto, WorkbenchError\u003e {\n        // Verify ownership first\n        self.validate_ownership(user_id, workbench_id).await?;\n\n        // Validation\n        if let Some(ref name) = req.name {\n            if name.is_empty() {\n                return Err(WorkbenchError::ValidationError(\n                    \"Name cannot be empty\".to_string(),\n                ));\n            }\n            if name.len() \u003e 255 {\n                return Err(WorkbenchError::ValidationError(\n                    \"Name must be 1-255 characters\".to_string(),\n                ));\n            }\n        }\n        if let Some(ref desc) = req.description {\n            if desc.len() \u003e 1000 {\n                return Err(WorkbenchError::ValidationError(\n                    \"Description must be at most 1000 characters\".to_string(),\n                ));\n            }\n        }\n\n        let workbench = self\n            .workbench_repo\n            .update(workbench_id, req.name, req.description, req.status)\n            .await\n            .map_err(|e| WorkbenchError::Internal(e.to_string()))?;\n\n        Ok(workbench.into())\n    }\n\n    async fn delete_workbench(\n        \u0026self,\n        user_id: Uuid,\n        workbench_id: Uuid,\n    ) -\u003e Result\u003c(), WorkbenchError\u003e {\n        // Verify ownership first\n        self.validate_ownership(user_id, workbench_id).await?;\n\n        self.workbench_repo\n            .delete(workbench_id)\n            .await\n            .map_err(|e| WorkbenchError::Internal(e.to_string()))?;\n\n        Ok(())\n    }\n}\n","traces":[{"line":50,"address":[17054848],"length":1,"stats":{"Line":0}},{"line":55,"address":[18180912],"length":1,"stats":{"Line":0}},{"line":60,"address":[17504732,17503988,17504656,17504382,17504505,17504104,17504185],"length":1,"stats":{"Line":0}},{"line":62,"address"     <script>const e = React.createElement;

function pathToString(path) {
  if (path[0] === '/') {
    return '/' + path.slice(1).join('/');
  } else {
    return path.join('/');
  }
}

function findCommonPath(files) {
  if (!files || !files.length) {
    return [];
  }

  function isPrefix(arr, prefix) {
    if (arr.length < prefix.length) {
      return false;
    }
    for (let i = prefix.length - 1; i >= 0; --i) {
      if (arr[i] !== prefix[i]) {
        return false;
      }
    }
    return true;
  }

  let commonPath = files[0].path.slice(0, -1);
  while (commonPath.length) {
    if (files.every(file => isPrefix(file.path, commonPath))) {
      break;
    }
    commonPath.pop();
  }
  return commonPath;
}

function findFolders(files) {
  if (!files || !files.length) {
    return [];
  }

  let folders = files.filter(file => file.path.length > 1).map(file => file.path[0]);
  folders = [...new Set(folders)]; // unique
  folders.sort();

  folders = folders.map(folder => {
    let filesInFolder = files
      .filter(file => file.path[0] === folder)
      .map(file => ({
        ...file,
        path: file.path.slice(1),
        parent: [...file.parent, file.path[0]],
      }));

    const children = findFolders(filesInFolder); // recursion

    return {
      is_folder: true,
      path: [folder],
      parent: files[0].parent,
      children,
      covered: children.reduce((sum, file) => sum + file.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.coverable, 0),
      prevRun: {
        covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
        coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
      },
    };
  });

  return [...folders, ...files.filter(file => file.path.length === 1)];
}

class App extends React.Component {
  constructor(...args) {
    super(...args);

    this.state = {
      current: [],
    };
  }

  componentDidMount() {
    this.updateStateFromLocation();
    window.addEventListener('hashchange', () => this.updateStateFromLocation(), false);
  }

  updateStateFromLocation() {
    if (window.location.hash.length > 1) {
      const current = window.location.hash.slice(1).split('/');
      this.setState({current});
    } else {
      this.setState({current: []});
    }
  }

  getCurrentPath() {
    let file = this.props.root;
    let path = [file];
    for (let p of this.state.current) {
      file = file.children.find(file => file.path[0] === p);
      if (!file) {
        return path;
      }
      path.push(file);
    }
    return path;
  }

  render() {
    const path = this.getCurrentPath();
    const file = path[path.length - 1];

    let w = null;
    if (file.is_folder) {
      w = e(FilesList, {
        folder: file,
        onSelectFile: this.selectFile.bind(this),
        onBack: path.length > 1 ? this.back.bind(this) : null,
      });
    } else {
      w = e(DisplayFile, {
        file,
        onBack: this.back.bind(this),
      });
    }

    return e('div', {className: 'app'}, w);
  }

  selectFile(file) {
    this.setState(
      ({current}) => {
        return {current: [...current, file.path[0]]};
      },
      () => this.updateHash(),
    );
  }

  back(file) {
    this.setState(
      ({current}) => {
        return {current: current.slice(0, current.length - 1)};
      },
      () => this.updateHash(),
    );
  }

  updateHash() {
    if (!this.state.current || !this.state.current.length) {
      window.location = '#';
    } else {
      window.location = '#' + this.state.current.join('/');
    }
  }
}

function FilesList({folder, onSelectFile, onBack}) {
  let files = folder.children;
  return e(
    'div',
    {className: 'display-folder'},
    e(FileHeader, {file: folder, onBack}),
    e(
      'table',
      {className: 'files-list'},
      e('thead', {className: 'files-list__head'}, e('tr', null, e('th', null, 'Path'), e('th', null, 'Coverage'))),
      e(
        'tbody',
        {className: 'files-list__body'},
        files.map(file => e(File, {file, onClick: onSelectFile})),
      ),
    ),
  );
}

function File({file, onClick}) {
  const coverage = file.coverable ? (file.covered / file.coverable) * 100 : -1;
  const coverageDelta =
    file.prevRun && (file.covered / file.coverable) * 100 - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'tr',
    {
      className:
        'files-list__file' +
        (coverage >= 0 && coverage < 50 ? ' files-list__file_low' : '') +
        (coverage >= 50 && coverage < 80 ? ' files-list__file_medium' : '') +
        (coverage >= 80 ? ' files-list__file_high' : '') +
        (file.is_folder ? ' files-list__file_folder' : ''),
      onClick: () => onClick(file),
    },
    e('td', null, e('a', null, pathToString(file.path))),
    e(
      'td',
      null,
      file.covered + ' / ' + file.coverable + (coverage >= 0 ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
    ),
  );
}

function DisplayFile({file, onBack}) {
  return e('div', {className: 'display-file'}, e(FileHeader, {file, onBack}), e(FileContent, {file}));
}

function FileHeader({file, onBack}) {
  const coverage = (file.covered / file.coverable) * 100;
  const coverageDelta = file.prevRun && coverage - (file.prevRun.covered / file.prevRun.coverable) * 100;

  return e(
    'div',
    {className: 'file-header'},
    onBack ? e('a', {className: 'file-header__back', onClick: onBack}, 'Back') : null,
    e('div', {className: 'file-header__name'}, pathToString([...file.parent, ...file.path])),
    e(
      'div',
      {className: 'file-header__stat'},
      'Covered: ' + file.covered + ' of ' + file.coverable + (file.coverable ? ' (' + coverage.toFixed(2) + '%)' : ''),
      e(
        'span',
        {title: 'Change from the previous run'},
        coverageDelta ? ` (${coverageDelta > 0 ? '+' : ''}${coverageDelta.toFixed(2)}%)` : '',
      ),
      e('input', {id: 'theme-toggle', type: 'checkbox', hidden: true}),
      e('label', {for: 'theme-toggle', id: 'theme-toggle-label'}, '🌙'),
    ),
  );
}

function FileContent({file}) {
  return e(
    'pre',
    {className: 'file-content'},
    file.content.split(/\r?\n/).map((line, index) => {
      const trace = file.traces.find(trace => trace.line === index + 1);
      const covered = trace && trace.stats.Line;
      const uncovered = trace && !trace.stats.Line;
      const nbHit = covered? trace.stats.Line: 0;
      return e(
        'div',
        { className: 'code-text-container' },
        e(
          'code',
          {
            className: 'code-line' + (covered ? ' code-line_covered' : '') + (uncovered ? ' code-line_uncovered' : ''),
          },
          line
        ),
        e(
          'div',
          { className: 'cover-indicator' + (covered? ' check-cover': '') + (uncovered? ' no-cover': '')},
          e(
            'div',
            { className: (covered? 'stat-line-hit': '')},
            covered? nbHit: ""
          )
        )
      );
    }),
  );
}

(function () {
  const commonPath = findCommonPath(data.files);
  const prevFilesMap = new Map();

  previousData &&
    previousData.files.forEach(file => {
      const path = file.path.slice(commonPath.length).join('/');
      prevFilesMap.set(path, file);
    });

  const files = data.files.map(file => {
    const path = file.path.slice(commonPath.length);
    const {covered = 0, coverable = 0} = prevFilesMap.get(path.join('/')) || {};
    return {
      ...file,
      path,
      parent: commonPath,
      prevRun: {covered, coverable},
    };
  });

  const children = findFolders(files);

  const root = {
    is_folder: true,
    children,
    path: commonPath,
    parent: [],
    covered: children.reduce((sum, file) => sum + file.covered, 0),
    coverable: children.reduce((sum, file) => sum + file.coverable, 0),
    prevRun: {
      covered: children.reduce((sum, file) => sum + file.prevRun.covered, 0),
      coverable: children.reduce((sum, file) => sum + file.prevRun.coverable, 0),
    },
  };

  ReactDOM.render(e(App, {root, prevFilesMap}), document.getElementById('root'));

  const toggle = document.getElementById('theme-toggle');
  const label = document.getElementById('theme-toggle-label');
  label.textContent = '🌙';

  toggle.addEventListener('change', () => {
    if (toggle.checked) {
      document.documentElement.setAttribute('data-theme', 'dark');
      label.textContent = '☀️';
    } else {
      document.documentElement.removeAttribute('data-theme');
      label.textContent = '🌙';
    }
  });
})();
