<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

  .map_err(|e| match e {\n            WorkbenchError::ValidationError(msg) =\u003e AppError::BadRequest(msg),\n            _ =\u003e AppError::InternalError(e.to_string()),\n        })?;\n\n    Ok(Json(ApiResponse::success(result)))\n}\n\n/// GET /api/v1/workbenches/{id} - 详情查询\npub async fn get_workbench(\n    State(handler): State\u003cAppState\u003e,\n    RequireAuth(user_ctx): RequireAuth,\n    Path(id): Path\u003cUuid\u003e,\n) -\u003e Result\u003cJson\u003cApiResponse\u003cWorkbenchDto\u003e\u003e, AppError\u003e {\n    let workbench = handler\n        .get_workbench(user_ctx.user_id, id)\n        .await\n        .map_err(|e| match e {\n            WorkbenchError::NotFound =\u003e AppError::NotFound(\"Workbench not found\".to_string()),\n            WorkbenchError::AccessDenied =\u003e {\n                AppError::Forbidden(\"Access denied: you do not own this workbench\".to_string())\n            }\n            _ =\u003e AppError::InternalError(e.to_string()),\n        })?;\n\n    Ok(Json(ApiResponse::success(workbench)))\n}\n\n/// PUT /api/v1/workbenches/{id} - 更新工作台\npub async fn update_workbench(\n    State(handler): State\u003cAppState\u003e,\n    RequireAuth(user_ctx): RequireAuth,\n    Path(id): Path\u003cUuid\u003e,\n    Json(req): Json\u003cUpdateWorkbenchRequest\u003e,\n) -\u003e Result\u003cJson\u003cApiResponse\u003cWorkbenchDto\u003e\u003e, AppError\u003e {\n    let entity = UpdateWorkbenchEntity {\n        name: req.name,\n        description: req.description,\n        status: req.status,\n    };\n\n    let workbench = handler\n        .update_workbench(user_ctx.user_id, id, entity)\n        .await\n        .map_err(|e| match e {\n            WorkbenchError::NotFound =\u003e AppError::NotFound(\"Workbench not found\".to_string()),\n            WorkbenchError::AccessDenied =\u003e {\n                AppError::Forbidden(\"Access denied: you do not own this workbench\".to_string())\n            }\n            WorkbenchError::ValidationError(msg) =\u003e AppError::BadRequest(msg),\n            _ =\u003e AppError::InternalError(e.to_string()),\n        })?;\n\n    Ok(Json(ApiResponse::success(workbench)))\n}\n\n/// DELETE /api/v1/workbenches/{id} - 删除工作台\npub async fn delete_workbench(\n    State(handler): State\u003cAppState\u003e,\n    RequireAuth(user_ctx): RequireAuth,\n    Path(id): Path\u003cUuid\u003e,\n) -\u003e Result\u003cStatusCode, AppError\u003e {\n    handler\n        .delete_workbench(user_ctx.user_id, id)\n        .await\n        .map_err(|e| match e {\n            WorkbenchError::NotFound =\u003e AppError::NotFound(\"Workbench not found\".to_string()),\n            WorkbenchError::AccessDenied =\u003e {\n                AppError::Forbidden(\"Access denied: you do not own this workbench\".to_string())\n            }\n            _ =\u003e AppError::InternalError(e.to_string()),\n        })?;\n\n    Ok(StatusCode::NO_CONTENT)\n}\n","traces":[{"line":22,"address":[16961584],"length":1,"stats":{"Line":0}},{"line":28,"address":[17955067],"length":1,"stats":{"Line":0}},{"line":29,"address":[17955099],"length":1,"stats":{"Line":0}},{"line":30,"address":[17955131],"length":1,"stats":{"Line":0}},{"line":31,"address":[17955138],"length":1,"stats":{"Line":0}},{"line":34,"address":[17955547,17956118,17955247,17956042,17955471,17955891,17955765],"length":1,"stats":{"Line":0}},{"line":35,"address":[17955369,17955491],"length":1,"stats":{"Line":0}},{"line":36,"address":[17051237],"length":1,"stats":{"Line":0}},{"line":37,"address":[17956995,17956019,17957196,17956976,17957218],"length":1,"stats":{"Line":0}},{"line":38,"address":[17957011],"length":1,"stats":{"Line":0}},{"line":39,"address":[17957084,17957138],"length":1,"stats":{"Line":0}},{"line":42,"address":[17956642,17956415],"length":1,"stats":{"Line":0}},{"line":46,"address":[16961808],"length":1,"stats":{"Line":0}},{"line":51,"address":[17958917],"length":1,"stats":{"Line":0}},{"line":52,"address":[17958925],"length":1,"stats":{"Line":0}},{"line":54,"ad       method = %method,\n            path = %path,\n            status = %status,\n            \"Client error response\"\n        );\n    }\n\n    response\n}\n\n/// 错误响应结构\n#[derive(Debug, Serialize)]\npub struct NotFoundResponse {\n    pub code: u16,\n    pub message: String,\n    pub timestamp: String,\n}\n\n/// 404 处理\n///\n/// 当没有路由匹配时返回的统一响应\npub async fn not_found_handler() -\u003e impl IntoResponse {\n    let body = Json(NotFoundResponse {\n        code: StatusCode::NOT_FOUND.as_u16(),\n        message: \"The requested resource was not found\".to_string(),\n        timestamp: current_timestamp(),\n    });\n\n    (StatusCode::NOT_FOUND, body)\n}\n\n/// 获取当前时间戳\nfn current_timestamp() -\u003e String {\n    use time::OffsetDateTime;\n    OffsetDateTime::now_utc()\n        .format(\u0026time::format_description::well_known::Rfc3339)\n        .unwrap_or_else(|_| \"1970-01-01T00:00:00Z\".to_string())\n}\n","traces":[{"line":18,"address":[15629024,15629795,15634196,15629249,15634130,15629071],"length":1,"stats":{"Line":0}},{"line":19,"address":[15629348,15629234],"length":1,"stats":{"Line":0}},{"line":20,"address":[15629421,15629510],"length":1,"stats":{"Line":0}},{"line":22,"address":[18647539,18648105,18647800,18647977],"length":1,"stats":{"Line":0}},{"line":24,"address":[15630334,15630255],"length":1,"stats":{"Line":0}},{"line":27,"address":[15630350],"length":1,"stats":{"Line":0}},{"line":28,"address":[15630399,15632405],"length":1,"stats":{"Line":0}},{"line":34,"address":[15630604,15630437,15630385],"length":1,"stats":{"Line":0}},{"line":35,"address":[15630653],"length":1,"stats":{"Line":0}},{"line":43,"address":[15630455],"length":1,"stats":{"Line":0}},{"line":57,"address":[18653440,18653478,18653879,18653525,18653552],"length":1,"stats":{"Line":0}},{"line":58,"address":[15635346],"length":1,"stats":{"Line":0}},{"line":59,"address":[18653506],"length":1,"stats":{"Line":0}},{"line":60,"address":[15635254],"length":1,"stats":{"Line":0}},{"line":61,"address":[15 _requests(req: Request, next: Next) -\u003e Response {\n    let start = Instant::now();\n    let request_id = uuid();\n\n    let method = req.method().to_string();\n    let uri = req.uri().to_string();\n    let remote_addr = req\n        .extensions()\n        .get::\u003cConnectInfo\u003cSocketAddr\u003e\u003e()\n        .map(|info| info.0);\n\n    // 创建追踪span\n    let span = info_span!(\n        \"http_request\",\n        request_id = %request_id,\n        method = %method,\n        uri = %uri,\n        remote_addr = ?remote_addr,\n    );\n\n    async move {\n        // 记录请求开始\n        info!(\n            request_id = %request_id,\n            method = %method,\n            uri = %uri,\n            \"Request started\"\n        );\n\n        // 处理请求\n        let response = next.run(req).await;\n\n        // 计算延迟\n        let latency = start.elapsed();\n        let status = response.status();\n\n        // 记录请求完成\n        info!(\n            request_id = %request_id,\n            method = %method,\n            uri = %uri,\n            status = %status,\n            latency_ms = %latency.as_millis(),\n            \"Request completed\"\n        );\n\n        response\n    }\n    .instrument(span)\n    .await\n}\n\n/// 生成简单的UUID（不需要外部依赖）\nfn uuid() -\u003e String {\n    use std::sync::atomic::{AtomicU64, Ordering};\n    use std::time::{SystemTime, UNIX_EPOCH};\n\n    static COUNTER: AtomicU64 = AtomicU64::new(0);\n\n    let timestamp = SystemTime::now()\n        .duration_since(UNIX_EPOCH)\n        .unwrap_or_default()\n        .as_nanos();\n\n    let counter = COUNTER.fetch_add(1, Ordering::Relaxed);\n\n    format!(\"{:x}-{:x}\", timestamp, counter)\n}\n","traces":[{"line":21,"address":[19208864,19208901],"length":1,"stats":{"Line":0}},{"line":22,"address":[17898894,17898754],"length":1,"stats":{"Line":0}},{"line":23,"address":[17898929],"length":1,"stats":{"Line":0}},{"line":25,"address":[17898951,17899040],"length":1,"stats":{"Line":0}},{"line":26,"address":[1789906 ate::api::middleware::error::not_found_handler;\nuse crate::auth::{\n    handlers::{login, refresh_token, register},\n    services::{AuthServiceImpl, BcryptPasswordHasher, JwtTokenService},\n    user_repo_adapter::UserRepositoryAdapter,\n};\nuse crate::db::connection::DbPool;\nuse crate::db::repository::device_repo::SqlxDeviceRepository;\nuse crate::db::repository::point_repo::SqlxPointRepository;\nuse crate::db::repository::user_repo::UserRepository;\nuse crate::db::repository::workbench_repo::SqlxWorkbenchRepository;\nuse crate::drivers::DeviceManager;\nuse crate::services::device::{DeviceService, DeviceServiceImpl};\nuse crate::services::point::{PointService, PointServiceImpl};\nuse crate::services::user::{UserService, UserServiceImpl};\nuse crate::services::user_repo_adapter::UserServiceRepositoryAdapter;\nuse crate::services::workbench::{WorkbenchService, WorkbenchServiceImpl};\n\n/// 创建设备管理器（全局单例）\nfn create_device_manager() -\u003e Arc\u003cDeviceManager\u003e {\n    Arc::new(DeviceManager::new())\n}\n\n/// 创建应用路由\npub fn create_router(pool: DbPool) -\u003e Router {\n    // 创建基础组件\n    let user_repo = UserRepository::new(pool.clone());\n    let user_service_repo_adapter = Arc::new(UserServiceRepositoryAdapter::new(user_repo));\n\n    let token_service = Arc::new(JwtTokenService::new(\n        std::env::var(\"JWT_ACCESS_SECRET\")\n            .unwrap_or_else(|_| \"default_access_secret_change_in_production\".to_string()),\n        std::env::var(\"JWT_REFRESH_SECRET\")\n            .unwrap_or_else(|_| \"default_refresh_secret_change_in_production\".to_string()),\n    ));\n\n    let password_hasher = Arc::new(BcryptPasswordHasher);\n\n    // 创建认证服务\n    let user_repo_adapter = Arc::new(UserRepositoryAdapter::new(UserRepository::new(\n        pool.clone(),\n    )));\n    let auth_service = Arc::new(AuthServiceImpl::new(\n        user_repo_adapter,\n        token_service,\n        password_hasher.clone(),\n    ));\n\n    // 创建用户服务\n    let user_service: Arc\u003cdyn UserService\u003e = Arc::new(UserServiceImpl::new(\n        user_service_repo_adapter,\n        password_hasher,\n    ));\n\n    // 创建工作台服务\n    let workbench_repo = SqlxWorkbenchRepository::new(pool.clone());\n    let workbench_repo_for_device = workbench_repo.clone();\n    let workbench_repo_for_point = workbench_repo.clone();\n    let workbench_service: Arc\u003cdyn WorkbenchService\u003e =\n        Arc::new(WorkbenchServiceImpl::new(Arc::new(workbench_repo)));\n\n    // 创建设备管理器\n    let device_manager = create_device_manager();\n\n    // 创建设备仓储\n    let device_repo: Arc\u003cdyn crate::db::repository::device_repo::DeviceRepository\u003e =\n        Arc::new(SqlxDeviceRepository::new(pool.clone()));\n    let point_repo: Arc\u003cdyn crate::db::repository::point_repo::PointRepository\u003e =\n        Arc::new(SqlxPointRepository::new(pool.clone()));\n\n    // 创建设备服务\n    let device_service: Arc\u003cdyn DeviceService\u003e = Arc::new(DeviceServiceImpl::new(\n        device_repo.clone(),\n        point_repo.clone(),\n        Arc::new(workbench_repo_for_device),\n        device_manager.clone(),\n    ));\n\n    // 创建测点服务\n    let point_service: Arc\u003cdyn PointService\u003e = Arc::new(PointServiceImpl::new(\n        device_repo,\n        point_repo,\n        Arc::new(workbench_repo_for_point),\n        device_manager,\n    ));\n\n    Router::new()\n        // 健康检查（最优先，无中间件限制）\n        .route(\"/health\", get(health::health_check))\n        // API路由\n        .merge(auth_routes(auth_service))\n        .merge(user_routes(user_service))\n        .merge(workbench_routes(workbench_service))\n        .merge(device_routes(device_service))\n        .merge(point_routes(point_service))\n        // 404处理\n        .fallback(not_found_handler)\n}\n\n/// 认证路由组\nfn auth_routes\u003cS\u003e(auth_service: Arc\u003cS\u003e) -\u003e Router\nwhere\n    S: crate::auth::traits::AuthService + 'static,\n{\n    Router::new().nest(\n        \"/api/v1/auth\",\n        Router::new()\n            .route(\"/register\", post(register::\u003cS\u003e))\n            .route(\"/login\", post(login::\u003cS\u003e))\n            .route(\"/refresh\", post(refresh_token::\u003cS\u003e))\n            .with_state(auth_service),\n    )\n}\n\n/// 用户路由组\nfn user_routes(user_service: Arc\u003cdyn UserService\u003e) -\u003e Router {\n    Router::new().nest(\n        \"/api/v1/users\",\n        Router::new()\n            .route(\"/me\", get(get_current_user))\n            .route(\"/me\", put(update_current_user))\n            .route(\"/me/password\", post(change_password))\n            .with_state(user_service),\n    )\n}\n\n/// 工作台路由组\nfn workbench_routes(workbench_service: Arc\u003cdyn WorkbenchService\u003e) -\u003e Router {\n    Router::new().nest(\n        \"/api/v1/workbenches\",\n        Router::new()\n            .route(\"/\", post(workbench::create_workbench))\n            .route(\"/\", get(workbench::list_workbenches))\n            .route(\"/{id}\", get(workbench::get_workbench))\n            .route(\"/{id}\", put(workbench::update_workbench))\n            .route(\"/{id}\", delete(workbench::delete_workbench))\n            .with_state(workbench_service),\n    )\n}\n\n/// 设备路由组\nfn device_routes(device_service: Arc\u003cdyn DeviceService\u003e) -\u003e Router {\n    Router::new().nest(\n        \"/api/v1\",\n        Router::new()\n            // 设备路由（嵌套在工作台下）\n            .route(\n                \"/workbenches/{workbench_id}/devices\",\n                post(device::create_device),\n            )\n            .route(\n                \"/workbenches/{workbench_id}/devices\",\n                get(device::list_devices),\n            )\n            // 独立设备路由\n            .route(\"/devices/{id}\", get(device::get_device))\n            .route(\"/devices/{id}\", put(device::update_device))\n            .route(\"/devices/{id}\", delete(device::delete_device))\n            .with_state(device_service),\n    )\n}\n\n/// 测点路由组\nfn point_routes(point_service: Arc\u003cdyn PointService\u003e) -\u003e Router {\n    Router::new().nest(\n        \"/api/v1\",\n        Router::new()\n            // 测点路由（嵌套在设备下）\n            .route(\"/devices/{device_id}/points\", post(point::create_point))\n            .route(\"/devices/{device_id}/points\", get(point::list_points))\n            // 独立测点路由\n            .route(\"/points/{id}\", get(point::get_point))\n            .route(\"/points/{id}\", put(point::update_point))\n            .route(\"/points/{id}\", delete(point::delete_point))\n            // 测点值路由\n            .route(\"/points/{id}/value\", get(point::read_point_value))\n            .route(\"/points/{id}/value\", put(point::write_point_value))\n            .with_state(point_service),\n    )\n}\n\n// Re-export for use in tests or other modules\npub use user::{change_password, get_current_user, update_current_user};\npub use workbench::{\n    create_workbench, delete_workbench, get_workbench, list_workbenches, update_workbench,\n};\n\n/// 获取健康检查路由（用于测试）\npub fn health_routes() -\u003e Router {\n    Router::new().route(\"/health\", get(health::health_check))\n}\n","traces":[{"line":36,"address":[17310304],"length":1,"stats":{"Line":0}},{"line":37,"address":[17799201],"length":1,"stats":{"Line":0}},{"line":41,"address":[17791968,17796252,17796772],"length":1,"stats":{"Line":0}},{"line":43,"address":[17791983,17792282],"length":1,"stats":{"Line":0}},{"line":44,"address":[17792313],"length":1,"stats":{"Line":0}},{"line":46,"address":[17792639,17792584],"length":1,"stats":{"Line":0}},{"line":47,"address":[17792375],"length":1,"stats":{"Line":0}},{"line":48,"address":[15991648,15991632],"length":1,"stats":{"Line":0}},{"line":49,"address":[17792485],"length":1,"stats":{"Line":0}},{"line":50,"address":[15991744,15991760],"length":1,"stats":{"Line":0}},{"line":53,"address":[17792742,17792678],"length":1,"stats":{"Line":0}},{"line":56,"address":[17792827],"length":1,"stats":{"Line":0}},{"line":57,"address":[17303389],"length":1,"stats":{"Line":0}},{"lin te)]\npub struct TokenRefreshRequest {\n    /// 刷新Token\n    #[validate(length(min = 1, message = \"Refresh token is required\"))]\n    pub refresh_token: String,\n}\n\n/// Token响应DTO\n#[derive(Debug, Serialize)]\npub struct TokenResponse {\n    pub access_token: String,\n    pub refresh_token: String,\n    pub token_type: String,\n    pub expires_in: i64,\n    pub user: UserAuthInfo,\n}\n\n/// 用户认证信息\n#[derive(Debug, Serialize)]\npub struct UserAuthInfo {\n    pub id: Uuid,\n    pub email: String,\n    pub username: Option\u003cString\u003e,\n}\n\nimpl From\u003ccrate::models::entities::user::User\u003e for UserAuthInfo {\n    fn from(user: crate::models::entities::user::User) -\u003e Self {\n        Self {\n            id: user.id,\n            email: user.email,\n            username: user.username,\n        }\n    }\n}\n\n/// 注册用户响应\n#[derive(Debug, Serialize)]\npub struct RegisterResponse {\n    pub id: Uuid,\n    pub email: String,\n    pub username: Option\u003cString\u003e,\n    pub created_at: chrono::DateTime\u003cchrono::Utc\u003e,\n}\n\n/// 密码验证函数\nfn validate_password(password: \u0026str) -\u003e Result\u003c(), ValidationError\u003e {\n    if password.len() \u003c 8 {\n        return Err(ValidationError::new(\n            \"password must be at least 8 characters long\",\n        ));\n    }\n    if !password.chars().any(|c| c.is_ascii_uppercase()) {\n        return Err(ValidationError::new(\n            \"password must contain at least one uppercase letter\",\n        ));\n    }\n    if !password.chars().any(|c| c.is_ascii_lowercase()) {\n        return Err(ValidationError::new(\n            \"password must contain at least one lowercase letter\",\n        ));\n    }\n    if !password.chars().any(|c| c.is_ascii_digit()) {\n        return Err(ValidationError::new(\n            \"password must contain at least one digit\",\n        ));\n    }\n    Ok(())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_password_validation() {\n        // Valid password\n        assert!(validate_password(\"Valid123!\").is_ok());\n        assert!(validate_password(\"MyP@ssw0rd\").is_ok());\n\n        // Too short\n        assert!(validate_password(\"Short1!\").is_err());\n\n        // No uppercase\n        assert!(validate_password(\"lowercase123\").is_err());\n\n        // No lowercase\n        assert!(validate_password(\"UPPERCASE123\").is_err());\n\n        // No digit\n        assert!(validate_password(\"NoDigitsHere\").is_err());\n    }\n\n    #[test]\n    fn test_register_request_validation() {\n        let valid_req = RegisterRequest {\n            email: \"test@example.com\".to_string(),\n            password: \"Valid123!\".to_string(),\n            username: Some(\"testuser\".to_string()),\n        };\n        assert!(valid_req.validate().is_ok());\n\n        let invalid_email = RegisterRequest {\n            email: \"invalid-email\".to_string(),\n            password: \"Valid123!\".to_string(),\n            username: None,\n        };\n        assert!(invalid_email.validate().is_err());\n    }\n}\n","traces":[{"line":68,"address":[18434368,18434607],"length":1,"stats":{"Line":0}},{"line":70,"address":[15866007],"length":1,"stats":{"Line":0}},{"line":71,"address":[15866016],"length":1,"stats":{"Line":0}},{"line":72,"address":[15866033],"length":1,"stats":{"Line":0}},{"line":87,"address":[15866240],"length":1,"stats":{"Line":2}},{"line":88,"address":[15866299],"length":1,"stats":{"Line":1}},{"line":89,"address":[15866360],"length":1,"stats":{"Line":1}},{"line":93,"address":[19819088,19819101],"length":1,"stats":{"Line":3}},{"line":94,"address":[15866405],"length":1,"stats":{"Line":1}},{"line":98,"address":[15866466],"length":1,"stats":{"Line":3}},{"line":99,"address":[15866519],"length":1,"stats":{"Line":1}},{"line":103,"address":[15866580],"length":1,"stats":{"Line":3}},{"line":104,"address":[15866618],"length":1,"stats":{"Line":1}},{"line":108,"address":[15866677],"length":1,"stats":{"Line":1}}] 行登录\n    let login_response = auth_service.login(req).await?;\n\n    let response = TokenResponse {\n        access_token: login_response.access_token,\n        refresh_token: login_response.refresh_token,\n        token_type: \"Bearer\".to_string(),\n        expires_in: login_response.expires_in,\n        user: UserAuthInfo {\n            id: login_response.user_id,\n            email: login_response.email,\n            username: login_response.username,\n        },\n    };\n\n    Ok(Json(ApiResponse::success(response)))\n}\n\n/// 处理Token刷新\npub async fn refresh_token\u003cS: AuthService\u003e(\n    State(auth_service): State\u003cArc\u003cS\u003e\u003e,\n    Json(req): Json\u003cTokenRefreshRequest\u003e,\n) -\u003e Result\u003cJson\u003cApiResponse\u003cTokenResponse\u003e\u003e, AppError\u003e {\n    // 验证请求\n    req.validate()\n        .map_err(|e| AppError::validation_error_single(\"validation\", e.to_string()))?;\n\n    // 刷新Token\n    let login_response = auth_service.refresh_token(req).await?;\n\n    let response = TokenResponse {\n        access_token: login_response.access_token,\n        refresh_token: login_response.refresh_token,\n        token_type: \"Bearer\".to_string(),\n        expires_in: login_response.expires_in,\n        user: UserAuthInfo {\n            id: login_response.user_id,\n            email: login_response.email,\n            username: login_response.username,\n        },\n    };\n\n    Ok(Json(ApiResponse::success(response)))\n}\n","traces":[{"line":18,"address":[15493472],"length":1,"stats":{"Line":0}},{"line":23,"address":[15494348,15493964,15494031,15493830],"length":1,"stats":{"Line":0}},{"line":24,"address":[15495863,15493941,15493999,15495840],"length":1,"stats":{"Line":0}},{"line":27,"address":[17610388],"length":1,"stats":{"Line":0}},{"line":30,"address":[15494875],"length":1,"stats":{"Line":0}},{"line":31,"address":[15494891],"length":1,"stats":{"Line":0}},{"line":32,"address":[15494931],"length":1,"stats":{"Line":0}},{"lin \n/// async fn handler(\n///     Extension(user_ctx): Extension\u003cUserContext\u003e,\n/// ) -\u003e impl IntoResponse {\n///     println!(\"User: {}\", user_ctx.email);\n/// }\n/// ```\n#[derive(Debug, Clone, Serialize, Deserialize)]\npub struct UserContext {\n    /// 用户ID (UUID)\n    pub user_id: Uuid,\n    /// 用户邮箱地址\n    pub email: String,\n}\n\nimpl UserContext {\n    /// 创建新的用户上下文\n    ///\n    /// # Arguments\n    /// * `user_id` - 用户唯一标识符\n    /// * `email` - 用户邮箱地址\n    ///\n    /// # Example\n    ///\n    /// ```rust,ignore\n    /// use uuid::Uuid;\n    /// use kayak_backend::auth::UserContext;\n    ///\n    /// let user_id = Uuid::new_v4();\n    /// let ctx = UserContext::new(user_id, \"user@example.com\");\n    /// ```\n    pub fn new(user_id: Uuid, email: impl Into\u003cString\u003e) -\u003e Self {\n        Self {\n            user_id,\n            email: email.into(),\n        }\n    }\n}\n\nimpl From\u003c(Uuid, String)\u003e for UserContext {\n    fn from((user_id, email): (Uuid, String)) -\u003e Self {\n        Self::new(user_id, email)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_user_context_creation() {\n        let user_id = Uuid::new_v4();\n        let ctx = UserContext::new(user_id, \"test@example.com\");\n\n        assert_eq!(ctx.user_id, user_id);\n        assert_eq!(ctx.email, \"test@example.com\");\n    }\n\n    #[test]\n    fn test_user_context_from_tuple() {\n        let user_id = Uuid::new_v4();\n        let ctx: UserContext = (user_id, \"test@example.com\".to_string()).into();\n\n        assert_eq!(ctx.user_id, user_id);\n        assert_eq!(ctx.email, \"test@example.com\");\n    }\n\n    #[test]\n    fn test_user_context_clone() {\n        let user_id = Uuid::new_v4();\n        let ctx = UserContext::new(user_id, \"test@example.com\");\n        let cloned = ctx.clone();\n\n        assert_eq!(cloned.user_id, ctx.user_id);\n        assert_eq!(cloned.email, ctx.email);\n    }\n\n    #[test]\n    fn test_user_context_serialization() {\n        let user_id = Uuid::new_v4();\n        let ctx = UserContext::new(user_id, \"test@example.com\");\n\n        let json = serde_json::to_string(\u0026ctx).unwrap();\n        assert!(json.contains(\u0026user_id.to_string()));\n        assert!(json.contains(\"test@example.com\"));\n\n        let deserialized: UserContext = serde_json::from_str(\u0026json).unwrap();\n        assert_eq!(deserialized.user_id, user_id);\n        assert_eq!(deserialized.email, \"test@example.com\");\n    }\n}\n","traces":[{"line":50,"address":[16446192,16446064],"length":1,"stats":{"Line":6}},{"line":53,"address":[16446247,16446082],"length":1,"stats":{"Line":5}},{"line":59,"address":[17207872,17207883],"length":1,"stats":{"Line":2}},{"line":60,"address":[17207927],"length":1,"stats":{"Line":1}}],"covered":4,"coverable":4},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","auth","middleware","extractor.rs"],"content":"//! Token提取器实现\n//!\n//! 从HTTP请求中提取JWT Token的各种策略实现\n\nuse axum::http::header;\nuse axum::http::request::Parts;\n\nuse super::traits::TokenExtractor;\n\n/// Bearer Token提取器\n///\n/// 从Authorization头部提取Bearer Token\n///\n/// # 格式\n/// ```text\n/// Authorization: Bearer \u003ctoken\u003e\n/// ```\n///\n/// # Example\n///\n/// ```rust\n/// use kayak_backend::auth::middleware::BearerTokenExtractor;\n///\n/// let extractor = BearerTokenExtractor;\n/// // extractor.extract(\u0026mut parts)\n/// ```\n#[derive(Clone, Debug)]\npub struct BearerTokenExtractor;\n\nimpl TokenExtractor for BearerTokenExtractor {\n    fn extract(\u0026self, parts: \u0026mut Parts) -\u003e Option\u003cString\u003e {\n        parts\n            .headers\n            .get(header::AUTHORIZATION)\n            .and_then(|value| value.to_str().ok())\n            .and_then(|value| {\n                // 支持 \"Bearer \" 和 \"bearer \" 前缀\n                value\n                    .strip_prefix(\"Bearer \")\n                    .or_else(|| value.strip_prefix(\"bearer \"))\n            })\n            .map(|token| token.trim().to_string())\n            .filter(|token| !token.is_empty())\n    }\n}\n\n/// 组合Token提取器\n///\n/// 按优先级顺序尝试多种提取策略\n///\n/// # Example\n///\n/// ```rust,ignore\n/// use kayak_backend::auth::middleware::{CompositeTokenExtractor, BearerTokenExtractor};\n///\n/// let extractor = CompositeTokenExtractor::new()\n///     .add(Box::new(BearerTokenExtractor));\n/// ```\n#[derive(Default)]\npub struct CompositeTokenExtractor {\n    extractors: Vec\u003cBox\u003cdyn TokenExtractor\u003e\u003e,\n}\n\nimpl CompositeTokenExtractor {\n    /// 创建新的组合提取器\n    pub fn new() -\u003e Self {\n        Self {\n            extractors: Vec::new(),\n        }\n    }\n\n    /// 添加提取器到列表\n    ///\n    /// # Arguments\n    /// * `extractor` - 要添加的提取器\n    pub fn add_extractor(mut self, extractor: Box\u003cdyn TokenExtractor\u003e) -\u003e Self {\n        self.extractors.push(extractor);\n        self\n    }\n}\n\nimpl TokenExtractor for CompositeTokenExtractor {\n    fn extract(\u0026self, parts: \u0026mut Parts) -\u003e Option\u003cString\u003e {\n        for extractor in \u0026self.extractors {\n            if let Some(token) = extractor.extract(parts) {\n                return Some(token);\n            }\n        }\n        None\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use axum::http::Request;\n\n    fn create_parts_with_auth(auth_value: \u0026str) -\u003e Parts {\n        let request = Request::builder()\n            .uri(\"/test\")\n            .header(header::AUTHORIZATION, auth_value)\n            .body(())\n            .unwrap();\n        request.into_parts().0\n    }\n\n    fn create_empty_parts() -\u003e Parts {\n        let request = Request::builder().uri(\"/test\").body(()).unwrap();\n        request.into_parts().0\n    }\n\n    #[test]\n    fn test_bearer_token_extraction_success() {\n        let extractor = BearerTokenExtractor;\n        let mut parts = create_parts_with_auth(\"Bearer valid_token_123\");\n        assert_eq!(\n            extractor.extract(\u0026mut parts),\n            Some(\"valid_token_123\".to_string())\n        );\n    }\n\n    #[test]\n    fn test_bearer_token_extraction_lowercase() {\n        let extractor = BearerTokenExtractor;\n        let mut parts = create_parts_with_auth(\"bearer lowercase_token\");\n        assert_eq!(\n            extractor.extract(\u0026mut parts),\n            Some(\"lowercase_token\".to_string())\n        );\n    }\n\n    #[test]\n    fn test_bearer_token_extraction_no_bearer_prefix() {\n        let extractor = BearerTokenExtractor;\n        let mut parts = create_parts_with_auth(\"Basic dXNlcjpwYXNz\");\n        assert_eq!(extractor.extract(\u0026mut parts), None);\n    }\n\n    #[test]\n    fn test_bearer_token_extraction_empty_token() {\n        let extractor = BearerTokenExtractor;\n        let mut parts = create_parts_with_auth(\"Bearer \");\n        assert_eq!(extractor.extract(\u0026mut parts), None);\n    }\n\n    #[test]\n    fn test_bearer_token_extraction_no_space() {\n        let extractor = BearerTokenExtractor;\n        let mut parts = create_parts_with_auth(\"Bearertoken_without_space\");\n        assert_eq!(extractor.extract(\u0026mut parts), None);\n    }\n\n    #[test]\n    fn test_bearer_token_extraction_missing_header() {\n        let extractor = BearerTokenExtractor;\n        let mut parts = create_empty_parts();\n        assert_eq!(extractor.extract(\u0026mut parts), None);\n    }\n\n    #[test]\n    fn test_bearer_token_extraction_with_whitespace() {\n        let extractor = BearerTokenExtractor;\n        let mut parts = create_parts_with_auth(\"Bearer  token_with_spaces  \");\n        assert_eq!(\n            extractor.extract(\u0026mut parts),\n            Some(\"token_with_spaces\".to_string())\n        );\n    }\n\n    #[test]\n    fn test_composite_token_extractor_empty() {\n        let extractor = CompositeTokenExtractor::new();\n        let mut parts = create_empty_parts();\n        assert_eq!(extractor.extract(\u0026mut parts), None);\n    }\n}\n","traces":[{"line":31,"address":[17310848],"length":1,"stats":{"Line":7}},{"line":32,"address":[18527317],"length":1,"stats":{"Line":7}},{"line":34,"address":[18527365],"length":1,"stats":{"Line":7}},{"line":35,"address":[18527379],"length":1,"stats":{"Line":19}},{"line":36,"address":[18527390],"length":1,"stats":{"Line":7}},{"line":39,"address":[16030871],"length":1,"stats":{"Line":5}},{"line":40,"address":[16031070,16030907,16031056],"length":1,"stats":{"Line":3}},{"line":42,"address":[18173792,18173744],"length":1,"stats":{"Line":7}},{"line":43,"address":[18173584,18173593],"length":1,"stats":{"Line":5}},{"line":66,"address":[17310768],"length":1,"stats":{"Line":1}},{"line":68,"address":[18527213],"length":1,"stats":{"Line":1}},{"line":76,"address":[17310592,17310738],"length":1,"stats":{"Line":0}},{"line":77,"address":[18527101],"length":1,"stats":{"Line":0}},{"line":78,"address":[18527151],"length":1,"stats":{"Line":0}},{"line":83,"address":[18527440],"length":1,"stats":{"Line":1}},{"line":84,"address":[18527500,18527485],"length":1,"stats":{"Line":2}},{"line":85,"address":[18527561,18527648],"length":1,"stats":{"Line":0}},{"line":86,"address":[18527678],"length":1,"stats":{"Line":0}},{"line":89,"address":[18527617],"length":1,"stats":{"Line":1}}],"covered":14,"coverable":19},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","auth","middleware","layer.rs"],"content":"//! JWT认证中间件层实现\n//!\n//! 提供Tower Layer和Service实现，用于Axum路由的认证保护\n//!\n//! # 主要组件\n//!\n//! - `JwtAuthMiddleware`: 中间件核心实现\n//! - `AuthLayer`: Tower Layer实现\n//! - `AuthMiddlewareService`: Tower Service实现\n//!\n//! # 使用示例\n//!\n//! ```rust\n//! use std::sync::Arc;\n//! use kayak_backend::auth::middleware::{JwtAuthMiddleware, AuthLayer};\n//! use kayak_backend::auth::services::JwtTokenService;\n//!\n//! let token_service = Arc::new(JwtTokenService::new(\n//!     \"access_secret\".to_string(),\n//!     \"refresh_secret\".to_string(),\n//! ));\n//!\n//! let middleware = JwtAuthMiddleware::new(token_service);\n//! let layer = AuthLayer::new(middleware);\n//! ```\n\nuse std::convert::Infallible;\nuse std::sync::Arc;\nuse std::task::{Context, Poll};\n\nuse axum::extract::Request;\nuse axum::http::StatusCode;\nuse axum::response::Response;\nuse futures::future::BoxFuture;\nuse tower::{Layer, Service};\n\nuse crate::auth::middleware::context::UserContext;\nuse crate::auth::middleware::extractor::BearerTokenExtractor;\nuse crate::auth::middleware::traits::{AuthMiddleware, TokenExtractor};\nuse crate::auth::traits::TokenService;\nuse crate::core::error::AppError;\n\n/// JWT认证中间件实现\n///\n/// 核心中间件结构，包含Token服务和Token提取器配置\n///\n/// # 字段\n///\n/// - `token_service`: Token服务，用于验证Token有效性\n/// - `extractor`: Token提取器，从请求中提取Token\n/// - `allow_anonymous`: 是否允许匿名访问\n///\n/// # 示例\n///\n/// ```rust,ignore\n/// use std::sync::Arc;\n/// use kayak_backend::auth::middleware::JwtAuthMiddleware;\n///\n/// let middleware = JwtAuthMiddleware::new(token_service)\n///     .allow_anonymous(false);\n/// ```\n#[derive(Clone)]\npub struct JwtAuthMiddleware {\n    token_service: Arc\u003cdyn TokenService\u003e,\n    extractor: Arc\u003cdyn TokenExtractor\u003e,\n    allow_anonymous: bool,\n}\n\nimpl JwtAuthMiddleware {\n    /// 创建新的认证中间件\n    ///\n    /// # Arguments\n    /// * `token_service` - Token服务，用于验证Token\n    ///\n    /// # 默认配置\n    /// - Token提取器: BearerTokenExtractor\n    /// - 允许匿名: false\n    pub fn new(token_service: Arc\u003cdyn TokenService\u003e) -\u003e Self {\n        Self {\n            token_service,\n            extractor: Arc::new(BearerTokenExtractor),\n            allow_anonymous: false,\n        }\n    }\n\n    /// 设置Token提取器\n    ///\n    /// # Arguments\n    /// * `extractor` - 自定义Token提取器\n    pub fn with_extractor(mut self, extractor: Arc\u003cdyn TokenExtractor\u003e) -\u003e Self {\n        self.extractor = extractor;\n        self\n    }\n\n    /// 设置是否允许匿名访问\n    ///\n    /// # Arguments\n    /// * `allow` - true表示允许匿名访问，false表示需要认证\n    pub fn allow_anonymous(mut self, allow: bool) -\u003e Self {\n        self.allow_anonymous = allow;\n        self\n    }\n\n    /// 执行认证逻辑\n    ///\n    /// 验证Token并返回用户上下文\n    ///\n    /// # Arguments\n    /// * `token` - JWT Token字符串\n    ///\n    /// # Returns\n    /// * `Ok(UserContext)` - 认证成功，返回用户上下文\n    /// * `Err(AppError)` - 认证失败\n    pub async fn authenticate(\u0026self, token: \u0026str) -\u003e Result\u003cUserContext, AppError\u003e {\n        let claims = self.token_service.verify_access_token(token)?;\n\n        Ok(UserContext {\n            user_id: claims.sub,\n            email: claims.email,\n        })\n    }\n}\n\nimpl AuthMiddleware for JwtAuthMiddleware {\n    async fn authenticate(\u0026self, token: \u0026str) -\u003e Result\u003cUserContext, AppError\u003e {\n        let claims = self.token_service.verify_access_token(token)?;\n        Ok(UserContext {\n            user_id: claims.sub,\n            email: claims.email,\n        })\n    }\n}\n\n/// Tower Layer实现\n///\n/// 用于将认证中间件应用到Axum路由\n///\n/// # 使用示例\n///\n/// ```rust,ignore\n/// use kayak_backend::auth::middleware::AuthLayer;\n///\n/// let layer = AuthLayer::new(middleware);\n/// router.layer(layer)\n/// ```\n#[derive(Clone)]\npub struct AuthLayer {\n    middleware: JwtAuthMiddleware,\n}\n\nimpl AuthLayer {\n    /// 创建新的认证层\n    ///\n    /// # Arguments\n    /// * `middleware` - JWT认证中间件实例\n    pub fn new(middleware: JwtAuthMiddleware) -\u003e Self {\n        Self { middleware }\n    }\n}\n\nimpl\u003cS\u003e Layer\u003cS\u003e for AuthLayer {\n    type Service = AuthMiddlewareService\u003cS\u003e;\n\n    fn layer(\u0026self, inner: S) -\u003e Self::Service {\n        AuthMiddlewareService {\n            inner,\n            middleware: self.middleware.clone(),\n        }\n    }\n}\n\n/// Tower Service实现\n///\n/// 包装内部服务，在调用前执行认证\n///\n/// # 认证流程\n///\n/// 1. 从请求中提取Token\n/// 2. 验证Token有效性\n/// 3. 认证成功：注入用户上下文，调用内部服务\n/// 4. 认证失败：返回401 Unauthorized响应\n#[derive(Clone)]\npub struct AuthMiddlewareService\u003cS\u003e {\n    inner: S,\n    middleware: JwtAuthMiddleware,\n}\n\nimpl\u003cS\u003e Service\u003cRequest\u003e for AuthMiddlewareService\u003cS\u003e\nwhere\n    S: Service\u003cRequest, Response = Response, Error = Infallible\u003e + Clone + Send + 'static,\n    S::Future: Send + 'static,\n{\n    type Response = Response;\n    type Error = Infallible;\n    type Future = BoxFuture\u003c'static, Result\u003cSelf::Response, Self::Error\u003e\u003e;\n\n    fn poll_ready(\u0026mut self, cx: \u0026mut Context\u003c'_\u003e) -\u003e Poll\u003cResult\u003c(), Self::Error\u003e\u003e {\n        self.inner.poll_ready(cx)\n    }\n\n    fn call(\u0026mut self, request: Request) -\u003e Self::Future {\n        // Clone the inner service and middleware for the async block\n        // Tower requires clone because the async block needs to own the service\n        let mut inner = self.inner.clone();\n        let middleware = self.middleware.clone();\n\n        Box::pin(async move {\n            // 提取Token\n            let (mut parts, body) = request.into_parts();\n            let token = middleware.extractor.extract(\u0026mut parts);\n\n            match token {\n                Some(token) =\u003e {\n                    // 验证Token\n                    match middleware.authenticate(\u0026token).await {\n                        Ok(user_context) =\u003e {\n                            // 注入用户上下文\n                            parts.extensions.insert(user_context);\n                            let request = Request::from_parts(parts, body);\n                            inner.call(request).await\n                        }\n                        Err(err) =\u003e {\n                            // 认证失败，返回401（带WWW-Authenticate头）\n                            Ok(create_unauthorized_response(err))\n                        }\n                    }\n                }\n                None =\u003e {\n                    if middleware.allow_anonymous {\n                        // 允许匿名访问\n                        let request = Request::from_parts(parts, body);\n                        inner.call(request).await\n                    } else {\n                        // 需要认证，返回401（带WWW-Authenticate头）\n                        Ok(create_unauthorized_response(AppError::Unauthorized(\n                            \"Missing authentication token\".to_string(),\n                        )))\n                    }\n                }\n            }\n        })\n    }\n}\n\n/// 创建401 Unauthorized响应（符合RFC 6750）\n///\n/// 包含WWW-Authenticate头部和JSON错误体\n///\n/// # Arguments\n/// * `err` - 应用错误\n///\n/// # Returns\n/// HTTP响应，状态码401，包含JSON错误体和WWW-Authenticate头\nfn create_unauthorized_response(err: AppError) -\u003e Response {\n    use axum::body::Body;\n    use serde_json::json;\n\n    let body = Body::from(\n        json!({\n            \"code\": 401,\n            \"message\": err.to_string()\n        })\n        .to_string(),\n    );\n\n    Response::builder()\n        .status(StatusCode::UNAUTHORIZED)\n        .header(\"WWW-Authenticate\", \"Bearer\")\n        .header(\"Content-Type\", \"application/json\")\n        .body(body)\n        .unwrap()\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    /// 创建一个模拟的Token服务用于测试\n    fn create_mock_token_service() -\u003e Arc\u003cdyn TokenService\u003e {\n        use crate::auth::services::JwtTokenService;\n        Arc::new(JwtTokenService::new(\n            \"test_access_secret_key_that_is_at_least_32_bytes_long\".to_string(),\n            \"test_refresh_secret_key_that_is_at_least_32_bytes_long\".to_string(),\n        ))\n    }\n\n    #[tokio::test]\n    async fn test_jwt_middleware_new() {\n        let token_service = create_mock_token_service();\n        let middleware = JwtAuthMiddleware::new(token_service);\n        assert!(!middleware.allow_anonymous);\n    }\n\n    #[tokio::test]\n    async fn test_jwt_middleware_allow_anonymous() {\n        let token_service = create_mock_token_service();\n        let middleware = JwtAuthMiddleware::new(token_service).allow_anonymous(true);\n        assert!(middleware.allow_anonymous);\n    }\n\n    #[test]\n    fn test_create_unauthorized_response() {\n        let err = AppError::Unauthorized(\"Test error\".to_string());\n        let response = create_unauthorized_response(err);\n\n        assert_eq!(response.status(), StatusCode::UNAUTHORIZED);\n        assert_eq!(\n            response.headers().get(\"WWW-Authenticate\").unwrap(),\n            \"Bearer\"\n        );\n        assert_eq!(\n            response.headers().get(\"Content-Type\").unwrap(),\n            \"application/json\"\n        );\n    }\n}\n","traces":[{"line":78,"address":[16428598,16428464,16428592],"length":1,"stats":{"Line":2}},{"line":81,"address":[19220801],"length":1,"stats":{"Line":2}},{"line":90,"address":[16428240,16428389],"length":1,"stats":{"Line":0}},{"line":91,"address":[16428361,16428286],"length":1,"stats":{"Line":0}},{"line":92,"address":[16428369],"length":1,"stats":{"Line":0}},{"line":99,"address":[16428416],"length":1,"stats":{"Line":1}},{"line":100,"address":[16428439],"length":1,"stats":{"Line":1}},{"line":101,"address":[16428444],"length":1,"stats":{"Line":1}},{"line":114,"address":[19220514,19220496],"length":1,"stats":{"Line":0}},{"line":115,"address":[17277612,17277718,17278141],"length":1,"stats":{"Line":0}},{"line":117,"address":[17277990],"length":1,"stats":{"Line":0}},{"line":118,"address":[15611578],"length":1,"stats":{"Line":0}},{"line":119,"address":[15611610],"length":1,"stats":{"Line":0}},{"line":125,"address":[17276945,17276972,17276838,17276800,17277455],"length":1,"stats":{"Line":0}},{"line":126,"address":[15611137,15610620,15610722],"length":1,"stats":{"Line":0}},{"line":127,"address":[15610986],"length":1,"stats":{"Line":0}},{"line":128,"address":[15610906],"length":1,"stats":{"Line":0}},{"line":129,"address":[15610938],"length":1,"sta 1},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","auth","middleware","mod.rs"],"content":"//! JWT认证中间件模块\n//!\n//! 提供基于JWT Token的认证中间件实现，支持：\n//! - 从Authorization头部提取Bearer Token\n//! - Token验证（签名、过期时间、声明）\n//! - 用户上下文注入到请求Extension\n//! - 强制认证和可选认证两种模式\n//!\n//! # 基本用法\n//!\n//! ```rust,ignore\n//! use kayak_backend::auth::middleware::{AuthLayer, JwtAuthMiddleware};\n//! use std::sync::Arc;\n//!\n//! // 创建认证中间件\n//! let auth_middleware = JwtAuthMiddleware::new(token_service);\n//! let auth_layer = AuthLayer::new(auth_middleware);\n//!\n//! // 应用到路由\n//! let app = Router::new()\n//!     .route(\"/protected\", get(protected_handler))\n//!     .layer(auth_layer);\n//! ```\n\npub mod context;\npub mod extractor;\npub mod layer;\npub mod require_auth;\npub mod traits;\n\n// 公共导出\npub use context::UserContext;\npub use extractor::{BearerTokenExtractor, CompositeTokenExtractor};\npub use layer::{AuthLayer, AuthMiddlewareService, JwtAuthMiddleware};\npub use require_auth::{OptionalAuth, RequireAuth};\npub use traits::{AuthConfig, AuthMiddleware, TokenExtractor};\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","auth","middleware","require_auth.rs"],"content":"use axum::async_trait;\nuse axum::extract::FromRequestParts;\nuse axum::http::request::Parts;\nuse std::ops::Deref;\n\nuse super::context::UserContext;\nuse crate::core::error::AppError;\n\n/// 强制认证提取器\n///\n/// 用于处理器参数，要求请求必须经过认证。\n/// 如果未认证，自动返回401错误。\n///\n/// # Example\n///\n/// ```rust,ignore\n/// use axum::{Json, extract::Extension};\n/// use serde_json::Value;\n/// use kayak_backend::auth::{RequireAuth, UserContext};\n///\n/// async fn profile(\n///     RequireAuth(user): RequireAuth,\n/// ) -\u003e Json\u003cValue\u003e {\n///     Json(json!({\"email\": user.email}))\n/// }\n/// ```\npub struct RequireAuth(pub UserContext);\n\n#[async_trait]\nimpl\u003cS\u003e FromRequestParts\u003cS\u003e for RequireAuth\nwhere\n    S: Send + Sync,\n{\n    type Rejection = AppError;\n\n    async fn from_request_parts(parts: \u0026mut Parts, _state: \u0026S) -\u003e Result\u003cSelf, Self::Rejection\u003e {\n        parts\n            .extensions\n            .get::\u003cUserContext\u003e()\n            .cloned()\n            .map(RequireAuth)\n            .ok_or_else(|| AppError::Unauthorized(\"Authentication required\".to_string()))\n    }\n}\n\nimpl Deref for RequireAuth {\n    type Target = UserContext;\n\n    fn deref(\u0026self) -\u003e \u0026Self::Target {\n        \u0026self.0\n    }\n}\n\n/// 可选认证提取器\n///\n/// 处理器可以处理已认证和未认证两种情况。\n///\n/// # Example\n///\n/// ```rust,ignore\n/// use axum::{Json, extract::Extension};\n/// use serde_json::Value;\n/// use kayak_backend::auth::{OptionalAuth, UserContext};\n///\n/// async fn public_profile(\n///     OptionalAuth(user): OptionalAuth,\n/// ) -\u003e Json\u003cValue\u003e {\n///     match user {\n///         Some(u) =\u003e Json(json!({\"user\": u.email})),\n///         None =\u003e Json(json!({\"user\": null})),\n///     }\n/// }\n/// ```\npub struct OptionalAuth(pub Option\u003cUserContext\u003e);\n\n#[async_trait]\nimpl\u003cS\u003e FromRequestParts\u003cS\u003e for OptionalAuth\nwhere\n    S: Send + Sync,\n{\n    type Rejection = AppError;\n\n    async fn from_request_parts(parts: \u0026mut Parts, _state: \u0026S) -\u003e Result\u003cSelf, Self::Rejection\u003e {\n        Ok(OptionalAuth(parts.extensions.get::\u003cUserContext\u003e().cloned()))\n    }\n}\n\nimpl Deref for OptionalAuth {\n    type Target = Option\u003cUserContext\u003e;\n\n    fn deref(\u0026self) -\u003e \u0026Self::Target {\n        \u0026self.0\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use axum::http::Request;\n    use uuid::Uuid;\n\n    #[tokio::test]\n    async fn test_require_auth_success() {\n        let user_id = Uuid::new_v4();\n        let user_context = UserContext::new(user_id, \"test@example.com\");\n\n        let mut parts = Request::builder()\n            .uri(\"/test\")\n            .body(())\n            .unwrap()\n            .into_parts()\n            .0;\n\n        parts.extensions.insert(user_context.clone());\n\n        let result = RequireAuth::from_request_parts(\u0026mut parts, \u0026()).await;\n        assert!(result.is_ok());\n        assert_eq!(result.unwrap().user_id, user_id);\n    }\n\n    #[tokio::test]\n    async fn test_require_auth_missing() {\n        let mut parts = Request::builder()\n            .uri(\"/test\")\n            .body(())\n            .unwrap()\n            .into_parts()\n            .0;\n\n        let result = RequireAuth::from_request_parts(\u0026mut parts, \u0026()).await;\n        assert!(result.is_err());\n\n        match result {\n            Err(AppError::Unauthorized(_)) =\u003e (), // Expected\n            _ =\u003e panic!(\"Expected Unauthorized error\"),\n        }\n    }\n\n    #[tokio::test]\n    async fn test_optional_auth_with_user() {\n        let user_id = Uuid::new_v4();\n        let user_context = UserContext::new(user_id, \"test@example.com\");\n\n        let mut parts = Request::builder()\n            .uri(\"/test\")\n            .body(())\n            .unwrap()\n            .into_parts()\n            .0;\n\n        parts.extensions.insert(user_context.clone());\n\n        let result = OptionalAuth::from_request_parts(\u0026mut parts, \u0026()).await;\n        assert!(result.is_ok());\n        assert!(result.unwrap().0.is_some());\n    }\n\n    #[tokio::test]\n    async fn test_optional_auth_without_user() {\n        let mut parts = Request::builder()\n            .uri(\"/test\")\n            .body(())\n            .unwrap()\n            .into_parts()\n            .0;\n\n        let result = OptionalAuth::from_request_parts(\u0026mut parts, \u0026()).await;\n        assert!(result.is_ok());\n        assert!(result.unwrap().0.is_none());\n    }\n\n    #[test]\n    fn test_require_auth_deref() {\n        let user_id = Uuid::new_v4();\n        let user_context = UserContext::new(user_id, \"test@example.com\");\n        let require_auth = RequireAuth(user_context);\n\n        // Test Deref\n        assert_eq!(require_auth.user_id, user_id);\n        assert_eq!(require_auth.email, \"test@example.com\");\n    }\n\n    #[test]\n    fn test_optional_auth_deref() {\n        let user_id = Uuid::new_v4();\n        let user_context = UserContext::new(user_id, \"test@example.com\");\n        let optional_auth = OptionalAuth(Some(user_context));\n\n        // Test Deref\n        assert!(optional_auth.is_some());\n        assert_eq!(optional_auth.as_ref().unwrap().user_id, user_id);\n    }\n}\n","traces":[{"line":36,"address":[15995582,15996113,15996289,15996752,15996014,15995681,15994990,15995857,15996320,15996878,15995062,15995425,15995249,15995926,15996446,15995024,15996545,15995456,15996590,15994942,15996977,15997153,15995294,15995150,15995726,15996079,15994798,15996721,15996511,15995494,15994894,15995647,15994846,15995215,15996790,15996358,15996943,15995888,15996158,15997022],"length":1,"stats":{"Line":5}},{"line":37,"address":[15995654,15996950,15995222,15996518,15996086],"length":1,"stats":{"Line":1}},{"line":38,"address":[],"length":0,"stats":{"Line":0}},{"line":41,"address":[15995369,15995801,15996233,15996665,15997097],"length":1,"stats":{"Line":1}},{"line":42,"address":[15997582,15996256,15997294,15997390,15997376,15997486,15997184,15995824,15996688,15997120,15997568,15995392,15997198,15997472,15997280],"length":1,"stats":{"Line":3}},{"line":49,"address":[15827408],"length":1,"stats":{"Line":1}},{"line":83,"address":[15997838,15997903,15997982,15997712,15997937,15997750,15998119,15997678],"length":1,"stats":{"Line":5}},{"line":84,"address":[15998034,15997910],"length":1,"stats":{"Line":2}},{"line":91,"address":[15827424],"length":1,"stats":{"Line":1}}],"covered":8,"coverable":9},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","auth","middleware","traits.rs"],"content":"//! 认证中间件接口定义\n//!\n//! 定义JWT认证中间件的抽象行为，便于测试和扩展\n//! 遵循依赖倒置原则（DIP）\n\nuse axum::http::request::Parts;\n\n/// 认证中间件核心接口\n///\n/// 定义JWT认证中间件的抽象行为，便于测试和扩展\n///\n/// # 实现要求\n///\n/// 1. Clone: 中间件可能在多个请求间共享\n/// 2. Send + Sync: 异步运行时要求\n/// 3. 'static: 可能在异步上下文中使用\npub trait AuthMiddleware: Clone + Send + Sync + 'static {\n    /// 验证Token并返回用户上下文\n    ///\n    /// # Arguments\n    /// * `token` - JWT Token字符串（不含Bearer前缀）\n    ///\n    /// # Returns\n    /// * `Ok(UserContext)` - 验证成功，返回用户上下文\n    /// * `Err(AuthError)` - 验证失败\n    fn authenticate(\n        \u0026self,\n        token: \u0026str,\n    ) -\u003e impl std::future::Future\u003c\n        Output = Result\u003csuper::context::UserContext, crate::core::error::AppError\u003e,\n    \u003e + Send;\n}\n\n/// Token提取器接口\n///\n/// 从HTTP请求中提取Token，支持不同提取策略\n///\n/// # 实现要求\n///\n/// - Send + Sync: 异步运行时要求\n/// - 使用Arc包装实现以支持克隆\npub trait TokenExtractor: Send + Sync {\n    /// 从请求中提取Token\n    ///\n    /// # Returns\n    /// * `Some(String)` - 提取到Token\n    /// * `None` - 未找到Token\n    fn extract(\u0026self, parts: \u0026mut Parts) -\u003e Option\u003cString\u003e;\n}\n\n/// 认证配置接口\n///\n/// 定义认证中间件的行为配置\npub trait AuthConfig: Send + Sync {\n    /// 是否允许匿名访问（可选认证）\n    fn allow_anonymous(\u0026self) -\u003e bool;\n\n    /// 获取WWW-Authenticate响应头值\n    fn www_authenticate_header(\u0026self) -\u003e Option\u003cString\u003e;\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","auth","mod.rs"],"content":"//! 认证模块\n//!\n//! 提供用户注册、登录、JWT Token管理等功能\n\npub mod dtos;\npub mod error;\npub mod handlers;\npub mod middleware;\npub mod services;\npub mod traits;\npub mod user_repo_adapter;\n\npub use dtos::*;\npub use error::AuthError;\npub use handlers::*;\npub use middleware::*;\npub use services::*;\npub use traits::*;\npub use user_repo_adapter::*;\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","auth","services.rs"],"content":"//! 认证服务实现\n//!\n//! 实现认证相关的服务trait\n\nuse std::sync::Arc;\n\nuse async_trait::async_trait;\nuse bcrypt::{hash, verify, DEFAULT_COST};\nuse chrono::{Duration, Utc};\nuse jsonwebtoken::{decode, encode, DecodingKey, EncodingKey, Header, Validation};\nuse serde::{Deserialize, Serialize};\nuse uuid::Uuid;\n\nuse crate::core::error::AppError;\nuse crate::models::entities::user::{User, UserStatus};\n\nuse super::{\n    dtos::{LoginRequest, RegisterRequest, TokenRefreshRequest},\n    error::AuthError,\n    traits::{\n        AuthService, LoginResponse, PasswordHasher, TokenClaims, TokenPair, TokenService, TokenType,\n    },\n};\n\n// JWT配置常量\nconst ACCESS_TOKEN_EXPIRY_MINUTES: i64 = 15;\nconst REFRESH_TOKEN_EXPIRY_DAYS: i64 = 7;\n\n/// JWT Token Claims (序列化用)\n#[derive(Debug, Serialize, Deserialize)]\nstruct JwtClaims {\n    sub: String,\n    email: String,\n    token_type: String,\n    exp: i64,\n    iat: i64,\n}\n\nimpl From\u003cTokenClaims\u003e for JwtClaims {\n    fn from(claims: TokenClaims) -\u003e Self {\n        Self {\n            sub: claims.sub.to_string(),\n            email: claims.email,\n            token_type: match claims.token_type {\n                TokenType::Access =\u003e \"access\".to_string(),\n                TokenType::Refresh =\u003e \"refresh\".to_string(),\n            },\n            exp: claims.exp,\n            iat: claims.iat,\n        }\n    }\n}\n\n/// 认证服务实现\npub struct AuthServiceImpl {\n    user_repo: Arc\u003cdyn super::traits::UserRepository\u003e,\n    token_service: Arc\u003cdyn TokenService\u003e,\n    password_hasher: Arc\u003cdyn PasswordHasher\u003e,\n}\n\nimpl AuthServiceImpl {\n    pub fn new(\n        user_repo: Arc\u003cdyn super::traits::UserRepository\u003e,\n        token_service: Arc\u003cdyn TokenService\u003e,\n        password_hasher: Arc\u003cdyn PasswordHasher\u003e,\n    ) -\u003e Self {\n        Self {\n            user_repo,\n            token_service,\n            password_hasher,\n        }\n    }\n}\n\n#[async_trait]\nimpl AuthService for AuthServiceImpl {\n    async fn register(\u0026self, req: RegisterRequest) -\u003e Result\u003cUser, AppError\u003e {\n        // 检查邮箱是否已存在\n        if self.user_repo.find_by_email(\u0026req.email).await?.is_some() {\n            return Err(AuthError::UserAlreadyExists.into());\n        }\n\n        // 哈希密码\n        let password_hash = self.password_hasher.hash_password(\u0026req.password)?;\n\n        // 创建新用户\n        let user = User::new(req.email, password_hash, req.username);\n\n        // 保存到数据库\n        self.user_repo.create(\u0026user).await?;\n\n        Ok(user)\n    }\n\n    async fn login(\u0026self, req: LoginRequest) -\u003e Result\u003cLoginResponse, AppError\u003e {\n        // 查找用户\n        let user = self\n            .user_repo\n            .find_by_email(\u0026req.email)\n            .await?\n            .ok_or(AuthError::UserNotFound)?;\n\n        // 验证用户状态\n        let status = UserStatus::from(user.status.clone());\n        if status != UserStatus::Active {\n            return Err(AuthError::InactiveUser.into());\n        }\n\n        // 验证密码\n        let valid = self\n            .password_hasher\n            .verify_password(\u0026req.password, \u0026user.password_hash)?;\n\n        if !valid {\n            return Err(AuthError::InvalidPassword.into());\n        }\n\n        // 生成Token对\n        let token_pair = self\n            .token_service\n            .generate_token_pair(user.id, \u0026user.email)?;\n\n        Ok(LoginResponse {\n            user_id: user.id,\n            email: user.email,\n            username: user.username,\n            access_token: token_pair.access_token,\n            refresh_token: token_pair.refresh_token,\n            expires_in: token_pair.expires_in,\n        })\n    }\n\n    async fn refresh_token(\u0026self, req: TokenRefreshRequest) -\u003e Result\u003cLoginResponse, AppError\u003e {\n        // 验证刷新Token\n        let claims = self\n            .token_service\n            .verify_refresh_token(\u0026req.refresh_token)?;\n\n        // 确认Token类型\n        if claims.token_type != TokenType::Refresh {\n            return Err(AuthError::InvalidTokenType.into());\n        }\n\n        // 验证用户是否存在且有效\n        let user = self\n            .user_repo\n            .find_by_id(claims.sub)\n            .await?\n            .ok_or(AuthError::UserNotFound)?;\n\n        let status = UserStatus::from(user.status.clone());\n        if status != UserStatus::Active {\n            return Err(AuthError::InactiveUser.into());\n        }\n\n        // 生成新的Token对\n        let token_pair = self\n            .token_service\n            .generate_token_pair(user.id, \u0026user.email)?;\n\n        Ok(LoginResponse {\n            user_id: user.id,\n            email: user.email,\n            username: user.username,\n            access_token: token_pair.access_token,\n            refresh_token: token_pair.refresh_token,\n            expires_in: token_pair.expires_in,\n        })\n    }\n\n    async fn logout(\u0026self, _user_id: Uuid) -\u003e Result\u003c(), AppError\u003e {\n        // 在Release 0中，登出操作仅客户端删除Token即可\n        // Release 1中可以添加Token黑名单功能\n        Ok(())\n    }\n}\n\n/// JWT Token服务实现\npub struct JwtTokenService {\n    access_secret: String,\n    refresh_secret: String,\n}\n\nimpl JwtTokenService {\n    pub fn new(access_secret: String, refresh_secret: String) -\u003e Self {\n        Self {\n            access_secret,\n            refresh_secret,\n        }\n    }\n}\n\nimpl TokenService for JwtTokenService {\n    fn generate_token_pair(\u0026self, user_id: Uuid, email: \u0026str) -\u003e Result\u003cTokenPair, AppError\u003e {\n        let now = Utc::now();\n\n        // 生成Access Token\n        let access_exp = now + Duration::minutes(ACCESS_TOKEN_EXPIRY_MINUTES);\n        let access_claims = TokenClaims {\n            sub: user_id,\n            email: email.to_string(),\n            token_type: TokenType::Access,\n            exp: access_exp.timestamp(),\n            iat: now.timestamp(),\n        };\n\n        let access_token = encode(\n            \u0026Header::default(),\n            \u0026JwtClaims::from(access_claims),\n            \u0026EncodingKey::from_secret(self.access_secret.as_bytes()),\n        )\n        .map_err(|e| AppError::InternalError(format!(\"Token encoding error: {}\", e)))?;\n\n        // 生成Refresh Token\n        let refresh_exp = now + Duration::days(REFRESH_TOKEN_EXPIRY_DAYS);\n        let refresh_claims = TokenClaims {\n            sub: user_id,\n            email: email.to_string(),\n            token_type: TokenType::Refresh,\n            exp: refresh_exp.timestamp(),\n            iat: now.timestamp(),\n        };\n\n        let refresh_token = encode(\n            \u0026Header::default(),\n            \u0026JwtClaims::from(refresh_claims),\n            \u0026EncodingKey::from_secret(self.refresh_secret.as_bytes()),\n        )\n        .map_err(|e| AppError::InternalError(format!(\"Token encoding error: {}\", e)))?;\n\n        Ok(TokenPair {\n            access_token,\n            refresh_token,\n            token_type: \"Bearer\".to_string(),\n            expires_in: ACCESS_TOKEN_EXPIRY_MINUTES * 60,\n        })\n    }\n\n    fn verify_access_token(\u0026self, token: \u0026str) -\u003e Result\u003cTokenClaims, AppError\u003e {\n        let validation = Validation::default();\n        let token_data = decode::\u003cJwtClaims\u003e(\n            token,\n            \u0026DecodingKey::from_secret(self.access_secret.as_bytes()),\n            \u0026validation,\n        )\n        .map_err(|e| match e.kind() {\n            jsonwebtoken::errors::ErrorKind::ExpiredSignature =\u003e AuthError::TokenExpired,\n            _ =\u003e AuthError::InvalidToken,\n        })?;\n\n        let claims = token_data.claims;\n        if claims.token_type != \"access\" {\n            return Err(AuthError::InvalidTokenType.into());\n        }\n\n        Ok(TokenClaims {\n            sub: Uuid::parse_str(\u0026claims.sub).map_err(|_| AuthError::InvalidToken)?,\n            email: claims.email,\n            token_type: TokenType::Access,\n            exp: claims.exp,\n            iat: claims.iat,\n        })\n    }\n\n    fn verify_refresh_token(\u0026self, token: \u0026str) -\u003e Result\u003cTokenClaims, AppError\u003e {\n        let validation = Validation::default();\n        let token_data = decode::\u003cJwtClaims\u003e(\n            token,\n            \u0026DecodingKey::from_secret(self.refresh_secret.as_bytes()),\n            \u0026validation,\n        )\n        .map_err(|e| match e.kind() {\n            jsonwebtoken::errors::ErrorKind::ExpiredSignature =\u003e AuthError::TokenExpired,\n            _ =\u003e AuthError::InvalidToken,\n        })?;\n\n        let claims = token_data.claims;\n        if claims.token_type != \"refresh\" {\n            return Err(AuthError::InvalidTokenType.into());\n        }\n\n        Ok(TokenClaims {\n            sub: Uuid::parse_str(\u0026claims.sub).map_err(|_| AuthError::InvalidToken)?,\n            email: claims.email,\n            token_type: TokenType::Refresh,\n            exp: claims.exp,\n            iat: claims.iat,\n        })\n    }\n}\n\n/// bcrypt密码哈希实现\npub struct BcryptPasswordHasher;\n\nimpl PasswordHasher for BcryptPasswordHasher {\n    fn hash_password(\u0026self, password: \u0026str) -\u003e Result\u003cString, AppError\u003e {\n        hash(password, DEFAULT_COST).map_err(|e| AuthError::HashingError(e.to_string()).into())\n    }\n\n    fn verify_password(\u0026self, password: \u0026str, hash: \u0026str) -\u003e Result\u003cbool, AppError\u003e {\n        verify(password, hash).map_err(|e| AuthError::HashingError(e.to_string()).into())\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_password_hashing() {\n        let hasher = BcryptPasswordHasher;\n        let password = \"TestPassword123!\";\n\n        let hash = hasher.hash_password(password).unwrap();\n        assert_ne!(hash, password);\n        assert!(hash.starts_with(\"$2b$\"));\n\n        let valid = hasher.verify_password(password, \u0026hash).unwrap();\n        assert!(valid);\n\n        let invalid = hasher.verify_password(\"wrongpassword\", \u0026hash).unwrap();\n        assert!(!invalid);\n    }\n\n    #[test]\n    fn test_jwt_token_service() {\n        let service = JwtTokenService::new(\n            \"access_secret_key\".to_string(),\n            \"refresh_secret_key\".to_string(),\n        );\n\n        let user_id = Uuid::new_v4();\n        let email = \"test@example.com\";\n\n        // Generate token pair\n        let pair = service.generate_token_pair(user_id, email).unwrap();\n        assert!(!pair.access_token.is_empty());\n        assert!(!pair.refresh_token.is_empty());\n        assert_eq!(pair.token_type, \"Bearer\");\n\n        // Verify access token\n        let claims = service.verify_access_token(\u0026pair.access_token).unwrap();\n        assert_eq!(claims.sub, user_id);\n        assert_eq!(claims.email, email);\n        assert!(matches!(claims.token_type, TokenType::Access));\n\n        // Verify refresh token\n        let claims = service.verify_refresh_token(\u0026pair.refresh_token).unwrap();\n        assert_eq!(claims.sub, user_id);\n        assert_eq!(claims.email, email);\n        assert!(matches!(claims.token_type, TokenType::Refresh));\n    }\n}\n","traces":[{"line":40,"address":[17310872,17310897,17310528],"length":1,"stats":{"Line":1}},{"line":42,"address":[17778546],"length":1,"stats":{"Line":1}},{"line":43,"address":[17778612],"length":1,"stats":{"Line":1}},{"line":44,"address":[17310643],"length":1,"stats":{"Line":1}},{"line":48,"address":[17310769],"length":1,"stats":{"Line":1}},{"line":49,"address":[17778773],"length":1,"stats":{"Line":1}},{"line":62,"address":[17310928],"length":1,"stats":{"Line":0}},{"line":77,"address":[17824832,17825154,17827809,17828002,17827262,17827832,17825071,17825028,17828048,17825293,17824879,178280 证服务接口定义\n//!\n//! 定义认证相关的trait接口，遵循依赖倒置原则\n\nuse super::dtos::{LoginRequest, RegisterRequest, TokenRefreshRequest};\nuse crate::core::error::AppError;\nuse crate::models::entities::user::User;\nuse async_trait::async_trait;\n\n/// 认证服务接口\n#[async_trait]\npub trait AuthService: Send + Sync {\n    /// 用户注册\n    async fn register(\u0026self, req: RegisterRequest) -\u003e Result\u003cUser, AppError\u003e;\n\n    /// 用户登录\n    async fn login(\u0026self, req: LoginRequest) -\u003e Result\u003cLoginResponse, AppError\u003e;\n\n    /// 刷新Token\n    async fn refresh_token(\u0026self, req: TokenRefreshRequest) -\u003e Result\u003cLoginResponse, AppError\u003e;\n\n    /// 用户登出\n    async fn logout(\u0026self, user_id: uuid::Uuid) -\u003e Result\u003c(), AppError\u003e;\n}\n\n/// 登录响应\n#[derive(Debug, Clone)]\npub struct LoginResponse {\n    pub user_id: uuid::Uuid,\n    pub email: String,\n    pub username: Option\u003cString\u003e,\n    pub access_token: String,\n    pub refresh_token: String,\n    pub expires_in: i64,\n}\n\n/// Token服务接口\n#[async_trait]\npub trait TokenService: Send + Sync {\n    /// 生成Token对\n    fn generate_token_pair(\u0026self, user_id: uuid::Uuid, email: \u0026str) -\u003e Result\u003cTokenPair, AppError\u003e;\n\n    /// 验证Access Token\n    fn verify_access_token(\u0026self, token: \u0026str) -\u003e Result\u003cTokenClaims, AppError\u003e;\n\n    /// 验证Refresh Token\n    fn verify_refresh_token(\u0026self, token: \u0026str) -\u003e Result\u003cTokenClaims, AppError\u003e;\n}\n\n/// Token对\n#[derive(Debug, Clone)]\npub struct TokenPair {\n    pub access_token: String,\n    pub refresh_token: String,\n    pub token_type: String,\n    pub expires_in: i64,\n}\n\n/// Token声明\n#[derive(Debug, Clone)]\npub struct TokenClaims {\n    pub sub: uuid::Uuid,\n    pub email: String,\n    pub token_type: TokenType,\n    pub exp: i64,\n    pub iat: i64,\n}\n\n/// Token类型\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum TokenType {\n    Access,\n    Refresh,\n}\n\n/// 密码哈希服务接口\npub trait PasswordHasher: Send + Sync {\n    /// 哈希密码\n    fn hash_password(\u0026self, password: \u0026str) -\u003e Result\u003cString, AppError\u003e;\n\n    /// 验证密码\n    fn verify_password(\u0026self, password: \u0026str, hash: \u0026str) -\u003e Result\u003cbool, AppError\u003e;\n}\n\n/// 用户仓库接口\n#[async_trait]\npub trait UserRepository: Send + Sync {\n    /// 根据邮箱查找用户\n    async fn find_by_email(\u0026self, email: \u0026str) -\u003e Result\u003cOption\u003cUser\u003e, AppError\u003e;\n\n    /// 根据ID查找用户\n    async fn find_by_id(\u0026self, id: uuid::Uuid) -\u003e Result\u003cOption\u003cUser\u003e, AppError\u003e;\n\n    /// 创建用户\n    async fn create(\u0026self, user: \u0026User) -\u003e Result\u003c(), AppError\u003e;\n\n    /// 更新用户\n    async fn update(\u0026self, user: \u0026User) -\u003e Result\u003c(), AppError\u003e;\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","home","hzhou","workspace","kayak","kayak-backend","src","auth","user_repo_adapter.rs"],"content":"//! 用户仓库适配器\n//!\n//! 将现有的UserRepository适配为auth模块的UserRepository trait\n\nuse async_trait::async_trait;\nuse uuid::Uuid;\n\nuse crate::auth::traits::UserRepository as UserRepositoryTrait;\nuse crate::core::error::AppError;\nuse crate::db::repository::user_repo::UserRepository;\nuse crate::models::entities::user::User;\n\n/// 用户仓库适配器\npub struct UserRepositoryAdapter {\n    inner: UserRepository,\n}\n\nimpl UserRepositoryAdapter {\n    pub fn new(inner: UserRepository) -\u003e Self {\n        Self { inner }\n    }\n}\n\n#[async_trait]\nimpl UserRepositoryTrait for UserRepositoryAdapter {\n    async fn find_by_email(\u0026self, email: \u0026str) -\u003e Result\u003cOption\u003cUser\u003e, AppError\u003e {\n        self.inner\n            .find_by_email(email)\n            .await\n            .map_err(AppError::from)\n    }\n\n    async fn find_by_id(\u0026self, id: Uuid) -\u003e Result\u003cOption\u003cUser\u003e, AppError\u003e {\n        self.inner.find_by_id(id).await.map_err(AppError::from)\n    }\n\n    async fn create(\u0026self, user: \u0026User) -\u003e Result\u003c(), AppError\u003e {\n        // 将User转换为CreateUserRequest\n        let req = crate::models::entities::user::CreateUserRequest {\n            email: user.email.clone(),\n            password_hash: user.password_hash.clone(),\n            username: user.username.clone(),\n        };\n\n        self.inner.create(req).await.map_err(AppError::from)?;\n        Ok(())\n    }\n\n    async fn update(\u0026self, user: \u0026User) -\u003e Result\u003c(), AppError\u003e {\n        let req = crate::models::entities::user::UpdateUserRequest {\n            username: user.username.clone(),\n            avatar_url: user.avatar_url.clone(),\n            status: Some(crate::models::entities::user::UserStatus::from(\n                user.status.clone(),\n            )),\n        };\n\n        self.inner\n            .update(user.id, \u0026req)\n            .await\n            .map_err(AppError::from)?;\n        Ok(())\n    }\n}\n","traces":[{"line":19,"address":[18527264],"length":1,"stats":{"Line":0}},{"line":26,"address":[18525663],"length":1,"stats":{"Line":0}},{"line":27,"address":[17355297,17355246,17355003],"length":1,"stats":{"Line":0}},{"line":28,"address":[17731817],"length":1,"stats":{"Line":0}},{"line":29,"address":[17624183],"length":1,"stats":{"Line":0}},{"line":30,"address":[17355312],"length":1,"stats":{"Line":0}},{"line":33,"address":[18525583],"length":1,"stats":{"Line":0}},{"line":34,"address":[17354337,17354012,17354101,17354251],"length":1,"stats":{"Line":0}},{"line":37,"address":[18525735],"length":1,"stats":{"Line":0}},{"line":40,"address":[17355653],"length":1,"stats":{"Line":0}},{"line":41,"address":[17355805],"length":1,"stats":{"Line":0}},{"line":42,"address":[17355878],"length":1,"stats":{"Line":0}},{"line":45,"address":[17356817,17356047,17356258,17355504],"length":1,"stats":{"Line":0}},{"line":46,"address":[17356736],"length":1,"stats":{"Line":0}},{"lin          .build()?;\n\n        config.try_deserialize()\n    }\n\n    /// 获取绑定地址\n    pub fn bind_address(\u0026self) -\u003e String {\n        format!(\"{}:{}\", self.server.host, self.server.port)\n    }\n}\n\n/// 服务器配置\n#[derive(Debug, Clone, Deserialize, Serialize)]\npub struct ServerConfig {\n    /// 监听主机\n    pub host: String,\n    /// 监听端口\n    pub port: u16,\n    /// 请求超时（秒）\n    pub timeout_seconds: Option\u003cu64\u003e,\n}\n\n/// 日志配置\n#[derive(Debug, Clone, Deserialize, Serialize)]\npub struct LogConfig {\n    /// 日志级别: trace, debug, info, warn, error\n    pub level: String,\n    /// 是否启用JSON格式\n    pub json_format: Option\u003cbool\u003e,\n    /// 是否包含位置信息\n    pub include_location: Option\u003cbool\u003e,\n}\n\n/// CORS配置\n#[derive(Debug, Clone, Deserialize, Serialize)]\npub struct CorsConfig {\n    /// 允许的来源列表\n    #[serde(default)]\n    pub allowed_origins: Vec\u003cString\u003e,\n    /// 允许的方法\n    #[serde(default)]\n    pub allowed_methods: Vec\u003cString\u003e,\n    /// 允许的请求头\n    #[serde(default)]\n    pub allowed_headers: Vec\u003cString\u003e,\n    /// 允许暴露的响应头\n    #[serde(default)]\n    pub exposed_headers: Vec\u003cString\u003e,\n    /// 是否允许携带凭证\n    pub allow_credentials: bool,\n    /// 预检请求缓存时间（秒）\n    pub max_age: u64,\n    /// 允许任意来源（开发环境）\n    pub allow_any_origin: bool,\n}\n","traces":[{"line":21,"address":[17323008,17325841,17325812],"length":1,"stats":{"Line":0}},{"line":22,"address":[17324585,17325413,17324353,17324425,17324657,17323189,17323040,17323892,17324056,17323827,17325566,17324288,17323725,17324814,17324886,17324749,17323964,17323493,17323421,17324193,17323588,17323653,17323124,17324520,17325482,17325247,17323356,17323261,17324121],"length":1,"stats":{"Line":0}},{"line":33,"address":[17323472,17324865,17325181,17323943,17324636,17324404,17324172,17323704,17323240,17325150,17325279,17325880],"length":1,"stats":{"Line":0}},{"line":35,"address":[17323480,17324873,17323248,17325302,17323951,17324412,17323712,17324180,1732464
